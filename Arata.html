<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Shrimp Aqua Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#050e1a; --panel:#0d1f36; --p2:#071230;
      --bd:#18305a; --teal:#12c8d0; --gold:#e8b824;
      --red:#f06060; --orange:#f09040; --green:#44da88;
      --purple:#a070ff; --sky:#48ceff; --pink:#ff7ab0;
      --lime:#8ee030; --txt:#ddeeff; --mid:#88aacc; --dim:#4a6890;
      --shadow:0 10px 30px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100%}
    body{overflow-x:hidden}
    button,input{font:inherit}

    .en,.bn,.te{display:none}
    body.en .en{display:block}
    body.bn .bn{display:block}
    body.te .te{display:block}
    .bn{font-family:'Hind Siliguri',sans-serif}
    .te{font-family:'Noto Sans Telugu',sans-serif}

    #bar{position:sticky;top:0;z-index:20;background:rgba(13,31,54,.96);backdrop-filter:blur(10px);border-bottom:2px solid var(--teal);padding:10px 12px 8px}
    .bar-r1{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .logo{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--teal);text-transform:uppercase}
    .logo span{color:var(--dim);font-weight:400}
    .lpills{display:flex;background:var(--p2);border:1px solid var(--bd);border-radius:20px;padding:2px;gap:2px}
    .lbtn{padding:4px 12px;border-radius:18px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(--dim);font-family:'IBM Plex Sans',sans-serif}
    .lbtn.on{background:var(--teal);color:#000}
    .lbtn[data-l="te"].on{background:var(--purple);color:#fff}
    .search-wrap{position:relative}
    .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
    #srch{width:100%;background:var(--p2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px 8px 34px;color:var(--txt);font-size:13px;outline:none;-webkit-appearance:none;appearance:none}
    #srch::placeholder{color:var(--dim)}
    #srch:focus{border-color:var(--teal)}

    #tabs{display:flex;background:var(--p2);border-bottom:1px solid var(--bd);position:sticky;top:76px;z-index:15}
    .tbtn{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'IBM Plex Sans',sans-serif;border-bottom:2px solid transparent}
    .tbtn.on{color:var(--teal);border-bottom-color:var(--teal)}
    .tbtn.dis.on{color:var(--red);border-bottom-color:var(--red)}
    .tc{font-family:'IBM Plex Mono',monospace;font-size:9px;background:rgba(255,255,255,.08);border-radius:8px;padding:1px 6px}

    #list{padding:10px 12px 80px;max-width:920px;margin:0 auto}
    .card{display:flex;align-items:center;gap:10px;width:100%;background:var(--panel);border:1px solid var(--bd);border-left:3px solid;border-radius:10px;margin-bottom:9px;padding:11px 12px;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent;color:inherit;box-shadow:var(--shadow)}
    .card:active{opacity:.75}
    .ci{font-size:22px;flex-shrink:0;width:32px;text-align:center}
    .cb{flex:1;min-width:0;overflow:hidden}
    .ct{font-size:13px;font-weight:700;color:var(--txt);line-height:1.3;margin-bottom:2px}
    .cs{font-size:11px;color:var(--dim);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
    .ctags{display:flex;gap:3px;flex-wrap:wrap}
    .tag{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.5px;text-transform:uppercase;padding:1px 5px;border-radius:3px;font-weight:700}
    .ca{color:var(--dim);font-size:18px;flex-shrink:0}

    .ac-teal{border-left-color:var(--teal)} .ac-gold{border-left-color:var(--gold)}
    .ac-red{border-left-color:var(--red)}   .ac-orange{border-left-color:var(--orange)}
    .ac-purple{border-left-color:var(--purple)} .ac-sky{border-left-color:var(--sky)}
    .ac-green{border-left-color:var(--green)} .ac-pink{border-left-color:var(--pink)}
    .ac-lime{border-left-color:var(--lime)}

    .tv{background:rgba(240,96,96,.15);color:#ff9090}
    .tb{background:rgba(240,144,64,.15);color:#ffb070}
    .tp{background:rgba(160,112,255,.15);color:#c090ff}
    .te-c{background:rgba(72,206,255,.15);color:#80d8ff}
    .tk{background:rgba(240,96,96,.2);color:#ff8080}
    .tw{background:rgba(18,200,208,.12);color:var(--teal)}

    #nores{display:none;text-align:center;padding:60px 20px;color:var(--dim)}
    #nores.show{display:block}

    #det{position:fixed;inset:0;z-index:99;background:var(--bg);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
    #det.open{transform:translateX(0)}
    #dh{background:var(--panel);border-bottom:2px solid var(--teal);padding:12px 14px 10px;flex-shrink:0}
    #back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--teal);font-size:13px;font-weight:700;cursor:pointer;padding:0;margin-bottom:8px;font-family:'IBM Plex Sans',sans-serif}
    #dico{font-size:26px;margin-bottom:3px}
    #dtit{font-size:16px;font-weight:700;line-height:1.3;color:var(--txt)}
    #dsub{font-size:10px;color:var(--dim);margin-top:2px;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}
    #dbdg{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
    .dbadge{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;border-radius:4px;padding:2px 7px;font-weight:700}
    #dscr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px}

    .or{display:flex;align-items:baseline;gap:6px;background:var(--p2);border-radius:6px;padding:6px 9px;margin-bottom:8px;flex-wrap:wrap}
    .ok{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
    .ov{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--green)}
    .eb{background:rgba(18,200,208,.05);border:1px solid rgba(18,200,208,.14);border-radius:6px;padding:9px 11px;margin-bottom:8px}
    .eh{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--teal);text-transform:uppercase;margin-bottom:5px}
    .pb{border-left:2px solid;border-radius:0 6px 6px 0;padding:8px 10px;margin-bottom:8px}
    .pb.lo{border-color:#4080ff;background:rgba(64,128,255,.05)}
    .pb.hi{border-color:var(--red);background:rgba(240,96,96,.05)}
    .pb.sweep{border-color:var(--orange);background:rgba(240,144,64,.05)}
    .pb.wn{border-color:var(--gold);background:rgba(232,184,36,.05)}
    .pb.ti{border-color:var(--teal);background:rgba(18,200,208,.07)}
    .pl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
    .pb.lo .pl{color:#6090ff} .pb.hi .pl{color:var(--red)}
    .pb.sweep .pl{color:var(--orange)} .pb.wn .pl{color:var(--gold)}
    .pb.ti .pl{color:var(--teal)}
    .ps{font-size:11.5px;color:var(--mid);margin-bottom:6px;font-style:italic;line-height:1.55}
    .rx{list-style:none;display:flex;flex-direction:column;gap:4px;padding-left:0}
    .rx li{display:flex;align-items:baseline;gap:5px;font-size:12px;line-height:1.55}
    .rx li::before{content:"→";color:var(--teal);font-family:monospace;font-size:11px;flex-shrink:0}
    .dose{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--gold);background:rgba(232,184,36,.08);border-radius:4px;padding:1px 5px;margin-left:2px;white-space:nowrap}
    .nt{font-size:10px;color:var(--dim);display:block;margin-left:14px;font-style:italic;margin-top:1px}
    .sl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--teal);text-transform:uppercase;border-bottom:1px solid rgba(24,48,90,.5);padding-bottom:3px;margin:10px 0 6px}
    .iw{background:#1c1000;border:1px solid #a05010;border-radius:6px;padding:7px 10px;font-size:12px;color:#ffc840;margin-bottom:8px}
    .ib{background:#160000;border:1px solid #901820;border-radius:6px;padding:7px 10px;font-size:12px;color:#ffb0b0;margin-bottom:8px}
    .it{background:rgba(18,200,208,.07);border:1px solid rgba(18,200,208,.25);border-radius:6px;padding:7px 10px;font-size:12px;color:#55ddd5;margin-bottom:8px}
    .bh{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:inline-block;margin-right:4px}
    .iw .bh{color:var(--gold)} .ib .bh{color:var(--red)} .it .bh{color:var(--teal)}
    .sc{background:rgba(232,184,36,.06);border:1px solid rgba(232,184,36,.2);border-radius:6px;padding:7px 9px;margin-bottom:8px}
    .sc .zh{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-bottom:5px}
    .sr{display:flex;align-items:baseline;gap:6px;font-size:12px;line-height:1.7}
    .sz{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);white-space:nowrap;min-width:65px}

    @media (min-width:768px){
      #list{padding:14px 18px 100px}
      .card{padding:14px}
      #dscr{padding:18px 18px 96px}
    }
  </style>
</head>
<body class="en">

  <div id="bar">
    <div class="bar-r1">
      <div class="logo">SHRIMP<span> / AQUA GUIDE</span></div>
      <div class="lpills" aria-label="Language switcher">
        <button class="lbtn on" data-l="en" type="button">EN</button>
        <button class="lbtn" data-l="bn" type="button">বাংলা</button>
        <button class="lbtn" data-l="te" type="button">తె</button>
      </div>
    </div>
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input id="srch" type="search" placeholder="Search problems…" autocomplete="off">
    </div>
  </div>

  <div id="tabs">
    <button class="tbtn on" data-tab="wq" type="button">💧 Water Quality <span class="tc" id="wqCount">0</span></button>
    <button class="tbtn dis" data-tab="dis" type="button">🦠 Diseases <span class="tc" id="disCount">0</span></button>
  </div>

  <main id="list"></main>

  <div id="det" aria-hidden="true">
    <div id="dh">
      <button id="back" type="button">← Back</button>
      <div id="dico"></div>
      <div id="dtit"></div>
      <div id="dsub"></div>
      <div id="dbdg"></div>
    </div>
    <div id="dscr">
      <div id="den" class="en"></div>
      <div id="dbn" class="bn"></div>
      <div id="dte" class="te"></div>
    </div>
  </div>

  <script>
    const CARDS = {
      wq: [
        {
          id:'do', icon:'💨', ac:'ac-teal',
          tags:[{c:'tw',t:'Water Quality'},{c:'tk',t:'Most Critical'}],
          ten:'Dissolved Oxygen (DO)', tbn:'দ্রবীভূত অক্সিজেন (DO)', tte:'కరిగిన ఆక్సిజన్ (DO)',
          sen:'Dawn 2–6 AM kill window · Bottom crisis first',
          sbn:'ভোর ২–৬টা বিপদজনক · তলায় সংকট আগে',
          ste:'తెల్లవారు 2–6 AM ప్రమాదం · నేల వద్ద ముందు',
          en:`<div class="or"><span class="ok">Target</span><span class="ov">≥5 mg/L day · ≥4 dawn · &gt;3 minimum</span></div>
<div class="eb"><div class="eh">Why Bottom Crisis Hits First</div>Shrimp live near the pond floor where DO drops first. At DO&lt;3 mg/L shrimp cannot extract oxygen — they surface-gasp. Gill damage and Vibrio invasion follow within hours.</div>
<div class="pb lo"><div class="pl">⬇ Low DO (&lt;4 mg/L) — Emergency</div>
<div class="ps">Shrimp crowd edges and surface at 2–5 AM. Feed tray empty next morning.</div>
<ul class="rx">
  <li>Run ALL aerators immediately<span class="nt">Dawn 2–6 AM is peak danger. Night watchman must check DO at 3 AM.</span></li>
  <li>Emergency water exchange from clean reservoir <span class="dose">20–30%</span></li>
  <li>Stop feeding until DO stable ≥5 mg/L for 2+ hours</li>
  <li>CaO (quicklime) <span class="dose">8–12 kg/acre</span></li>
  <li>Zeolite — absorb ammonia spike <span class="dose">15–20 kg/acre</span></li>
  <li>Remove dead shrimp immediately</li>
</ul></div>
<div class="pb hi"><div class="pl">⬆ Supersaturation (&gt;12 mg/L) — Gas Bubble</div>
<ul class="rx">
  <li>Partial water exchange <span class="dose">15–20%</span></li>
  <li>Stop fertiliser. Cut feeding 50%.</li>
</ul></div>
<div class="iw"><span class="bh">⚠ DO–Algae Crash</span>Dense bloom → DO 12+ at 2 PM → crash to 1–2 by 4 AM. Monitor Secchi daily. &lt;25 cm = crash within 24–48 hrs.</div>`,
          bn:`<div class="or"><span class="ok">লক্ষ্যমাত্রা</span><span class="ov">≥৫ মি.গ্রা/লি (দিনে) · ≥৪ (ভোরে) · ন্যূনতম &gt;৩</span></div>
<div class="eb"><div class="eh">চিংড়ি কেন তলায় আগে কষ্ট পায়</div>চিংড়ি পুকুরের তলায় বাস করে — সেখানে DO সর্বদা কম। DO &lt;৩-এ ফুলকা দিয়ে O₂ নেওয়া যায় না। ঘণ্টার মধ্যে ফুলকার ক্ষতি, ভিব্রিও সংক্রমণ।</div>
<div class="pb lo"><div class="pl">⬇ কম DO (&lt;৪) — জরুরি পদক্ষেপ</div>
<ul class="rx">
  <li>সব এয়ারেটর তক্ষুনি চালু করুন<span class="nt">ভোর ২–৬টা সর্বাধিক বিপজ্জনক। রাতের পাহারাদার ভোর ৩টায় DO মাপবে।</span></li>
  <li>পরিষ্কার ভান্ডার থেকে জরুরি পানি বদল <span class="dose">২০–৩০%</span></li>
  <li>DO ≥৫ না হওয়া পর্যন্ত খাওয়ানো বন্ধ</li>
  <li>CaO (পোড়া চুন) <span class="dose">৮–১২ কেজি/একর</span></li>
  <li>জিওলাইট <span class="dose">১৫–২০ কেজি/একর</span></li>
  <li>মরা চিংড়ি দ্রুত সরান</li>
</ul></div>
<div class="iw"><span class="bh">⚠ শেওলা-অক্সিজেন চক্র</span>ঘন শেওলা → বিকেলে DO ১২+ → ভোর ৪টায় DO ১–২। সেচি &lt;২৫ সেমি = ২৪–৪৮ ঘণ্টায় ক্র্যাশ।</div>`,
          te:`<div class="or"><span class="ok">లక్ష్యం</span><span class="ov">≥5 mg/L పగటి · ≥4 తెల్లవారు · కనిష్టం &gt;3</span></div>
<div class="eb"><div class="eh">రొయ్యలు నేల వద్ద ఎందుకు ముందు కష్టపడతాయి</div>రొయ్యలు చెరువు నేలపై జీవిస్తాయి — DO అక్కడ ఎల్లప్పుడూ తక్కువ. DO &lt;3 వద్ద గిల్స్ O₂ తీసుకోలేవు. గంటల్లో నష్టం, విబ్రియో సంక్రమణ.</div>
<div class="pb lo"><div class="pl">⬇ తక్కువ DO (&lt;4) — అత్యవసరం</div>
<ul class="rx">
  <li>అన్ని ఏరేటర్లు వెంటనే ఆన్<span class="nt">తెల్లవారు 2–6 AM అత్యంత ప్రమాదకర. కాపలా 3 AM కి DO తనిఖీ చేయాలి.</span></li>
  <li>నిల్వ నీటి నుండి అత్యవసర నీటి మార్పు <span class="dose">20–30%</span></li>
  <li>DO ≥5 స్థిరంగా వచ్చేంత వరకు ఆహారం ఆపండి</li>
  <li>CaO <span class="dose">8–12 కి.గ్రా/ఎకరా</span></li>
  <li>జియోలైట్ <span class="dose">15–20 కి.గ్రా/ఎకరా</span></li>
  <li>చనిపోయిన రొయ్యలు వెంటనే తీసివేయండి</li>
</ul></div>
<div class="iw"><span class="bh">⚠ ఆల్గే-DO చక్రం</span>దట్టమైన ఆల్గే → మధ్యాహ్నం DO 12+ → తెల్లవారు 4 AM కి DO 1–2. సెక్కి &lt;25 సెం.మీ = 24–48 గంటల్లో క్రాష్.</div>`
        },
        {
          id:'ph', icon:'⚖️', ac:'ac-gold',
          tags:[{c:'tw',t:'Water Quality'},{c:'tw',t:'Ammonia Link'}],
          ten:'pH — Acid-Base Balance', tbn:'pH — অম্ল-ক্ষার ভারসাম্য', tte:'pH — ఆమ్ల-క్షార సమతుల్యత',
          sen:'NH₃ 10× more toxic at pH 9 · Swing ≤0.5/day',
          sbn:'pH ৯-এ NH₃ ১০× বিষাক্ত', ste:'pH 9 వద్ద NH₃ 10× విషపూరితం',
          en:`<div class="or"><span class="ok">Target</span><span class="ov">7.5–8.5 · AM 7.8 · PM 8.3 · Swing ≤0.5/day</span></div>
<div class="eb"><div class="eh">pH Management = Ammonia Management</div>At pH 7.5 only 0.3% of TAN is toxic NH₃. At pH 8.5 → 3%. At pH 9.0 → 15%. Every algae bloom pushes pH up while amplifying ammonia toxicity tenfold.</div>
<div class="pb lo"><div class="pl">⬇ Low pH (&lt;7.5) — Acid Pond</div>
<ul class="rx">
  <li>Agricultural lime Ca(OH)₂ <span class="dose">100–200 kg/acre</span><span class="nt">Apply at dusk. Check pH next morning.</span></li>
  <li>Dolomite CaMg(CO₃)₂ <span class="dose">100–200 kg/ha fortnightly</span></li>
  <li>CaO — dry pond inter-crop <span class="dose">300–400 kg/acre</span></li>
</ul></div>
<div class="pb hi"><div class="pl">⬆ High pH (&gt;9.0) — Algae Bloom</div>
<ul class="rx">
  <li>Alum Al₂(SO₄)₃ <span class="dose">5–10 kg/acre</span></li>
  <li>Gypsum CaSO₄ <span class="dose">50–75 kg/acre</span></li>
  <li>Partial water exchange <span class="dose">15–20%</span></li>
  <li>Probiotic <span class="dose">1 kg/acre</span></li>
</ul></div>
<div class="pb sweep"><div class="pl">↕ Wide Diurnal Swing (&gt;0.5 units)</div>
<ul class="rx">
  <li>Dolomite — raise buffering to 150–180 ppm <span class="dose">100–200 kg/ha fortnightly</span></li>
  <li>Water exchange <span class="dose">10–15% daily × 3–5 days</span></li>
</ul></div>`,

          en:`<div class="or"><span class="ok">Target</span><span class="ov">DOC 1–30: 100–120 · DOC 30–60: 120–150 · DOC 60–90: 150–200 ppm</span></div>
<div class="eb"><div class="eh">Why Alkalinity Must Rise Through the Crop</div>Alkalinity (HCO₃⁻, CO₃²⁻) resists pH change. Below 80 ppm, small CO₂ changes cause dramatic pH swings. Shrimp absorb calcium carbonate during moulting — directly consuming alkalinity.</div>
<div class="pb lo"><div class="pl">⬇ Low Alkalinity (&lt;80 ppm)</div>
