<!DOCTYPE html>

<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Shrimp Aqua Field Guide</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══ */
:root{
  --bg:#050e1a;--panel:#0d1f36;--panel2:#071230;
  --border:#18305a;
  --teal:#12c8d0;--gold:#e8b824;--red:#f06060;
  --orange:#f09040;--green:#44da88;--purple:#a070ff;
  --sky:#48ceff;--pink:#ff7ab0;--lime:#8ee030;
  --text:#ddeeff;--mid:#88aacc;--dim:#4a6890;
  --wb:#1c1000;--wbr:#a05010;--wt:#ffc840;
  --rb:#160000;--rbr:#901820;--rt:#ffb0b0;
  --tb:rgba(18,200,208,.08);--tbr:rgba(18,200,208,.28);--tt:#55ddd5;
}

/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
background:var(–bg);
color:var(–text);
font-family:‘IBM Plex Sans’,sans-serif;
font-size:14px;
line-height:1.5;
-webkit-font-smoothing:antialiased;
/* NO overflow:hidden on body — let the layout elements handle it */
}

/* ═══ LANGUAGE — driven by html[data-lang] ═══ */
.t-en,.t-bn,.t-te{display:none !important}
html[data-lang=“en”] .t-en{display:block !important}
html[data-lang=“bn”] .t-bn{display:block !important}
html[data-lang=“te”] .t-te{display:block !important}
.t-bn{font-family:‘Hind Siliguri’,sans-serif}
.t-te{font-family:‘Noto Sans Telugu’,sans-serif}

/* ═══ FIXED TOPBAR ═══ */
#topbar{
position:fixed;
top:0;left:0;right:0;
z-index:100;
background:var(–panel);
border-bottom:2px solid var(–teal);
padding:10px 14px 9px;
}
.tb-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.tb-logo{font-family:‘IBM Plex Mono’,monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:var(–teal);text-transform:uppercase}
.tb-logo span{color:var(–dim);font-weight:400}
.ls-pills{display:flex;background:var(–panel2);border:1px solid var(–border);border-radius:20px;padding:2px;gap:2px}
.ls-btn{
padding:4px 13px;border-radius:18px;border:none;background:transparent;
cursor:pointer;font-size:12.5px;font-weight:600;color:var(–dim);
transition:all .15s;line-height:1.4;font-family:‘IBM Plex Sans’,sans-serif;
}
.ls-btn.active{background:var(–teal);color:#000}
.ls-btn[data-l=“te”].active{background:var(–purple);color:#fff}
#search-box{
width:100%;background:var(–panel2);
border:1px solid var(–border);border-radius:8px;
padding:7px 12px 7px 34px;
color:var(–text);font-size:13px;font-family:‘IBM Plex Sans’,sans-serif;
outline:none;-webkit-appearance:none;
}
#search-box::placeholder{color:var(–dim)}
#search-box:focus{border-color:var(–teal)}
.s-wrap{position:relative}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

/* ═══ FIXED TABS ═══ */
#tabs{
position:fixed;
top:var(–topbar-h,108px);
left:0;right:0;
z-index:99;
display:flex;
background:var(–panel2);
border-bottom:1px solid var(–border);
}
.tab-btn{
flex:1;padding:10px 4px;border:none;background:transparent;
color:var(–dim);font-size:12px;font-weight:600;cursor:pointer;
display:flex;align-items:center;justify-content:center;gap:5px;
letter-spacing:.3px;position:relative;
font-family:‘IBM Plex Sans’,sans-serif;
}
.tab-btn.active{color:var(–teal)}
.tab-btn.active::after{content:’’;position:absolute;bottom:0;left:10%;right:10%;height:2px;background:var(–teal);border-radius:2px}
.tab-btn.dis.active{color:var(–red)}
.tab-btn.dis.active::after{background:var(–red)}
.tc{font-family:‘IBM Plex Mono’,monospace;font-size:9px;background:rgba(255,255,255,.08);border-radius:8px;padding:1px 6px}
.tab-btn.active .tc{background:rgba(18,200,208,.2);color:var(–teal)}
.tab-btn.dis.active .tc{background:rgba(240,96,96,.2);color:var(–red)}

/* ═══ SCROLLABLE CONTENT ═══ */
#scroll-area{
/* pushed down below fixed topbar + tabs */
padding-top:152px; /* topbar ~108px + tabs ~44px */
padding-left:12px;
padding-right:12px;
padding-bottom:80px;
min-height:100vh;
}

/* ═══ CARD LIST ═══ */
#card-list{
display:block;
width:100%;
}

.pcard{
display:flex;
align-items:center;
gap:10px;
width:100%;
background:var(–panel);
border:1px solid var(–border);
border-left-width:3px;
border-radius:10px;
margin-bottom:9px;
padding:11px 12px;
cursor:pointer;
text-align:left;
-webkit-tap-highlight-color:transparent;
}
.pcard:active{opacity:.75}

/* card accent colours — border-left-color */
.c-teal{border-left-color:var(–teal)}
.c-gold{border-left-color:var(–gold)}
.c-red{border-left-color:var(–red)}
.c-orange{border-left-color:var(–orange)}
.c-purple{border-left-color:var(–purple)}
.c-sky{border-left-color:var(–sky)}
.c-green{border-left-color:var(–green)}
.c-pink{border-left-color:var(–pink)}
.c-lime{border-left-color:var(–lime)}

.pc-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center}
.pc-body{flex:1;min-width:0;overflow:hidden}
.pc-title{font-size:13px;font-weight:700;color:var(–text);line-height:1.3;margin-bottom:2px}
.pc-sub{font-size:11px;color:var(–dim);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pc-tags{display:flex;gap:3px;flex-wrap:wrap}
.pc-tag{font-family:‘IBM Plex Mono’,monospace;font-size:8px;letter-spacing:.5px;text-transform:uppercase;padding:1px 5px;border-radius:3px;font-weight:700}
.pc-arr{color:var(–dim);font-size:18px;flex-shrink:0;line-height:1}

.tag-viral{background:rgba(240,96,96,.15);color:#ff9090}
.tag-bact{background:rgba(240,144,64,.15);color:#ffb070}
.tag-para{background:rgba(160,112,255,.15);color:#c090ff}
.tag-enviro{background:rgba(72,206,255,.15);color:#80d8ff}
.tag-crit{background:rgba(240,96,96,.2);color:#ff8080}
.tag-wq{background:rgba(18,200,208,.12);color:var(–teal)}

#empty-msg{display:none;text-align:center;padding:60px 20px;color:var(–dim);font-size:13px}
#empty-msg.show{display:block}

/* ═══ DETAIL SLIDE PANEL ═══ */
#detail{
position:fixed;
top:0;left:0;right:0;bottom:0;
z-index:200;
background:var(–bg);
transform:translateX(100%);
transition:transform .28s cubic-bezier(.4,0,.2,1);
display:flex;
flex-direction:column;
overflow:hidden;
}
#detail.open{transform:translateX(0)}

#dhead{
flex-shrink:0;
background:var(–panel);
border-bottom:2px solid var(–teal);
padding:12px 14px 10px;
}
#back-btn{
display:flex;align-items:center;gap:6px;
background:none;border:none;
color:var(–teal);font-size:13px;font-weight:600;
cursor:pointer;padding:0;margin-bottom:8px;
font-family:‘IBM Plex Sans’,sans-serif;
}
#d-icon{font-size:26px;margin-bottom:3px}
#d-title{font-size:16px;font-weight:700;line-height:1.3;color:var(–text)}
#d-sub{font-size:10px;color:var(–dim);margin-top:2px;font-family:‘IBM Plex Mono’,monospace;letter-spacing:.5px}
#d-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.dbadge{font-family:‘IBM Plex Mono’,monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;border-radius:4px;padding:2px 7px;font-weight:700}

#dscroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px}

/* ═══ DETAIL CONTENT ═══ */
.opt-row{display:flex;align-items:baseline;gap:6px;background:var(–panel2);border-radius:6px;padding:6px 9px;margin-bottom:8px;flex-wrap:wrap}
.opt-key{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:var(–dim);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.opt-val{font-family:‘IBM Plex Mono’,monospace;font-size:11px;font-weight:700;color:var(–green)}
.elab-block{background:rgba(18,200,208,.05);border:1px solid rgba(18,200,208,.14);border-radius:6px;padding:9px 11px;margin-bottom:8px}
.elab-head{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:1.5px;color:var(–teal);text-transform:uppercase;margin-bottom:5px}
.pr-block{border-left:2px solid;border-radius:0 6px 6px 0;padding:8px 10px;margin-bottom:8px}
.pr-block.p-lo{border-color:#4080ff;background:rgba(64,128,255,.05)}
.pr-block.p-hi{border-color:var(–red);background:rgba(240,96,96,.05)}
.pr-block.p-sw{border-color:var(–orange);background:rgba(240,144,64,.05)}
.pr-block.p-wn{border-color:var(–gold);background:rgba(232,184,36,.05)}
.pr-block.p-ti{border-color:var(–teal);background:var(–tb)}
.pr-label{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.pr-block.p-lo .pr-label{color:#6090ff}
.pr-block.p-hi .pr-label{color:var(–red)}
.pr-block.p-sw .pr-label{color:var(–orange)}
.pr-block.p-wn .pr-label{color:var(–gold)}
.pr-block.p-ti .pr-label{color:var(–teal)}
.pr-symptoms{font-size:11.5px;color:var(–mid);margin-bottom:6px;font-style:italic;line-height:1.55}
.rx{list-style:none;display:flex;flex-direction:column;gap:4px}
.rx li{display:flex;align-items:baseline;gap:5px;font-size:12px;line-height:1.55}
.rx li::before{content:“→”;color:var(–teal);font-family:monospace;font-size:11px;flex-shrink:0}
.dose{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:var(–gold);background:rgba(232,184,36,.08);border-radius:4px;padding:1px 5px;margin-left:2px;white-space:nowrap}
.nt{font-size:10px;color:var(–dim);display:block;margin-left:14px;font-style:italic;margin-top:1px}
.step-label{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:2px;color:var(–teal);text-transform:uppercase;border-bottom:1px solid rgba(24,48,90,.5);padding-bottom:3px;margin:10px 0 6px}
.inl-w{background:var(–wb);border:1px solid var(–wbr);border-radius:6px;padding:7px 10px;font-size:12px;color:var(–wt);margin-bottom:8px}
.inl-b{background:var(–rb);border:1px solid var(–rbr);border-radius:6px;padding:7px 10px;font-size:12px;color:var(–rt);margin-bottom:8px}
.inl-t{background:var(–tb);border:1px solid var(–tbr);border-radius:6px;padding:7px 10px;font-size:12px;color:var(–tt);margin-bottom:8px}
.bxh{font-family:‘IBM Plex Mono’,monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:inline-block;margin-right:4px}
.inl-w .bxh{color:var(–gold)}.inl-b .bxh{color:var(–red)}.inl-t .bxh{color:var(–teal)}
.sal-callout{background:rgba(232,184,36,.06);border:1px solid rgba(232,184,36,.2);border-radius:6px;padding:7px 9px;margin-bottom:8px}
.sal-callout .zh{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:1.5px;color:var(–gold);text-transform:uppercase;margin-bottom:5px}
.sal-row{display:flex;align-items:baseline;gap:6px;font-size:12px;line-height:1.7}
.sal-zone{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:var(–gold);white-space:nowrap;min-width:65px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.econ{background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.25);border-radius:6px;padding:6px 9px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.econ-n{font-family:‘IBM Plex Mono’,monospace;font-size:16px;font-weight:700;color:var(–red)}
.econ-l{font-size:10px;color:var(–mid)}
.symp-h{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:2px;color:var(–dim);text-transform:uppercase;margin-bottom:4px;display:block}
.symp-t{font-size:12px;color:var(–mid);line-height:1.6;margin-bottom:8px}
.cause{font-size:12px;color:var(–mid);line-height:1.6;margin-bottom:8px}
.cause strong{color:var(–text)}
</style>

</head>
<body>

<!-- TOPBAR -->

<div id="topbar">
  <div class="tb-row">
    <div class="tb-logo">SHRIMP<span> / AQUA GUIDE</span></div>
    <div class="ls-pills">
      <button class="ls-btn active" data-l="en">EN</button>
      <button class="ls-btn" data-l="bn">বাংলা</button>
      <button class="ls-btn" data-l="te">తె</button>
    </div>
  </div>
  <div class="s-wrap">
    <span class="s-icon">🔍</span>
    <input id="search-box" type="search" placeholder="Search problems…" autocomplete="off" autocorrect="off">
  </div>
</div>

<!-- TABS -->

<div id="tabs">
  <button class="tab-btn active" data-tab="wq">💧 Water Quality <span class="tc">10</span></button>
  <button class="tab-btn dis" data-tab="dis">🦠 Diseases <span class="tc">8</span></button>
</div>

<!-- MAIN SCROLL AREA -->

<div id="scroll-area">
  <div id="card-list">
    <!-- cards injected by JS -->
  </div>
  <div id="empty-msg">🔎 No results</div>
</div>

<!-- DETAIL PANEL -->

<div id="detail">
  <div id="dhead">
    <button id="back-btn">← Back</button>
    <div id="d-icon"></div>
    <div id="d-title"></div>
    <div id="d-sub"></div>
    <div id="d-badges"></div>
  </div>
  <div id="dscroll">
    <div id="den" class="t-en"></div>
    <div id="dbn" class="t-bn"></div>
    <div id="dte" class="t-te"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// CARD DATA — 18 cards × EN / BN / TE
// ═══════════════════════════════════════════════
const C = {
wq:[
{id:"do",icon:"💨",color:"c-teal",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-crit",t:"Most Critical"}],
 title:{en:"Dissolved Oxygen (DO)",bn:"দ্রবীভূত অক্সিজেন (DO)",te:"కరిగిన ఆక్సిజన్ (DO)"},
 sub:{en:"Dawn 2–6 AM kill window · Bottom crisis first",bn:"ভোর ২–৬টা বিপদজনক · তলায় সংকট আগে",te:"తెల్లవారు 2–6 AM ప్రమాదం · నేల వద్ద ముందు సంక్షోభం"},
 en:`<div class="opt-row"><span class="opt-key">Target</span><span class="opt-val">≥5 mg/L day · ≥4 mg/L dawn · &gt;3 mg/L min</span></div><div class="elab-block"><div class="elab-head">Why Bottom Crisis Hits First</div>Shrimp live and feed at the pond floor — DO is always lowest there. Surface DO 5 mg/L can mean only 2–3 at the bottom. At DO&lt;3, shrimp cannot extract O₂ across gill membranes — they surface-gasp. Within hours: gill damage, immune collapse, Vibrio invasion. DO crashes kill in hours, not days.</div><div class="pr-block p-lo"><div class="pr-label">⬇ Low DO (&lt;4 mg/L) — Emergency</div><div class="pr-symptoms">Shrimp crowd edges &amp; surface at 2–5 AM. Feed tray empty next morning. Onset after algae crash or overcast night.</div><ul class="rx"><li>Run ALL aerators immediately — do not wait for daylight<span class="nt">Dawn 2–6 AM is peak danger. Night watchman must check DO at 3 AM, not 6 AM.</span></li><li>Emergency water exchange from clean reservoir <span class="dose">20–30%</span></li><li>Stop feeding until DO stable ≥5 mg/L for 2+ hours</li><li>CaO (quicklime) <span class="dose">8–12 kg/acre</span></li><li>Zeolite — absorb ammonia spike <span class="dose">15–20 kg/acre</span></li><li>Remove dead shrimp immediately</li></ul></div><div class="pr-block p-hi"><div class="pr-label">⬆ Supersaturation (&gt;12 mg/L) — Gas Bubble</div><ul class="rx"><li>Partial water exchange <span class="dose">15–20%</span></li><li>Stop fertiliser. Cut feeding 50%.</li></ul></div><div class="inl-w"><span class="bxh">⚠ DO–Algae Crash Cycle</span>Dense bloom → DO 12+ at 2 PM → crash to 1–2 by 4 AM. Monitor Secchi daily. &lt;25 cm = crash within 24–48 hrs.</div>`,
 bn:`<div class="opt-row"><span class="opt-key">লক্ষ্যমাত্রা</span><span class="opt-val">≥৫ মি.গ্রা/লি (দিনে) · ≥৪ (ভোরে) · ন্যূনতম &gt;৩</span></div><div class="elab-block"><div class="elab-head">চিংড়ি কেন তলায় আগে কষ্ট পায়</div>চিংড়ি পুকুরের তলায় বাস করে — সেখানে DO সর্বদা কম। উপরে ৫ মানে তলায় ২–৩। DO &lt;৩-এ ফুলকা দিয়ে O₂ নেওয়া যায় না। ঘণ্টার মধ্যে ফুলকার ক্ষতি, ভিব্রিও সংক্রমণ।</div><div class="pr-block p-lo"><div class="pr-label">⬇ কম DO (&lt;৪) — জরুরি পদক্ষেপ</div><ul class="rx"><li>সব এয়ারেটর তক্ষুনি চালু করুন<span class="nt">ভোর ২–৬টা সর্বাধিক বিপজ্জনক। রাতের পাহারাদার ভোর ৩টায় DO মাপবে।</span></li><li>পরিষ্কার ভান্ডার থেকে জরুরি পানি বদল <span class="dose">২০–৩০%</span></li><li>DO ≥৫ না হওয়া পর্যন্ত খাওয়ানো বন্ধ</li><li>CaO (পোড়া চুন) <span class="dose">৮–১২ কেজি/একর</span></li><li>জিওলাইট <span class="dose">১৫–২০ কেজি/একর</span></li><li>মরা চিংড়ি দ্রুত সরান</li></ul></div><div class="inl-w"><span class="bxh">⚠ শেওলা-অক্সিজেন চক্র</span>ঘন শেওলা → বিকেলে DO ১২+ → ভোর ৪টায় DO ১–২। সেচি &lt;২৫ সেমি = ২৪–৪৮ ঘণ্টায় ক্র্যাশ।</div>`,
 te:`<div class="opt-row"><span class="opt-key">లక్ష్యం</span><span class="opt-val">≥5 mg/L పగటి · ≥4 తెల్లవారు · కనిష్టం &gt;3</span></div><div class="elab-block"><div class="elab-head">రొయ్యలు నేల వద్ద ఎందుకు ముందు కష్టపడతాయి</div>రొయ్యలు చెరువు నేలపై జీవిస్తాయి — DO అక్కడ ఎల్లప్పుడూ తక్కువ. DO &lt;3 వద్ద గిల్స్ O₂ తీసుకోలేవు. గంటల్లో నష్టం, విబ్రియో సంక్రమణ.</div><div class="pr-block p-lo"><div class="pr-label">⬇ తక్కువ DO (&lt;4) — అత్యవసరం</div><ul class="rx"><li>అన్ని ఏరేటర్లు వెంటనే ఆన్<span class="nt">తెల్లవారు 2–6 AM అత్యంత ప్రమాదకర. కాపలా 3 AM కి DO తనిఖీ చేయాలి.</span></li><li>నిల్వ నీటి నుండి అత్యవసర నీటి మార్పు <span class="dose">20–30%</span></li><li>DO ≥5 స్థిరంగా వచ్చేంత వరకు ఆహారం ఆపండి</li><li>CaO (కాచిన సున్నం) <span class="dose">8–12 కి.గ్రా/ఎకరా</span></li><li>జియోలైట్ <span class="dose">15–20 కి.గ్రా/ఎకరా</span></li><li>చనిపోయిన రొయ్యలు వెంటనే తీసివేయండి</li></ul></div><div class="inl-w"><span class="bxh">⚠ ఆల్గే-DO చక్రం</span>దట్టమైన ఆల్గే → మధ్యాహ్నం DO 12+ → తెల్లవారు 4 AM కి DO 1–2. సెక్కి &lt;25 సెం.మీ = 24–48 గంటల్లో క్రాష్.</div>`
},
{id:"ph",icon:"⚖️",color:"c-gold",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-wq",t:"Ammonia Link"}],
 title:{en:"pH — Acid-Base Balance",bn:"pH — অম্ল-ক্ষার ভারসাম্য",te:"pH — ఆమ్ల-క్షార సమతుల్యత"},
 sub:{en:"NH₃ 10× more toxic at pH 9 · Swing ≤0.5/day",bn:"pH ৯-এ NH₃ ১০× বিষাক্ত",te:"pH 9 వద్ద NH₃ 10× విషపూరితం"},
 en:`<div class="opt-row"><span class="opt-key">Target</span><span class="opt-val">7.5–8.5 · AM 7.8 · PM 8.3 · Swing ≤0.5/day</span></div><div class="elab-block"><div class="elab-head">pH Management = Ammonia Management</div>At pH 7.5: only 0.3% of TAN is toxic NH₃. At pH 8.5 → 3%. At pH 9.0 → 15%. Every algae bloom pushes pH up as CO₂ is consumed — simultaneously amplifying ammonia toxicity tenfold. Acid sulfate soils in coastal AP and Bengal delta make low pH a constant challenge.</div><div class="pr-block p-lo"><div class="pr-label">⬇ Low pH (&lt;7.5) — Acid Pond</div><ul class="rx"><li>Agricultural lime Ca(OH)₂ — fastest <span class="dose">100–200 kg/acre</span><span class="nt">Apply at dusk. Check pH next morning. Raises 0.5–1.0 per application.</span></li><li>Dolomite CaMg(CO₃)₂ — sustained buffering <span class="dose">100–200 kg/ha fortnightly</span></li><li>CaO — dry pond inter-crop treatment <span class="dose">300–400 kg/acre</span></li></ul></div><div class="pr-block p-hi"><div class="pr-label">⬆ High pH (&gt;9.0) — Algae Bloom</div><ul class="rx"><li>Alum Al₂(SO₄)₃ <span class="dose">5–10 kg/acre</span></li><li>Gypsum CaSO₄ <span class="dose">50–75 kg/acre</span></li><li>Partial water exchange <span class="dose">15–20%</span></li><li>Probiotic <span class="dose">1 kg/acre</span></li></ul></div><div class="pr-block p-sw"><div class="pr-label">↕ Wide Diurnal Swing (&gt;0.5 units)</div><ul class="rx"><li>Dolomite — raise buffering to 150–180 ppm <span class="dose">100–200 kg/ha fortnightly</span></li><li>Water exchange <span class="dose">10–15% daily × 3–5 days</span></li></ul></div>`,
 bn:`<div class="opt-row"><span class="opt-key">লক্ষ্যমাত্রা</span><span class="opt-val">৭.৫–৮.৫ · ভোরে ৭.৮ · বিকেলে ৮.৩</span></div><div class="elab-block"><div class="elab-head">pH ব্যবস্থাপনা = অ্যামোনিয়া ব্যবস্থাপনা</div>pH ৭.৫-এ TAN-এর মাত্র ০.৩% বিষাক্ত NH₃। pH ৮.৫-এ → ৩%। pH ৯.০-এ → ১৫%। শেওলার ব্লুম CO₂ গ্রহণ করে pH বাড়ায় — অ্যামোনিয়া বিষাক্ততা দশগুণ বাড়ে।</div><div class="pr-block p-lo"><div class="pr-label">⬇ কম pH (&lt;৭.৫)</div><ul class="rx"><li>কৃষি চুন Ca(OH)₂ <span class="dose">১০০–২০০ কেজি/একর</span><span class="nt">সন্ধ্যায় দিন। পরের দিন pH মাপুন।</span></li><li>ডলোমাইট <span class="dose">১০০–২০০ কেজি/হেক্টর পক্ষকালে</span></li><li>CaO — শুকনো পুকুরে <span class="dose">৩০০–৪০০ কেজি/একর</span></li></ul></div><div class="pr-block p-hi"><div class="pr-label">⬆ বেশি pH (&gt;৯.০)</div><ul class="rx"><li>ফিটকিরি Al₂(SO₄)₃ <span class="dose">৫–১০ কেজি/একর</span></li><li>জিপসাম CaSO₄ <span class="dose">৫০–৭৫ কেজি/একর</span></li><li>আংশিক পানি বদল <span class="dose">১৫–২০%</span></li><li>প্রোবায়োটিক <span class="dose">১ কেজি/একর</span></li></ul></div>`,
 te:`<div class="opt-row"><span class="opt-key">లక్ష్యం</span><span class="opt-val">7.5–8.5 · తెల్లవారు 7.8 · మధ్యాహ్నం 8.3</span></div><div class="elab-block"><div class="elab-head">pH నిర్వహణ = అమోనియా నిర్వహణ</div>pH 7.5 వద్ద TAN లో 0.3% మాత్రమే NH₃. pH 8.5 వద్ద → 3%. pH 9.0 వద్ద → 15%. ఆల్గే బ్లూమ్ CO₂ వినియోగిస్తూ pH పెంచుతుంది — అమోనియా విషపూరితత పదిరెట్లు పెరుగుతుంది.</div><div class="pr-block p-lo"><div class="pr-label">⬇ తక్కువ pH (&lt;7.5)</div><ul class="rx"><li>వ్యవసాయ సున్నం Ca(OH)₂ <span class="dose">100–200 కి.గ్రా/ఎకరా</span><span class="nt">సాయంత్రం వేయండి. మరుసటి రోజు pH తనిఖీ చేయండి.</span></li><li>డోలమైట్ <span class="dose">100–200 కి.గ్రా/హెక్టార్ పక్షానికోసారి</span></li><li>CaO — శుష్క చెరువు <span class="dose">300–400 కి.గ్రా/ఎకరా</span></li></ul></div><div class="pr-block p-hi"><div class="pr-label">⬆ అధిక pH (&gt;9.0)</div><ul class="rx"><li>అలం Al₂(SO₄)₃ <span class="dose">5–10 కి.గ్రా/ఎకరా</span></li><li>జిప్సం CaSO₄ <span class="dose">50–75 కి.గ్రా/ఎకరా</span></li><li>పాక్షిక నీటి మార్పు <span class="dose">15–20%</span></li><li>ప్రొబయోటిక్ <span class="dose">1 కి.గ్రా/ఎకరా</span></li></ul></div>`
},
{id:"ammonia",icon:"☠️",color:"c-red",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-crit",t:"pH Amplified"}],
 title:{en:"Ammonia (TAN / NH₃)",bn:"অ্যামোনিয়া (TAN / NH₃)",te:"అమోనియా (TAN / NH₃)"},
 sub:{en:"10× more toxic at pH 9 · Gill damage → Vibrio gateway",bn:"pH ৯-এ ১০× বিষাক্ত",te:"pH 9 వద్ద 10× విషపూరితం"},
 en:`<div class="opt-row"><span class="opt-key">Target</span><span class="opt-val">TAN ≤0.1 mg/L · UN-ionised NH₃ &lt;0.01 mg/L</span></div><div class="elab-block"><div class="elab-head">Two Forms — One Harmless, One Lethal</div>Ammonia exists as NH₄⁺ (harmless) and NH₃ (toxic). As pH and temperature rise, more shifts to toxic NH₃. At pH 9.0 and 32°C, up to 20% of TAN is NH₃. NH₃ passes freely through gill membranes causing necrosis, O₂ carrying reduction, immune collapse — opening the door to Vibrio septicaemia.</div><div class="pr-block p-hi"><div class="pr-label">Elevated TAN (&gt;0.1 mg/L)</div><div class="pr-symptoms">Reduced feeding (first sign). Gill reddening. Sluggish at edges. Increased bacterial infection.</div><ul class="rx"><li>Stop feeding — cut primary nitrogen input immediately</li><li>Water exchange <span class="dose">15–25%</span></li><li>Zeolite (clinoptilolite) <span class="dose">15–20 kg/acre</span><span class="nt">Most effective at &lt;5 ppt. Drops above 15 ppt due to Na⁺ competition.</span></li><li>Molasses — C:N for heterotrophic bacteria <span class="dose">5–10 kg/acre dissolved</span></li><li>Probiotics (Bacillus) <span class="dose">1 kg/acre</span></li><li>Maintain pH 7.5–8.0 — keeps toxic NH₃ fraction low</li></ul></div><div class="inl-w"><span class="bxh">⚠ pH Multiplier</span>At pH 8.5 &amp; 30°C → ~5% TAN is NH₃. At pH 9.0 → ~15%. Any algae bloom pH spike converts moderate TAN into an immediate lethal crisis.</div>`,
 bn:`<div class="opt-row"><span class="opt-key">লক্ষ্যমাত্রা</span><span class="opt-val">TAN ≤০.১ মি.গ্রা/লি · NH₃ &lt;০.০১</span></div><div class="elab-block"><div class="elab-head">দুই রূপ — একটি নিরীহ, একটি মারণ</div>NH₄⁺ (নিরীহ) ও NH₃ (বিষাক্ত)। pH ও তাপমাত্রা বাড়লে বেশি NH₃ হয়। pH ৯.০ ও ৩২°C-এ TAN-এর ২০% পর্যন্ত NH₃। NH₃ ফুলকা দিয়ে ক্ষতি করে ও ভিব্রিও সেপটিসেমিয়ার পথ খোলে।</div><div class="pr-block p-hi"><div class="pr-label">উচ্চ TAN (&gt;০.১)</div><ul class="rx"><li>খাওয়ানো বন্ধ করুন</li><li>পানি বদল <span class="dose">১৫–২৫%</span></li><li>জিওলাইট <span class="dose">১৫–২০ কেজি/একর</span></li><li>গুড় <span class="dose">৫–১০ কেজি/একর গুলিয়ে</span></li><li>প্রোবায়োটিক <span class="dose">১ কেজি/একর</span></li><li>pH ৭.৫–৮.০ বজায় রাখুন</li></ul></div><div class="inl-w"><span class="bxh">⚠ pH গুণক</span>pH ৮.৫ ও ৩০°C-এ ~৫% TAN NH₃। pH ৯.০-এ ~১৫%। শেওলার ব্লুমে pH বাড়লে মাঝারি TAN তাৎক্ষণিক মারণ।</div>`,
 te:`<div class="opt-row"><span class="opt-key">లక్ష్యం</span><span class="opt-val">TAN ≤0.1 mg/L · NH₃ &lt;0.01 mg/L</span></div><div class="elab-block"><div class="elab-head">రెండు రూపాలు — ఒకటి హానిరహితం, ఒకటి మారణం</div>NH₄⁺ (హానిరహితం) &amp; NH₃ (విషపూరితం). pH &amp; ఉష్ణోగ్రత పెరిగే కొద్దీ ఎక్కువ NH₃ అవుతుంది. pH 9.0 &amp; 32°C వద్ద TAN లో 20% వరకు NH₃. NH₃ గిల్స్ ద్వారా నష్టం కలిగిస్తుంది.</div><div class="pr-block p-hi"><div class="pr-label">అధిక TAN (&gt;0.1)</div><ul class="rx"><li>ఆహారం ఆపండి</li><li>నీటి మార్పు <span class="dose">15–25%</span></li><li>జియోలైట్ <span class="dose">15–20 కి.గ్రా/ఎకరా</span></li><li>మొలాసెస్ <span class="dose">5–10 కి.గ్రా/ఎకరా కరిగించి</span></li><li>ప్రొబయోటిక్ <span class="dose">1 కి.గ్రా/ఎకరా</span></li><li>pH 7.5–8.0 నిర్వహించండి</li></ul></div><div class="inl-w"><span class="bxh">⚠ pH గుణకం</span>pH 8.5 &amp; 30°C వద్ద ~5% TAN NH₃. pH 9.0 వద్ద ~15%. ఆల్గే బ్లూమ్ pH స్పైక్ మితమైన TAN ను తక్షణ మారణ సంక్షోభంగా మారుస్తుంది.</div>`
},
{id:"nitrite",icon:"🔶",color:"c-orange",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-crit",t:"Inland Risk"}],
 title:{en:"Nitrite (NO₂⁻) — Brown Blood",bn:"নাইট্রাইট (NO₂⁻) — বাদামী রক্ত",te:"నైట్రైట్ (NO₂⁻) — గోధుమ రక్తం"},
 sub:{en:"Cl:NO₂ ≥20:1 · Inland &lt;8 ppt = extreme danger",bn:"৪–৮ ppt পুকুরে চরম ঝুঁকি",te:"4–8 ppt లో తీవ్ర ముప్పు"},
 en:`<div class="opt-row"><span class="opt-key">Target</span><span class="opt-val">&lt;0.1 mg/L · Cl:NO₂ ≥20:1 (inland critical)</span></div><div class="elab-block"><div class="elab-head">Why Inland Ponds Face Extreme Danger</div>Nitrite competes with chloride (Cl⁻) for gill membrane uptake. At 20–30 ppt, high Cl⁻ blocks most NO₂ uptake. At 4–8 ppt inland ponds, Cl⁻ is scarce — even 0.3 mg/L NO₂ causes methaemoglobinaemia (blood loses O₂-carrying capacity).</div><div class="sal-callout"><div class="zh">Salinity-Specific Nitrite Risk</div><div class="sal-row"><span class="sal-zone">4–8 ppt</span>Extreme risk. 0.3 mg/L = crisis. Add NaCl/KCl immediately.</div><div class="sal-row"><span class="sal-zone">8–15 ppt</span>High risk — monitor closely.</div><div class="sal-row"><span class="sal-zone">15–30 ppt</span>Natural Cl⁻ buffer. Usually manageable.</div></div><div class="pr-block p-hi"><div class="pr-label">Nitrite Spike — Emergency</div><ul class="rx"><li>Emergency NaCl — raises Cl⁻ to outcompete NO₂ at gill <span class="dose">20–50 kg/acre</span></li><li>KCl — where K⁺ also deficient <span class="dose">10–20 kg/acre</span></li><li>Water exchange <span class="dose">20–30%</span></li><li>Zeolite <span class="dose">15 kg/acre</span></li><li>Probiotic — complete N-cycle faster <span class="dose">1 kg/acre</span></li></ul></div>`,
 bn:`<div class="opt-row"><span class="opt-key">লক্ষ্যমাত্রা</span><span class="opt-val">&lt;০.১ মি.গ্রা/লি · Cl:NO₂ ≥২০:১</span></div><div class="elab-block"><div class="elab-head">কম লবণাক্ত পুকুরে বিপদ বেশি কেন</div>নাইট্রাইট ও Cl⁻ ফুলকায় একই পথে প্রতিযোগিতা করে। ২০–৩০ ppt-এ Cl⁻ বেশি, NO₂ শোষণ আটকায়। ৪–৮ ppt-এ Cl⁻ কম — ০.৩ মি.গ্রা/লি NO₂-তেই মেথেমোগ্লোবিনেমিয়া।</div><div class="sal-callout"><div class="zh">লবণাক্ততা অনুযায়ী ঝুঁকি</div><div class="sal-row"><span class="sal-zone">৪–৮ ppt</span>চরম ঝুঁকি। NaCl/KCl অবিলম্বে।</div><div class="sal-row"><span class="sal-zone">৮–১৫ ppt</span>উচ্চ ঝুঁকি। নিবিড় পর্যবেক্ষণ।</div><div class="sal-row"><span class="sal-zone">১৫–৩০ ppt</span>প্রাকৃতিক Cl⁻ সুরক্ষা দেয়।</div></div><div class="pr-block p-hi"><div class="pr-label">নাইট্রাইট স্পাইক — জরুরি</div><ul class="rx"><li>NaCl জরুরি <span class="dose">২০–৫০ কেজি/একর</span></li><li>KCl <span class="dose">১০–২০ কেজি/একর</span></li><li>পানি বদল <span class="dose">২০–৩০%</span></li><li>জিওলাইট <span class="dose">১৫ কেজি/একর</span></li><li>প্রোবায়োটিক <span class="dose">১ কেজি/একর</span></li></ul></div>`,
 te:`<div class="opt-row"><span class="opt-key">లక్ష్యం</span><span class="opt-val">&lt;0.1 mg/L · Cl:NO₂ ≥20:1</span></div><div class="elab-block"><div class="elab-head">తక్కువ లవణీయత చెరువులలో ఎందుకు అత్యధిక ముప్పు</div>నైట్రైట్ &amp; Cl⁻ గిల్ పొర ద్వారా పోటీ పడతాయి. 20–30 ppt వద్ద Cl⁻ అధికం — NO₂ అవరోధిస్తుంది. 4–8 ppt లో Cl⁻ కొద్దిగా — 0.3 mg/L NO₂ తో మెత్‌హీమోగ్లోబినీమియా.</div><div class="sal-callout"><div class="zh">లవణీయత ప్రకారం ముప్పు</div><div class="sal-row"><span class="sal-zone">4–8 ppt</span>తీవ్ర ముప్పు. NaCl/KCl వెంటనే.</div><div class="sal-row"><span class="sal-zone">8–15 ppt</span>అధిక ముప్పు. నిఘా పెంచండి.</div><div class="sal-row"><span class="sal-zone">15–30 ppt</span>సహజ Cl⁻ రక్షణ.</div></div><div class="pr-block p-hi"><div class="pr-label">నైట్రైట్ స్పైక్ — అత్యవసరం</div><ul class="rx"><li>NaCl అత్యవసర <span class="dose">20–50 కి.గ్రా/ఎకరా</span></li><li>KCl <span class="dose">10–20 కి.గ్రా/ఎకరా</span></li><li>నీటి మార్పు <span class="dose">20–30%</span></li><li>జియోలైట్ <span class="dose">15 కి.గ్రా/ఎకరా</span></li><li>ప్రొబయోటిక్ <span class="dose">1 కి.గ్రా/ఎకరా</span></li></ul></div>`
},
{id:"h2s",icon:"🖤",color:"c-purple",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-crit",t:"Silent Killer"}],
 title:{en:"H₂S — Hydrogen Sulfide",bn:"H₂S — হাইড্রোজেন সালফাইড",te:"H₂S — హైడ్రోజన్ సల్ఫైడ్"},
 sub:{en:"0 = safe · 0.1 ppm = loss of equilibrium · 4 ppm = instant death",bn:"পচা ডিমের গন্ধ · মোনোডন সর্বাধিক ঝুঁকিতে",te:"కుళ్ళిన గుడ్ల వాసన · మోనోడన్ అత్యధిక ముప్పు"},
 en:`<div class="opt-row"><span class="opt-key">Target</span><span class="opt-val">0 — undetectable · &lt;0.01 mg/L absolute maximum</span></div><div class="elab-block"><div class="elab-head">How H₂S Forms — The Black Bottom Cycle</div>Sulphate-reducing bacteria (Desulfovibrio) thrive in anaerobic bottom conditions — dense organic sediment + low O₂. They reduce SO₄²⁻ to H₂S gas. Lower pH = more dissolved toxic H₂S. Black pond bottom + rotten egg smell = active production. P. monodon burrows into sediment — directly exposed. 0.1 ppm: loss of equilibrium. 4 ppm: instant death.</div><div class="pr-block p-hi"><div class="pr-label">H₂S Buildup — Emergency Response</div><div class="pr-symptoms">Pond bottom black &amp; malodorous when disturbed. Feed trays empty — first warning. Shrimp at surface early morning. Monodon shows stress first.</div><ul class="rx"><li>Increase water exchange daily from DOC 30+ <span class="dose">10–30%</span></li><li>Bottom aeration — re-oxygenate sediment<span class="nt">NEVER violently disturb H₂S-active bottom — gas pulse kills entire pond in 30–60 minutes.</span></li><li>CaO on pond bottom between crops <span class="dose">200–300 kg/ha</span></li><li>Zeolite <span class="dose">15–20 kg/acre</span></li><li>Probiotics (B. subtilis) — sludge breakdown <span class="dose">1–2 kg/acre biweekly</span></li></ul></div><div class="inl-b"><span class="bxh">✖ Critical Warning</span>NEVER drag nets through H₂S-active pond bottom. Sudden pulse kills entire pond in 30–60 minutes.</div>`,
 bn:`<div class="opt-row"><span class="opt-key">লক্ষ্যমাত্রা</span><span class="opt-val">০ — শনাক্তযোগ্য নয় · সর্বোচ্চ &lt;০.০১ মি.গ্রা/লি</span></div><div class="elab-block"><div class="elab-head">H₂S তৈরি হয় কীভাবে</div>সালফেট-বিজারক ব্যাকটেরিয়া অ্যানারোবিক তলায় SO₄²⁻ থেকে H₂S তৈরি করে। কম pH-এ বেশি দ্রবীভূত H₂S। কালো পুকুরের তল + পচা ডিমের গন্ধ = সক্রিয় H₂S। মোনোডন তলায় গর্ত করে — সর্বাধিক H₂S-এ থাকে। ০.১ পিপিএমে ভারসাম্য হারানো, ৪ পিপিএমে তাৎক্ষণিক মৃত্যু।</div><div class="pr-block p-hi"><div class="pr-label">H₂S জমা — জরুরি পদক্ষেপ</div><ul class="rx"><li>DOC ৩০+ থেকে পানি বদল বাড়ান <span class="dose">১০–৩০% প্রতিদিন</span></li><li>তলায় বায়ু সঞ্চালন<span class="nt">সক্রিয় H₂S পুকুরে তল হঠাৎ নাড়াবেন না — পুরো পুকুর মারা যেতে পারে।</span></li><li>ফসলের মাঝে তলায় CaO <span class="dose">২০০–৩০০ কেজি/হেক্টর</span></li><li>জিওলাইট <span class="dose">১৫–২০ কেজি/একর</span></li><li>প্রোবায়োটিক <span class="dose">১–২ কেজি/একর পক্ষকালে</span></li></ul></div><div class="inl-b"><span class="bxh">✖ সতর্কতা</span>H₂S সক্রিয় পুকুরে জাল টেনে নাড়াবেন না। ৩০–৬০ মিনিটে পুরো পুকুর শেষ।</div>`,
 te:`<div class="opt-row"><span class="opt-key">లక్ష్యం</span><span class="opt-val">0 — శనాక్తించలేనిది · గరిష్టం &lt;0.01 mg/L</span></div><div class="elab-block"><div class="elab-head">H₂S ఎలా ఏర్పడుతుంది</div>సల్ఫేట్-తగ్గించే బాక్టీరియా వాయురహిత నేల వద్ద SO₄²⁻ ను H₂S కి మారుస్తాయి. నల్ల చెరువు అడుగు + కుళ్ళిన వాసన = చురుకైన H₂S. మోనోడన్ అడుగున తవ్వుతుంది — నేరుగా H₂S కి గురవుతుంది. 0.1 ppm: సమతుల్యత కోల్పోవడం. 4 ppm: తక్షణ మరణం.</div><div class="pr-block p-hi"><div class="pr-label">H₂S పేరుకుపోవడం — అత్యవసరం</div><ul class="rx"><li>DOC 30+ నుండి నీటి మార్పు పెంచండి <span class="dose">10–30% రోజూ</span></li><li>నేల వద్ద గాలి సంచలనం<span class="nt">H₂S చురుకైన చెరువు అడుగు హఠాత్తుగా కదలించకండి.</span></li><li>పంటల మధ్య CaO <span class="dose">200–300 కి.గ్రా/హెక్టార్</span></li><li>జియోలైట్ <span class="dose">15–20 కి.గ్రా/ఎకరా</span></li><li>ప్రొబయోటిక్ <span class="dose">1–2 కి.గ్రా/ఎకరా పక్షానికోసారి</span></li></ul></div><div class="inl-b"><span class="bxh">✖ క్లిష్ట హెచ్చరిక</span>H₂S చురుకైన చెరువు అడుగులో వలలు లాగవద్దు. 30–60 నిమిషాల్లో మొత్తం నష్టపోతుంది.</div>`
},
{id:"salinity",icon:"🌊",color:"c-sky",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-enviro",t:"Ionic Balance"}],
 title:{en:"Salinity &amp; Osmotic Shock",bn:"লবণাক্ততা ও অসমোটিক শক",te:"లవణీయత &amp; ఆస్మోటిక్ షాక్"},
 sub:{en:"Never change &gt;3 ppt/day · K⁺ Mg²⁺ critical at &lt;10 ppt",bn:"প্রতিদিন &gt;৩ ppt পরিবর্তন করবেন না",te:"రోజుకు &gt;3 ppt మార్చవద్దు"},
 en:`<div class="opt-row"><span class="opt-key">Targets</span><span class="opt-val">vannamei 15–25 ppt · monodon 15–30 · rosenbergii 0–5</span></div><div class="elab-block"><div class="elab-head">Isosmotic Point &amp; Ionic Deficiency</div>P. vannamei isosmotic point ≈ 25 ppt — minimal osmotic energy cost, best growth. At 4–10 ppt inland ponds, ionic deficiency (K⁺, Mg²⁺) is as critical as salinity itself — many inland mortalities are ionic crises, not salinity crises per se.</div><div class="pr-block p-lo"><div class="pr-label">⬇ Sudden Salinity Drop — Monsoon / Freshwater</div><ul class="rx"><li>Never add large freshwater volumes at once — max 3 ppt/day</li><li>Sea salt or brine to restore gradually <span class="dose">≤3 ppt per 24 hrs</span></li><li>KCl + MgSO₄ — restore ionic balance <span class="dose">5–10 kg/acre each</span></li><li>Reduce feeding 50% during acclimation</li><li>β-Glucan in feed — immune support <span class="dose">0.1–0.2% feed</span></li></ul></div><div class="pr-block p-hi"><div class="pr-label">⬆ High Salinity (&gt;30 ppt — Summer)</div><ul class="rx"><li>Gradual freshwater addition — max 3 ppt reduction per day</li><li>Increase water depth to reduce evaporative concentration</li></ul></div>`,
 bn:`<div class="opt-row"><span class="opt-key">লক্ষ্যমাত্রা</span><span class="opt-val">ভ্যানামেই ১৫–২৫ · মোনোডন ১৫–৩০ · রোসেনবার্গি ০–৫ ppt</span></div><div class="elab-block"><div class="elab-head">আইসোঅসমোটিক পয়েন্ট ও আয়নিক ঘাটতি</div>ভ্যানামেইয়ের আইসোঅসমোটিক পয়েন্ট ≈২৫ ppt — এতে সর্বোত্তম বৃদ্ধি। ৪–১০ ppt স্থলভাগের পুকুরে K⁺ ও Mg²⁺ ঘাটতি লবণাক্ততার মতোই গুরুত্বপূর্ণ।</div><div class="pr-block p-lo"><div class="pr-label">⬇ হঠাৎ লবণাক্ততা কমা</div><ul class="rx"><li>একসাথে বেশি মিঠা পানি দেবেন না — সর্বোচ্চ ৩ ppt/দিন</li><li>সমুদ্রের লবণ বা ব্রাইন <span class="dose">≤৩ ppt প্রতি ২৪ ঘণ্টা</span></li><li>KCl + MgSO₄ <span class="dose">৫–১০ কেজি/একর প্রতিটি</span></li><li>খাওয়ানো ৫০% কমান</li><li>β-গ্লুকান খাবারে <span class="dose">০.১–০.২%</span></li></ul></div>`,
 te:`<div class="opt-row"><span class="opt-key">లక్ష్యాలు</span><span class="opt-val">వనమే 15–25 · మోనోడన్ 15–30 · రోసెన్‌బర్గి 0–5 ppt</span></div><div class="elab-block"><div class="elab-head">ఐసోఆస్మోటిక్ పాయింట్ &amp; అయానిక లోపం</div>వనమేయి ఐసోఆస్మోటిక్ పాయింట్ ≈25 ppt — అత్యుత్తమ వృద్ధి. 4–10 ppt అంతర్గత చెరువులలో K⁺ &amp; Mg²⁺ లోపం లవణీయతంతో సమానంగా ముఖ్యమైనది.</div><div class="pr-block p-lo"><div class="pr-label">⬇ అకస్మాత్తు లవణీయత తగ్గుదల</div><ul class="rx"><li>ఒకేసారి చాలా మంచినీరు వేయవద్దు — గరిష్టం 3 ppt/రోజు</li><li>సముద్రపు ఉప్పు లేదా బ్రైన్ <span class="dose">≤3 ppt 24 గంటలకు</span></li><li>KCl + MgSO₄ <span class="dose">5–10 కి.గ్రా/ఎకరా చొప్పున</span></li><li>ఆహారం 50% తగ్గించండి</li><li>β-గ్లూకాన్ ఆహారంలో <span class="dose">0.1–0.2%</span></li></ul></div>`
},
{id:"alkalinity",icon:"🛡️",color:"c-green",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-wq",t:"Moulting"}],
 title:{en:"Alkalinity — pH Buffer &amp; Shell",bn:"ক্ষারত্ব — pH বাফার ও খোলের স্বাস্থ্য",te:"క్షారత — pH బఫర్ &amp; గుల్ల"},
 sub:{en:"Target rises with DOC · Moulting support critical",bn:"DOC-এর সাথে লক্ষ্যমাত্রা বাড়ে",te:"DOC తో లక్ష్యం పెరుగుతుంది"},
 en:`<div class="opt-row"><span class="opt-key">Target</span><span class="opt-val">DOC 1–30: 100–120 · DOC 30–60: 120–150 · DOC 60–90: 150–200 ppm</span></div><div class="elab-block"><div class="elab-head">Why Alkalinity Must Rise Through the Crop</div>Alkalinity (HCO₃⁻, CO₃²⁻) resists pH change — the buffer system. Below 80 ppm, small CO₂ changes cause dramatic pH swings. Shrimp absorb calcium carbonate from water during moulting — directly consuming alkalinity. Higher biomass = more moulting = faster consumption. Must be actively replenished.</div><div class="pr-block p-lo"><div class="pr-label">⬇ Low Alkalinity (&lt;80 ppm)</div><div class="pr-symptoms">Wide pH swings. Soft shell not hardening post-moult. Incomplete moults — shrimp trapped in old shell. Cannibalism of soft-shelled shrimp.</div><ul class="rx"><li>Dolomite CaMg(CO₃)₂ — best balanced choice <span class="dose">100–200 kg/ha every 2–3 days</span></li><li>Agricultural lime Ca(OH)₂ <span class="dose">100–150 kg/acre</span></li><li>Sodium bicarbonate NaHCO₃ — gentle, no pH spike <span class="dose">5–10 kg/acre</span></li></ul></div><div class="pr-block p-hi"><div class="pr-label">⬆ Very High Alkalinity (&gt;200 ppm)</div><ul class="rx"><li>Gypsum CaSO₄ <span class="dose">50 kg/acre</span></li><li>Dilution with low-alkalinity water <span class="dose">10–15%</span></li></ul></div>`,
 bn:`<div class="opt-row"><span class="opt-key">লক্ষ্যমাত্রা</span><span class="opt-val">DOC ১–৩০: ১০০–১২০ · ৩০–৬০: ১২০–১৫০ · ৬০–৯০: ১৫০–২০০ পিপিএম</span></div><div class="elab-block"><div class="elab-head">ক্ষারত্ব কেন ফসলের সাথে বাড়াতে হবে</div>ক্ষারত্ব pH পরিবর্তন প্রতিরোধ করে। ৮০ পিপিএম-এর নিচে pH অস্থির। চিংড়ি মোল্টিংয়ে ক্যালসিয়াম কার্বোনেট নেয় — ক্ষারত্ব সরাসরি কমায়। বেশি বায়োমাস = দ্রুত ক্ষারত্ব শেষ।</div><div class="pr-block p-lo"><div class="pr-label">⬇ কম ক্ষারত্ব (&lt;৮০ পিপিএম)</div><ul class="rx"><li>ডলোমাইট CaMg(CO₃)₂ <span class="dose">১০০–২০০ কেজি/হেক্টর প্রতি ২–৩ দিন</span></li><li>কৃষি চুন Ca(OH)₂ <span class="dose">১০০–১৫০ কেজি/একর</span></li><li>NaHCO₃ — মৃদু <span class="dose">৫–১০ কেজি/একর</span></li></ul></div>`,
 te:`<div class="opt-row"><span class="opt-key">లక్ష్యం</span><span class="opt-val">DOC 1–30: 100–120 · 30–60: 120–150 · 60–90: 150–200 ppm</span></div><div class="elab-block"><div class="elab-head">పంటంతటా క్షారత ఎందుకు పెంచాలి</div>క్షారత pH మార్పు నిరోధిస్తుంది. 80 ppm కంటే తక్కువ వద్ద pH అస్థిరంగా ఉంటుంది. రొయ్యలు వలువ విడవడంలో CaCO₃ శోషిస్తాయి — క్షారత తగ్గిస్తుంది.</div><div class="pr-block p-lo"><div class="pr-label">⬇ తక్కువ క్షారత (&lt;80 ppm)</div><ul class="rx"><li>డోలమైట్ CaMg(CO₃)₂ <span class="dose">100–200 కి.గ్రా/హెక్టార్ 2–3 రోజులకోసారి</span></li><li>వ్యవసాయ సున్నం Ca(OH)₂ <span class="dose">100–150 కి.గ్రా/ఎకరా</span></li><li>NaHCO₃ <span class="dose">5–10 కి.గ్రా/ఎకరా</span></li></ul></div>`
},
{id:"plankton",icon:"🌿",color:"c-lime",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-crit",t:"Boom-Crash Risk"}],
 title:{en:"Plankton Bloom, Crash &amp; Harmful Algae",bn:"প্ল্যাংকটন ব্লুম, ক্র্যাশ ও ক্ষতিকর শেওলা",te:"ప్లాంక్టన్ బ్లూమ్, క్రాష్ &amp; హానికరమైన ఆల్గే"},
 sub:{en:"Secchi 30–40 cm · Phosphorus drives boom-crash cycle",bn:"সেচি ৩০–৪০ সেমি · ফসফরাস চালিকাশক্তি",te:"సెక్కి 30–40 సెం.మీ · ఫాస్ఫరస్ చోదక శక్తి"},
 en:`<div class="opt-row"><span class="opt-key">Target</span><span class="opt-val">Secchi 30–40 cm · Diatom-dominant · Stable TOM</span></div><div class="elab-block"><div class="elab-head">The Phosphorus–Bloom–Crash Cycle</div>72–89% of feed phosphorus is not absorbed by shrimp — it fuels continuous plankton growth. Dense blooms (Secchi &lt;25 cm) create DO boom-crash cycles. Algae crash simultaneously releases massive ammonia AND depletes all O₂. The 24–48 hours after a bloom crash = most dangerous period in shrimp culture.</div><div class="pr-block p-hi"><div class="pr-label">Dense Bloom (&lt;25 cm) — Prevent Crash</div><ul class="rx"><li>Reduce feed 50% immediately</li><li>Water exchange <span class="dose">15–25%</span></li><li>Probiotic — competes with algae for nutrients <span class="dose">1 kg/acre</span></li><li>Do NOT apply algaecide to thick bloom — DO crashes to zero</li><li>Run aerators 24/7 in anticipation of overnight crash</li></ul></div><div class="pr-block p-lo"><div class="pr-label">Crash (Suddenly Clear &gt;50 cm) — Emergency</div><ul class="rx"><li>Emergency aeration — all aerators ON</li><li>Stop feeding 24–48 hours</li><li>Zeolite — absorb ammonia spike <span class="dose">15–20 kg/acre</span></li><li>Probiotic + molasses <span class="dose">1 + 5 kg/acre</span></li></ul></div><div class="inl-w"><span class="bxh">⚠ Cyanobacteria Alert</span>Blue-green bloom: surface scum, musty odour. Microcystis aeruginosa produces microcystin hepatotoxin. Do NOT apply CuSO₄ without species confirmation.</div>`,
 bn:`<div class="opt-row"><span class="opt-key">লক্ষ্যমাত্রা</span><span class="opt-val">সেচি ৩০–৪০ সেমি · ডায়াটম-প্রধান</span></div><div class="elab-block"><div class="elab-head">ফসফরাস-ব্লুম-ক্র্যাশ চক্র</div>খাবারের ৭২–৮৯% ফসফরাস চিংড়ি শোষণ করে না — শেওলার বৃদ্ধি চালায়। ব্লুম ক্র্যাশ একসাথে সর্বোচ্চ NH₃ ও শূন্য O₂ তৈরি করে।</div><div class="pr-block p-hi"><div class="pr-label">ঘন ব্লুম (&lt;২৫ সেমি) — ক্র্যাশ প্রতিরোধ</div><ul class="rx"><li>খাওয়ানো ৫০% কমান</li><li>পানি বদল <span class="dose">১৫–২৫%</span></li><li>প্রোবায়োটিক <span class="dose">১ কেজি/একর</span></li><li>ঘন ব্লুমে শেওলানাশক দেবেন না</li><li>সারারাত সব এয়ারেটর চালু রাখুন</li></ul></div><div class="pr-block p-lo"><div class="pr-label">ব্লুম ক্র্যাশ (হঠাৎ পরিষ্কার &gt;৫০ সেমি)</div><ul class="rx"><li>সব এয়ারেটর তক্ষুনি চালু</li><li>২৪–৪৮ ঘণ্টা খাওয়ানো বন্ধ</li><li>জিওলাইট <span class="dose">১৫–২০ কেজি/একর</span></li><li>প্রোবায়োটিক + গুড় <span class="dose">১ + ৫ কেজি/একর</span></li></ul></div>`,
 te:`<div class="opt-row"><span class="opt-key">లక్ష్యం</span><span class="opt-val">సెక్కి 30–40 సెం.మీ · డయాటమ్ ప్రధానం</span></div><div class="elab-block"><div class="elab-head">ఫాస్ఫరస్–బ్లూమ్–క్రాష్ చక్రం</div>72–89% ఆహారపు ఫాస్ఫరస్ రొయ్యలు శోషించవు — ఆల్గే వృద్ధిని నడిపిస్తుంది. బ్లూమ్ క్రాష్ ఒకేసారి గరిష్ట NH₃ &amp; సున్నం O₂ కలిగిస్తుంది.</div><div class="pr-block p-hi"><div class="pr-label">దట్టమైన బ్లూమ్ (&lt;25 సెం.మీ)</div><ul class="rx"><li>ఆహారం 50% వెంటనే తగ్గించండి</li><li>నీటి మార్పు <span class="dose">15–25%</span></li><li>ప్రొబయోటిక్ <span class="dose">1 కి.గ్రా/ఎకరా</span></li><li>దట్టమైన బ్లూమ్ పై ఆల్గేనాశిని వేయవద్దు</li></ul></div><div class="pr-block p-lo"><div class="pr-label">బ్లూమ్ క్రాష్ (అకస్మాత్తు &gt;50 సెం.మీ)</div><ul class="rx"><li>అన్ని ఏరేటర్లు వెంటనే ఆన్</li><li>24–48 గంటలు ఆహారం ఆపండి</li><li>జియోలైట్ <span class="dose">15–20 కి.గ్రా/ఎకరా</span></li><li>ప్రొబయోటిక్ + మొలాసెస్ <span class="dose">1 + 5 కి.గ్రా/ఎకరా</span></li></ul></div>`
},
{id:"temperature",icon:"🌡️",color:"c-pink",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-enviro",t:"Vibrio Risk"}],
 title:{en:"Temperature Stress",bn:"তাপমাত্রার চাপ",te:"ఉష్ణోగ్రత ఒత్తిడి"},
 sub:{en:"Optimal 28–30°C · Cold stops feeding · Heat boosts Vibrio",bn:"আদর্শ ২৮–৩০°C · ঠান্ডায় খাওয়া বন্ধ",te:"అనుకూలం 28–30°C · చలి ఆహారం ఆపుతుంది"},
 en:`<div class="opt-row"><span class="opt-key">Optimal</span><span class="opt-val">28–30°C · vannamei: 15–33°C · monodon: 23–32°C</span></div><div class="pr-block p-lo"><div class="pr-label">⬇ Cold Stress (&lt;24°C)</div><div class="pr-symptoms">Feeding stops at 22°C. Metabolism slows. Immunity reduced. Vibrio more virulent. Moult intervals extend 40–60%.</div><ul class="rx"><li>Reduce feed 50% below 24°C. Stop completely below 20°C.</li><li>Raise water depth to 1.5–1.8 m — thermal buffering</li><li>Vitamin C + E in feed <span class="dose">1–2 g/kg</span></li><li>Probiotic <span class="dose">0.5 kg/acre fortnightly</span></li><li>Consider early harvest if &lt;22°C expected for &gt;2 weeks</li></ul></div><div class="pr-block p-hi"><div class="pr-label">⬆ Heat Stress (&gt;33°C)</div><div class="pr-symptoms">High metabolic O₂ demand + reduced DO solubility = crisis. Vibrio growth doubles every 4°C above 25°C.</div><ul class="rx"><li>Water exchange with cooler reservoir water <span class="dose">10–15%</span></li><li>Maximise aeration 10 AM–4 PM</li><li>Increase water depth ≥1.5 m</li><li>Partial harvest if heat persists &gt;5 days</li><li>Feed only morning and evening — skip midday</li></ul></div>`,
 bn:`<div class="opt-row"><span class="opt-key">আদর্শ</span><span class="opt-val">২৮–৩০°C · ভ্যানামেই: ১৫–৩৩°C · মোনোডন: ২৩–৩২°C</span></div><div class="pr-block p-lo"><div class="pr-label">⬇ ঠান্ডার চাপ (&lt;২৪°C)</div><ul class="rx"><li>২৪°C-এর নিচে খাওয়ানো ৫০% কমান। ২০°C-এ সম্পূর্ণ বন্ধ।</li><li>পানির গভীরতা ১.৫–১.৮ মিটার বাড়ান</li><li>ভিটামিন C + E <span class="dose">১–২ গ্রা/কেজি</span></li><li>প্রোবায়োটিক <span class="dose">০.৫ কেজি/একর পক্ষকালে</span></li><li>২ সপ্তাহের বেশি &lt;২২°C থাকলে আগাম ধরুন</li></ul></div><div class="pr-block p-hi"><div class="pr-label">⬆ গরমের চাপ (&gt;৩৩°C)</div><ul class="rx"><li>ঠান্ডা পানি দিয়ে পানি বদল <span class="dose">১০–১৫%</span></li><li>সকাল ১০ – বিকেল ৪টা সর্বোচ্চ বায়ু সঞ্চালন</li><li>পানির গভীরতা ≥১.৫ মিটার</li><li>৫ দিনের বেশি গরম থাকলে আংশিক ধরুন</li></ul></div>`,
 te:`<div class="opt-row"><span class="opt-key">అనుకూలం</span><span class="opt-val">28–30°C · వనమే: 15–33°C · మోనోడన్: 23–32°C</span></div><div class="pr-block p-lo"><div class="pr-label">⬇ చలి ఒత్తిడి (&lt;24°C)</div><ul class="rx"><li>24°C కంటే తక్కువ వద్ద 50% తగ్గించండి. 20°C వద్ద పూర్తిగా ఆపండి.</li><li>నీటి లోతు 1.5–1.8 మీ. కి పెంచండి</li><li>విటమిన్ C + E <span class="dose">1–2 గ్రా/కి.గ్రా</span></li><li>ప్రొబయోటిక్ <span class="dose">0.5 కి.గ్రా/ఎకరా పక్షానికోసారి</span></li><li>2 వారాలకంటే ఎక్కువ &lt;22°C ఉంటే త్వరగా పట్టుకోండి</li></ul></div><div class="pr-block p-hi"><div class="pr-label">⬆ వేడి ఒత్తిడి (&gt;33°C)</div><ul class="rx"><li>చల్లని నిల్వ నీటితో నీటి మార్పు <span class="dose">10–15%</span></li><li>ఉదయం 10 AM – 4 PM గరిష్ట గాలి సంచలనం</li><li>నీటి లోతు ≥1.5 మీ.</li><li>5 రోజులకంటే ఎక్కువ వేడి ఉంటే పాక్షిక వేట</li></ul></div>`
},
{id:"organic",icon:"🧱",color:"c-teal",tab:"wq",
 tags:[{c:"tag-wq",t:"Water Quality"},{c:"tag-enviro",t:"DOC 30+ Daily"}],
 title:{en:"Organic Load &amp; Black Water",bn:"জৈব ভার ও কালো পানি",te:"సేంద్రియ భారం &amp; నల్ల నీరు"},
 sub:{en:"Sludge + H₂S + high TOM — daily management from DOC 30+",bn:"কাদা + H₂S + TOM — DOC ৩০+ থেকে দৈনিক",te:"నేల + H₂S + TOM — DOC 30+ నుండి నిత్యం"},
 en:`<div class="pr-block p-hi"><div class="pr-label">Black Water (H₂S + Organic Overload)</div><ul class="rx"><li>MgSO₄ <span class="dose">5 kg/acre</span></li><li>Agricultural lime Ca(OH)₂ <span class="dose">50 kg/acre</span></li><li>Groundnut cake soaked 4 hrs — flocculation <span class="dose">5–10 kg/acre at 10 AM</span></li><li>Cut feeding 50%. Aerate immediately.</li></ul></div><div class="pr-block p-wn"><div class="pr-label">Dense Green / Brown Water</div><ul class="rx"><li>Aquafloc / PAC <span class="dose">1 kg/acre</span></li><li>Probiotic cycle <span class="dose">1 kg/acre fortnightly</span></li><li>Zeolite <span class="dose">15 kg/acre</span></li></ul></div><div class="pr-block p-wn"><div class="pr-label">Sludge Buildup (DOC 45+ Intensive)</div><ul class="rx"><li>Bottom siphoning daily after DOC 30<span class="nt">Slow, targeted. Never agitate entire bottom at once — H₂S pulse risk.</span></li><li>TCCA spot treatment <span class="dose">0.5 kg/acre targeted</span></li><li>Probiotics (B. subtilis + B. licheniformis) <span class="dose">1–2 kg/acre biweekly</span></li><li>Reduce feeding 15% when sludge visible</li></ul></div>`,
 bn:`<div class="pr-block p-hi"><div class="pr-label">কালো পানি (H₂S + জৈব ভার)</div><ul class="rx"><li>MgSO₄ <span class="dose">৫ কেজি/একর</span></li><li>কৃষি চুন Ca(OH)₂ <span class="dose">৫০ কেজি/একর</span></li><li>চিনাবাদামের খৈল (৪ ঘণ্টা ভিজিয়ে) <span class="dose">৫–১০ কেজি/একর সকাল ১০টায়</span></li><li>খাওয়ানো ৫০% কমান। বায়ু সঞ্চালন শুরু।</li></ul></div><div class="pr-block p-wn"><div class="pr-label">তলার কাদা (DOC ৪৫+ নিবিড়)</div><ul class="rx"><li>DOC ৩০+ থেকে প্রতিদিন সিফোনিং</li><li>TCCA লক্ষ্যভিত্তিক <span class="dose">০.৫ কেজি/একর</span></li><li>প্রোবায়োটিক <span class="dose">১–২ কেজি/একর পক্ষকালে</span></li><li>কাদা দেখা গেলে খাওয়ানো ১৫% কমান</li></ul></div>`,
 te:`<div class="pr-block p-hi"><div class="pr-label">నల్ల నీరు (H₂S + సేంద్రియ అధిక భారం)</div><ul class="rx"><li>MgSO₄ <span class="dose">5 కి.గ్రా/ఎకరా</span></li><li>వ్యవసాయ సున్నం Ca(OH)₂ <span class="dose">50 కి.గ్రా/ఎకరా</span></li><li>వేరుశెనగ పిండి (4 గంటలు నానించి) <span class="dose">5–10 కి.గ్రా/ఎకరా 10 AM కి</span></li><li>ఆహారం 50% తగ్గించండి. గాలి సరఫరా చేయండి.</li></ul></div><div class="pr-block p-wn"><div class="pr-label">నేల నేల పేరుకుపోవడం (DOC 45+)</div><ul class="rx"><li>DOC 30+ నుండి నిత్యం సైఫోనింగ్</li><li>TCCA లక్ష్యంగా <span class="dose">0.5 కి.గ్రా/ఎకరా</span></li><li>ప్రొబయోటిక్ <span class="dose">1–2 కి.గ్రా/ఎకరా పక్షానికోసారి</span></li><li>నేల నేల కనిపిస్తే ఆహారం 15% తగ్గించండి</li></ul></div>`
}
],

{id:"wssv",icon:"🔴",color:"c-red",tab:"dis",
 tags:[{c:"tag-viral",t:"Viral · dsDNA"},{c:"tag-crit",t:"No Cure"},{c:"tag-crit",t:"Mass Mortality"}],
 title:{en:"WSSV — White Spot Syndrome Virus",bn:"WSSV — হোয়াইট স্পট সিন্ড্রোম ভাইরাস",te:"WSSV — తెల్ల మచ్చ సిండ్రోమ్ వైరస్"},
 sub:{en:"$90M India annual loss · Prevention only · No antiviral",bn:"ভারতে বার্ষিক $৯০M ক্ষতি · প্রতিরোধই একমাত্র পথ",te:"భారత్ వార్షిక $90M నష్టం · నివారణ మాత్రమే"},
 en:`<div class="econ"><div class="econ-n">$90M</div><div><div class="econ-l">India Annual Loss — Patil et al. 2025</div></div></div><div class="elab-block"><div class="elab-head">Agent &amp; Spread</div>White Spot Syndrome Virus — 300 nm, infects 78+ crustacean species. Spreads via contaminated water, infected broodstock, wild crabs (asymptomatic carriers), birds (mechanical vectors). Peak: rainy season — sudden temperature drop triggers virulence. India east coast prevalence: 6.48% (down from 25%).</div><div class="symp-h">Field Timeline</div><div class="symp-t">Day 1–2: Sudden dramatic feeding drop. Day 2–4: Shrimp at pond edges, white calcified spots 0.5–2.0 mm under carapace, body turns pink-reddish, loose shells. Day 5–10: Mass mortality 30–80%. Entire pond possible in 10 days.</div><div class="two-col"><div><div class="step-label">Mandatory Prevention</div><ul class="rx"><li>SPF PCR-certified seed only</li><li>Chlorinate all incoming water <span class="dose">30 ppm TCCA · 24 hrs</span></li><li>Bird netting over entire pond</li><li>60-mesh filter on all inlet gates — exclude wild crabs</li><li>PCR test at DOC 15, 30, 45</li><li>Pond dry + CaO between crops <span class="dose">300–400 kg/acre · 2 wks dry</span></li></ul></div><div><div class="step-label">Outbreak Management</div><ul class="rx"><li>No antiviral treatment exists</li><li>Emergency partial harvest — &gt;15g immediately</li><li>Stop feeding completely</li><li>β-Glucan <span class="dose">0.2% of feed</span></li><li>Notify MPEDA / State Fisheries — legally required</li><li>Disinfect all discharge water <span class="dose">TCCA 30 ppm</span></li><li>Pond rest minimum 30 days</li></ul></div></div><div class="inl-b"><span class="bxh">✖ Biosecurity</span>Never share WSSV-positive pond water with other ponds. WSSV survives 3–5 days in pond water. Zero-tolerance biosecurity is the only protection.</div>`,
 bn:`<div class="econ"><div class="econ-n">$৯০M</div><div><div class="econ-l">ভারতের বার্ষিক ক্ষতি</div></div></div><div class="elab-block"><div class="elab-head">কারক ও বিস্তার</div>৭৮+ ক্রাস্টেসিয়ান প্রজাতি আক্রান্ত করে। বন্য কাঁকড়া ও পাখি বাহক। বর্ষায় তাপমাত্রা পতনে সংক্রমণ শিখরে। ভারত পূর্ব উপকূলে প্রকোপ ৬.৪৮%।</div><div class="symp-h">মাঠ পরিচিতি</div><div class="symp-t">দিন ১–২: খাবার হঠাৎ কমে। দিন ২–৪: পুকুর পাড়ে, সাদা স্পট ০.৫–২.০ মিমি, গোলাপী-লালচে শরীর। দিন ৫–১০: ৩০–৮০% মৃত্যু।</div><div class="two-col"><div><div class="step-label">বাধ্যতামূলক প্রতিরোধ</div><ul class="rx"><li>PCR-পরীক্ষিত SPF বীজ কেবল</li><li>আগত পানি ক্লোরিনেশন <span class="dose">৩০ পিপিএম TCCA</span></li><li>পুরো পুকুরে পাখি জাল</li><li>সব প্রবেশপথে ৬০ মেশ জাল</li><li>DOC ১৫, ৩০, ৪৫-এ PCR</li><li>পুকুর শুকনো + CaO <span class="dose">৩০০–৪০০ কেজি/একর</span></li></ul></div><div><div class="step-label">প্রাদুর্ভাব ব্যবস্থাপনা</div><ul class="rx"><li>কোনো ভাইরাসনাশক নেই</li><li>জরুরি আংশিক ধরা (&gt;১৫ গ্রা)</li><li>খাওয়ানো বন্ধ</li><li>β-গ্লুকান <span class="dose">০.২% খাবার</span></li><li>MPEDA/রাজ্য মৎস্য বিভাগকে জানান</li><li>নির্গমন পানি জীবাণুমুক্ত</li></ul></div></div>`,
 te:`<div class="econ"><div class="econ-n">$90M</div><div><div class="econ-l">భారత్ వార్షిక నష్టం</div></div></div><div class="elab-block"><div class="elab-head">కారకం &amp; వ్యాప్తి</div>78+ క్రస్టేసియన్ జాతులను సంక్రమిస్తుంది. అడవి పీతలు &amp; పక్షులు వాహకాలు. వర్షాకాలంలో ఉష్ణ పతనం వైరస్ ప్రేరేపిస్తుంది. తూర్పు తీరం వ్యాప్తి 6.48%.</div><div class="symp-h">క్షేత్ర గుర్తింపు</div><div class="symp-t">రోజు 1–2: ఆహారం అకస్మాత్తు తగ్గడం. రోజు 2–4: చెరువు అంచులకు, తెల్లని మచ్చలు, గులాబీ-ఎరుపు శరీరం. రోజు 5–10: 30–80% మరణం.</div><div class="two-col"><div><div class="step-label">తప్పనిసరి నివారణ</div><ul class="rx"><li>PCR ధృవీకరించిన SPF విత్తనాలు మాత్రమే</li><li>వచ్చే నీటిని క్లోరినేషన్ <span class="dose">30 ppm TCCA</span></li><li>మొత్తం చెరువుపై పక్షి వలలు</li><li>అన్ని ద్వారాలలో 60 మెష జాలీ</li><li>DOC 15, 30, 45 లో PCR</li><li>చెరువు ఆరబెట్టడం + CaO <span class="dose">300–400 కి.గ్రా/ఎకరా</span></li></ul></div><div><div class="step-label">వ్యాప్తి నిర్వహణ</div><ul class="rx"><li>యాంటీవైరల్ ఔషధం లేదు</li><li>అత్యవసర పాక్షిక వేట (&gt;15 గ్రా)</li><li>ఆహారం పూర్తిగా ఆపండి</li><li>β-గ్లూకాన్ <span class="dose">0.2% ఆహారం</span></li><li>MPEDA తెలియజేయండి</li><li>నీటి విడుదల ముందు జీవాణురహితం</li></ul></div></div>`
},
