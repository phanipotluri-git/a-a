 title:{en:"EHP — Enterocytozoon hepatopenaei",bn:"EHP — এন্টেরোসাইটোজুন হেপাটোপেনাই",te:"EHP — ఎంటెరోసైటోజూన్ హెపటోపెనాయి"},
 sub:{en:"$571M #1 India loss · 78% of total · Growth variation key sign",bn:"ভারতে #১ ক্ষতি $৫৭১M · বৃদ্ধির তারতম্য মূল লক্ষণ",te:"$571M భారత్ #1 నష్టం · పెరుగుదల వ్యత్యాసం కీలక సంకేతం"},
 en:`<div class="econ"><div class="econ-n">$571M</div><div><div class="econ-l">India #1 Loss · 78% of total — Patil et al. 2025</div></div></div><div class="elab-block"><div class="elab-head">Why EHP is the Biggest Economic Threat</div>EHP spores infect hepatopancreatic tubule cells — destroying the nutrient absorption organ. Spores survive in pond soil for months, resistant to drying, UV, and most disinfectants. India east coast prevalence: 32.4%. Co-infection with WSSV = combined loss 1.89 t/ha/crop.</div><div class="symp-h">Key Diagnostic Sign</div><div class="symp-t">Extreme growth variation by DOC 35–40 — shrimp of same age showing 30–50% size variation ("giants" and "dwarfs"). HP pale, whitish, shrunken. White stringy feces in feed trays. No mass die-off — chronic productivity loss. Definitive diagnosis: PCR of HP tissue ONLY.</div><div class="step-label">Prevention — The Only Effective Intervention</div><ul class="rx"><li>PCR test PL seed before stocking — reject EHP-positive lots absolutely <span class="dose">NACA PL15 PCR</span></li><li>Aggressive inter-crop drying + CaO — destroys soil spore reservoir <span class="dose">300 kg/acre · 2+ weeks full dry</span></li><li>HDPE pond liner — eliminates soil spore reservoir permanently</li><li>Chlorinate all incoming water <span class="dose">30 ppm TCCA · 48 hrs</span></li><li>Reduce stocking density <span class="dose">60–80 PL/m² max for EHP-endemic farms</span></li></ul><div class="step-label">Active EHP Management</div><ul class="rx"><li>Organic acids in feed — inhibit spore germination <span class="dose">3–5 g/kg · 10–15 days</span></li><li>Probiotics — competitive exclusion <span class="dose">1 kg/acre biweekly</span></li><li>Water exchange <span class="dose">15–20% daily from DOC 40</span></li><li>Partial harvest at DOC 60 if ABW deviation &gt;25%</li></ul>`,
 bn:`<div class="econ"><div class="econ-n">$৫৭১M</div><div><div class="econ-l">ভারতে #১ ক্ষতি · মোটের ৭৮%</div></div></div><div class="elab-block"><div class="elab-head">EHP কেন সবচেয়ে বড় হুমকি</div>EHP রেণু হেপাটোপ্যাংক্রেটিক নলকোষ আক্রান্ত করে। রেণু মাটিতে মাসের পর মাস বেঁচে থাকে। পূর্ব উপকূলে প্রকোপ ৩২.৪%।</div><div class="symp-h">মূল লক্ষণ</div><div class="symp-t">DOC ৩৫–৪০-এ চরম বৃদ্ধির তারতম্য — একই বয়সে ৩০–৫০% আকার বৈচিত্র্য। HP ফ্যাকাশে, সংকুচিত। সাদা পাতলা মল। গণমৃত্যু নেই — ধীরে ধীরে উৎপাদন ক্ষতি।</div><div class="step-label">প্রতিরোধ — একমাত্র কার্যকর হস্তক্ষেপ</div><ul class="rx"><li>মজুদের আগে PL-এর PCR পরীক্ষা <span class="dose">NACA PL15 PCR</span></li><li>আক্রমণাত্মক শুকনো + CaO <span class="dose">৩০০ কেজি/একর · ২+ সপ্তাহ পূর্ণ শুকনো</span></li><li>HDPE পুকুর লাইনার — মাটির রেণু স্থায়ীভাবে দূর করে</li><li>আগত পানি ক্লোরিনেশন <span class="dose">৩০ পিপিএম · ৪৮ ঘণ্টা</span></li><li>মজুদ ঘনত্ব কমান <span class="dose">৬০–৮০ PL/m²</span></li></ul><div class="step-label">সক্রিয় EHP ব্যবস্থাপনা</div><ul class="rx"><li>জৈব অ্যাসিড খাবারে <span class="dose">৩–৫ গ্রা/কেজি · ১০–১৫ দিন</span></li><li>প্রোবায়োটিক <span class="dose">১ কেজি/একর পক্ষকালে</span></li><li>পানি বদল <span class="dose">DOC ৪০+ থেকে প্রতিদিন ১৫–২০%</span></li><li>DOC ৬০-এ আংশিক ধরা যদি ওজন তারতম্য &gt;২৫%</li></ul>`,
 te:`<div class="econ"><div class="econ-n">$571M</div><div><div class="econ-l">భారత్ #1 నష్టం · మొత్తంలో 78%</div></div></div><div class="elab-block"><div class="elab-head">EHP ఎందుకు అతి పెద్ద ఆర్థిక ముప్పు</div>EHP స్పోర్లు హెపటోప్యాంక్రియాటిక్ నాళ కణాలను సంక్రమిస్తాయి. స్పోర్లు నేలలో నెలల తరబడి జీవించగలవు. తూర్పు తీరం వ్యాప్తి 32.4%.</div><div class="symp-h">కీలక సంకేతం</div><div class="symp-t">DOC 35–40 నాటికి తీవ్ర పెరుగుదల వ్యత్యాసం — ఒకే వయసులో 30–50% పరిమాణ వ్యత్యాసం. HP లేత, సంకోచిత. తెల్లని మలం. గణ మరణం లేదు.</div><div class="step-label">నివారణ — ఏకైక ప్రభావవంతమైన జోక్యం</div><ul class="rx"><li>నిల్వకు ముందు PL PCR పరీక్ష <span class="dose">NACA PL15 PCR</span></li><li>తీవ్రంగా ఆరబెట్టడం + CaO <span class="dose">300 కి.గ్రా/ఎకరా · 2+ వారాలు</span></li><li>HDPE చెరువు లైనర్</li><li>నీటి క్లోరినేషన్ <span class="dose">30 ppm TCCA · 48 గంటలు</span></li><li>నిల్వ సాంద్రత <span class="dose">గరిష్టం 60–80 PL/m²</span></li></ul><div class="step-label">చురుకైన EHP నిర్వహణ</div><ul class="rx"><li>సేంద్రియ ఆమ్లాలు ఆహారంలో <span class="dose">3–5 గ్రా/కి.గ్రా · 10–15 రోజులు</span></li><li>ప్రొబయోటిక్ <span class="dose">1 కి.గ్రా/ఎకరా పక్షానికోసారి</span></li><li>నీటి మార్పు <span class="dose">DOC 40+ నుండి రోజూ 15–20%</span></li><li>DOC 60 నాటికి పాక్షిక వేట — బరువు వ్యత్యాసం &gt;25%</li></ul>`
},
{id:"ahpnd",icon:"⚡",color:"c-orange",tab:"dis",
 tags:[{c:"tag-bact",t:"Bacterial · Vibrio"},{c:"tag-crit",t:"Mass Mortality &lt;DOC 30"}],
 title:{en:"AHPND / EMS — Vibriosis",bn:"AHPND/EMS — ভিব্রিওসিস",te:"AHPND/EMS — విబ్రియోసిస్"},
 sub:{en:"V. parahaemolyticus · $40M India · No antibiotic",bn:"V. parahaemolyticus · ভারতে $৪০M ক্ষতি",te:"V. parahaemolyticus · $40M భారత్"},
 en:`<div class="elab-block"><div class="elab-head">Agent &amp; Mechanism</div>V. parahaemolyticus strains carrying pVA1 plasmid produce PirA/PirB binary toxins causing acute HP tubule epithelium destruction. V. harveyi (luminescent) — infected shrimp glow green under UV at night. India east coast: V. parahaemolyticus 27.7%, V. alginolyticus 16.1%, V. harveyi 13.1%.</div><div class="symp-h">Field Identification</div><div class="symp-t">AHPND: Mass mortality within first 20–30 DOC. HP pale, white, mushy. Shrimp spiral-swim then sink and die. Vibriosis: shrimp glow green-blue under UV flashlight at night (V. harveyi). Opaque white muscles. Necrotic appendages. Black gills.</div><div class="step-label">Prevention</div><ul class="rx"><li>TCCA reservoir treatment <span class="dose">1 ppm · 24 hrs</span></li><li>BKC 80% — routine Vibrio TVC control <span class="dose">500 mL/acre monthly</span></li><li>Probiotics — competitive exclusion in water and gut <span class="dose">1 kg/acre every 10 days</span></li><li>Organic acids in feed — gut acidification <span class="dose">3–5 g/kg</span></li><li>Monitor Vibrio TVC weekly from DOC 30 — target &lt;10³ CFU/mL</li><li>Maintain pH 7.8–8.2 — Vibrio grows best at 7.0–7.5</li></ul><div class="step-label">Active Vibriosis Management</div><ul class="rx"><li>TCCA pond treatment <span class="dose">0.5 ppm · evening · all aerators ON</span></li><li>BKC 80% <span class="dose">250 mL/acre — alternate with TCCA</span></li><li>Probiotic surge dose <span class="dose">2 kg/acre</span></li><li>NO antibiotics without confirmed sensitivity testing + registered vet prescription</li></ul><div class="inl-b"><span class="bxh">✖ MDR Warning</span>Multidrug-resistant V. parahaemolyticus dominates India east coast. Antibiotic residues = export rejection under FSSAI and EU regulations.</div>`,
 bn:`<div class="elab-block"><div class="elab-head">কারক ও প্রক্রিয়া</div>pVA1 প্লাজমিড-বহনকারী V. parahaemolyticus PirA/PirB টক্সিন তৈরি করে। V. harveyi (জ্বলজ্বলে) সংক্রমিত চিংড়ি রাতে UV আলোয় সবুজ জ্বলে।</div><div class="symp-h">মাঠ পরিচিতি</div><div class="symp-t">AHPND: DOC ২০–৩০-এ ৮০% পর্যন্ত গণমৃত্যু। HP ফ্যাকাশে, নরম। সর্পিলাকার সাঁতার তারপর মৃত্যু। UV আলোয় চিংড়ি জ্বলে (V. harveyi)।</div><div class="step-label">প্রতিরোধ</div><ul class="rx"><li>ভান্ডার TCCA চিকিৎসা <span class="dose">১ পিপিএম · ২৪ ঘণ্টা</span></li><li>BKC 80% <span class="dose">৫০০ মিলি/একর মাসিক</span></li><li>প্রোবায়োটিক <span class="dose">১ কেজি/একর প্রতি ১০ দিন</span></li><li>জৈব অ্যাসিড খাবারে <span class="dose">৩–৫ গ্রা/কেজি</span></li><li>DOC ৩০ থেকে সাপ্তাহিক Vibrio TVC পর্যবেক্ষণ</li></ul><div class="step-label">সক্রিয় ভিব্রিওসিস ব্যবস্থাপনা</div><ul class="rx"><li>TCCA পুকুর চিকিৎসা <span class="dose">০.৫ পিপিএম · সন্ধ্যায়</span></li><li>BKC 80% <span class="dose">২৫০ মিলি/একর</span></li><li>প্রোবায়োটিক বাড়তি মাত্রা <span class="dose">২ কেজি/একর</span></li><li>অ্যান্টিবায়োটিক নয় — ভেটেরিনারি প্রেসক্রিপশন ছাড়া</li></ul>`,
 te:`<div class="elab-block"><div class="elab-head">కారకం &amp; విధానం</div>pVA1 ప్లాస్మిడ్ బేరిరిన V. parahaemolyticus PirA/PirB టాక్సిన్లు తయారుచేస్తాయి. V. harveyi — సోకిన రొయ్యలు రాత్రి UV లో ఆకుపచ్చగా మెరుస్తాయి.</div><div class="symp-h">క్షేత్ర గుర్తింపు</div><div class="symp-t">AHPND: DOC 20–30 లో 80% వరకు గణ మరణం. HP లేత, మెత్తని. చుట్టు తిరిగి ఈదిన తర్వాత చనిపోతాయి. UV లో రొయ్యలు మెరుస్తాయి.</div><div class="step-label">నివారణ</div><ul class="rx"><li>నిల్వలో TCCA <span class="dose">1 ppm · 24 గంటలు</span></li><li>BKC 80% <span class="dose">500 మి.లీ/ఎకరా నెలవారీ</span></li><li>ప్రొబయోటిక్ <span class="dose">1 కి.గ్రా/ఎకరా 10 రోజులకోసారి</span></li><li>సేంద్రియ ఆమ్లాలు ఆహారంలో <span class="dose">3–5 గ్రా/కి.గ్రా</span></li><li>DOC 30 నుండి వారంవారీ Vibrio TVC పర్యవేక్షణ</li></ul><div class="step-label">చురుకైన విబ్రియోసిస్ నిర్వహణ</div><ul class="rx"><li>TCCA చెరువు చికిత్స <span class="dose">0.5 ppm · సాయంత్రం · అన్ని ఏరేటర్లు ఆన్</span></li><li>BKC 80% <span class="dose">250 మి.లీ/ఎకరా</span></li><li>ప్రొబయోటిక్ అదనపు మోతాదు <span class="dose">2 కి.గ్రా/ఎకరా</span></li><li>యాంటీబయోటిక్‌లు వద్దు — నమోదిత జంతువైద్యుని ప్రిస్క్రిప్షన్ లేకుండా</li></ul>`
},
{id:"rms",icon:"💔",color:"c-sky",tab:"dis",
 tags:[{c:"tag-enviro",t:"Multi-factorial"},{c:"tag-crit",t:"Chronic DOC 30–100"}],
 title:{en:"RMS — Running Mortality Syndrome",bn:"RMS — রানিং মর্টালিটি সিন্ড্রোম",te:"RMS — పరిగెత్తే మరణం సిండ్రోమ్"},
 sub:{en:"Daily losses · Survival 40–60% · Diagnose by exclusion",bn:"প্রতিদিন মৃত্যু · বেঁচে থাকা ৪০–৬০%",te:"నిత్యం మరణాలు · మనుగడ 40–60%"},
 en:`<div class="elab-block"><div class="elab-head">Not a Single Disease — A Failure Cascade</div>RMS = combination of poor seed quality (hatchery-stressed PL), high Vibrio load, shallow ponds (&lt;1.2 m), high organic load, water quality stress, and opportunistic bacterial infections. India survey: production loss 1.1 t/ha/crop. Diagnose only AFTER ruling out WSSV, EHP, AHPND by PCR.</div><div class="symp-h">Symptoms</div><div class="symp-t">Continuous daily mortality — 0.01–0.05% of stock dying on pond edges every morning. No single dramatic event. Shrimp lethargic with dark gill coloration. FCR deteriorating week by week. Survival at harvest 40–60% (expected 70–80%).</div><ul class="rx"><li>24/7 intensive aeration — minimum 1 HP per 1000 kg biomass</li><li>Reduce stocking density — partial harvest if &gt;DOC 50 <span class="dose">Target &lt;100/m²</span></li><li>Probiotic 10-day cycle throughout crop <span class="dose">1 kg/acre</span></li><li>Molasses when Vibrio TVC high <span class="dose">5 kg/acre dissolved</span></li><li>Daily water exchange DOC 40+ <span class="dose">10–15%</span></li><li>Vitamin C + immunostimulants <span class="dose">1–2 g/kg feed continuously</span></li><li>Increase depth ≥1.5 m — thermal and DO stability</li></ul>`,
 bn:`<div class="elab-block"><div class="elab-head">একক রোগ নয় — ব্যর্থতার শৃঙ্খল</div>দুর্বল বীজ মান + উচ্চ ভিব্রিও + অগভীর পুকুর + উচ্চ জৈব ভার + পানি মানের চাপের সংমিশ্রণ। ভারত সর্বেক্ষণ: ১.১ টন/হেক্টর/ফসল ক্ষতি। WSSV, EHP, AHPND PCR-এ বাদ দেওয়ার পরেই RMS নির্ণয়।</div><div class="symp-h">লক্ষণ</div><div class="symp-t">প্রতিদিন মজুদের ০.০১–০.০৫% পুকুর পাড়ে মরে। FCR ধীরে খারাপ হয়। বেঁচে থাকা ৪০–৬০%।</div><ul class="rx"><li>২৪/৭ নিবিড় বায়ু সঞ্চালন — প্রতি ১০০০ কেজিতে ১ HP</li><li>মজুদ ঘনত্ব কমান <span class="dose">সর্বোচ্চ ১০০/m²</span></li><li>প্রোবায়োটিক ১০ দিনের চক্র <span class="dose">১ কেজি/একর</span></li><li>গুড় (Vibrio বেশি হলে) <span class="dose">৫ কেজি/একর গুলিয়ে</span></li><li>DOC ৪০+ থেকে দৈনিক পানি বদল <span class="dose">১০–১৫%</span></li><li>ভিটামিন C + ইমিউনোস্টিমুল্যান্ট <span class="dose">১–২ গ্রা/কেজি খাবার</span></li></ul>`,
 te:`<div class="elab-block"><div class="elab-head">ఏకైక వ్యాధి కాదు — వైఫల్యాల శ్రేణి</div>పేలవమైన విత్తన నాణ్యత + అధిక విబ్రియో + నిస్సారమైన చెరువులు + అధిక సేంద్రియ భారం కలయిక. భారత్ సర్వే: 1.1 టన్నులు/హెక్టార్/పంట నష్టం. WSSV, EHP, AHPND PCR లో తోసిపుచ్చిన తర్వాతే నిర్ధారణ.</div><div class="symp-h">లక్షణాలు</div><div class="symp-t">నిల్వలో 0.01–0.05% రోజూ చనిపోతాయి. FCR క్రమంగా దెబ్బతింటుంది. మనుగడ 40–60%.</div><ul class="rx"><li>24/7 నిబిడ గాలి సంచలనం — 1000 కి.గ్రా జీవభారానికి కనిష్టం 1 HP</li><li>నిల్వ సాంద్రత తగ్గించండి <span class="dose">గరిష్టం 100/m²</span></li><li>ప్రొబయోటిక్ 10-రోజు చక్రం <span class="dose">1 కి.గ్రా/ఎకరా</span></li><li>మొలాసెస్ <span class="dose">5 కి.గ్రా/ఎకరా</span></li><li>DOC 40+ నుండి నిత్యం నీటి మార్పు <span class="dose">10–15%</span></li><li>విటమిన్ C + ఇమ్యూనోస్టిమ్యులెంట్లు <span class="dose">1–2 గ్రా/కి.గ్రా ఆహారం</span></li></ul>`
},
{id:"wfs",icon:"⬜",color:"c-gold",tab:"dis",
 tags:[{c:"tag-para",t:"EHP + Vibrio"},{c:"tag-enviro",t:"Gut &amp; Shell"}],
 title:{en:"WFS — White Feces &amp; Loose Shell",bn:"WFS — সাদা মল ও ঢিলা খোল",te:"WFS — తెల్ల మలం &amp; వదులైన గుల్ల"},
 sub:{en:"EHP + Vibrio + mineral deficiency combined",bn:"EHP + ভিব্রিও + খনিজ ঘাটতির সংমিশ্রণ",te:"EHP + విబ్రియో + ఖనిజ లోపం"},
 en:`<div class="elab-block"><div class="elab-head">Two Linked Problems</div>White feces = EHP-damaged HP + Vibrio gut infection + Gregarine intestinal parasite + overfeeding. Loose shell = Ca/Mg/alkalinity deficiency + moulting disruption. Both commonly occur together in stressed ponds.</div><div class="symp-h">Symptoms</div><div class="symp-t">White/pale stringy feces floating on pond surface and collecting in feed trays. HP pale, shrunken. Shell separates from body — soft even days after moulting. Reduced feeding and slow growth.</div><div class="step-label">White Feces Protocol</div><ul class="rx"><li>Reduce feeding 30–50% immediately</li><li>Probiotic pond + feed <span class="dose">Pond: 2 kg/acre · Feed: 3 g/kg</span></li><li>Organic acids in feed <span class="dose">3–5 g/kg · 15 days</span></li><li>Hepatoprotective supplement — liver tonic <span class="dose">1–2 kg/ton feed</span></li><li>Water exchange <span class="dose">15–20% daily</span></li></ul><div class="step-label">Loose Shell Protocol</div><ul class="rx"><li>Dolomite — Ca + Mg for cuticle biosynthesis <span class="dose">100 kg/acre</span></li><li>Ca + Mg mineral in feed <span class="dose">5 g/kg</span></li><li>Raise alkalinity to 150–180 ppm</li><li>Vitamin C + K <span class="dose">2 g/kg feed</span></li></ul>`,
 bn:`<div class="elab-block"><div class="elab-head">দুটি সম্পর্কিত সমস্যা</div>সাদা মল = EHP-ক্ষতিগ্রস্ত HP + ভিব্রিও অন্ত্র সংক্রমণ + গ্রেগারিন পরজীবী + অতিরিক্ত খাওয়ানো। ঢিলা খোল = Ca, Mg, ক্ষারত্বের ঘাটতি + মোল্টিং ব্যাঘাত।</div><div class="step-label">সাদা মল প্রোটোকল</div><ul class="rx"><li>খাওয়ানো ৩০–৫০% তক্ষুনি কমান</li><li>প্রোবায়োটিক <span class="dose">পুকুরে ২ কেজি/একর · খাবারে ৩ গ্রা/কেজি</span></li><li>জৈব অ্যাসিড <span class="dose">৩–৫ গ্রা/কেজি · ১৫ দিন</span></li><li>হেপাটোপ্রোটেক্টিভ সাপ্লিমেন্ট <span class="dose">১–২ কেজি/টন</span></li><li>পানি বদল <span class="dose">১৫–২০% প্রতিদিন</span></li></ul><div class="step-label">ঢিলা খোল প্রোটোকল</div><ul class="rx"><li>ডলোমাইট <span class="dose">১০০ কেজি/একর</span></li><li>Ca + Mg খাবারে <span class="dose">৫ গ্রা/কেজি</span></li><li>ক্ষারত্ব ১৫০–১৮০ পিপিএম</li><li>ভিটামিন C + K <span class="dose">২ গ্রা/কেজি</span></li></ul>`,
 te:`<div class="elab-block"><div class="elab-head">రెండు అనుసంధానించబడిన సమస్యలు</div>తెల్ల మలం = EHP-దెబ్బతిన్న HP + విబ్రియో పేగు సంక్రమణ + గ్రిగరైన్ పరాన్నజీవి + అతి ఆహారం. వదులైన గుల్ల = Ca, Mg, క్షారత లోపం + వలువ విడవడం అంతరాయం.</div><div class="step-label">తెల్ల మలం ప్రోటోకాల్</div><ul class="rx"><li>ఆహారం 30–50% వెంటనే తగ్గించండి</li><li>ప్రొబయోటిక్ <span class="dose">చెరువులో 2 కి.గ్రా/ఎకరా · ఆహారంలో 3 గ్రా/కి.గ్రా</span></li><li>సేంద్రియ ఆమ్లాలు <span class="dose">3–5 గ్రా/కి.గ్రా · 15 రోజులు</span></li><li>హెపటోప్రొటెక్టివ్ సప్లిమెంట్ <span class="dose">1–2 కి.గ్రా/టన్</span></li><li>నీటి మార్పు <span class="dose">15–20% నిత్యం</span></li></ul><div class="step-label">వదులైన గుల్ల ప్రోటోకాల్</div><ul class="rx"><li>డోలమైట్ <span class="dose">100 కి.గ్రా/ఎకరా</span></li><li>Ca + Mg ఆహారంలో <span class="dose">5 గ్రా/కి.గ్రా</span></li><li>క్షారత 150–180 ppm</li><li>విటమిన్ C + K <span class="dose">2 గ్రా/కి.గ్రా</span></li></ul>`
},
{id:"blackgill",icon:"🖤",color:"c-teal",tab:"dis",
 tags:[{c:"tag-para",t:"Ciliate + Fusarium"},{c:"tag-enviro",t:"Low DO Trigger"}],
 title:{en:"Black Gill Disease",bn:"কালো ফুলকা রোগ",te:"నల్ల గిల్ వ్యాధి"},
 sub:{en:"Ciliate + fungal fouling · Immunity is the real defence",bn:"সিলিয়েট + ছত্রাক · রোগ প্রতিরোধ শক্তিই রক্ষা",te:"సిలియేట్ + శిలీంధ్రం · రోగనిరోధకత నిజమైన రక్షణ"},
 en:`<div class="elab-block"><div class="elab-head">Host Immunity Is the Real Defence</div>Zoothamnium, Epistylis, Vorticella (ciliates) + Fusarium + bacteria colonise gills only when host immunity is compromised by low DO, high organic load, or H₂S. 22% of east India coastal farms showed darkened gills in suboptimal ponds.</div><div class="symp-h">Symptoms</div><div class="symp-t">Gills turn grey, brown, or black (normal: pale pink-white). Fluffy/slimy fouling material on gill surface. Shrimp surface-gasping to increase O₂. FCR worsens despite adequate feeding.</div><ul class="rx"><li>Emergency aeration — all aerators ON immediately</li><li>Water exchange <span class="dose">20–25%</span></li><li>BKC 80% <span class="dose">500 mL/acre · evening</span></li><li>TCCA <span class="dose">0.5 ppm · evening · alternate with BKC</span></li><li>Zeolite <span class="dose">15 kg/acre</span></li><li>Dolomite — raise pH, suppress ciliate environment <span class="dose">100 kg/acre</span></li></ul><div class="inl-t"><span class="bxh">Prevention</span>Fortnightly BKC + probiotic alternation dramatically reduces incidence. Maintain DO &gt;5 mg/L — healthy shrimp resist ciliate colonisation even in contaminated water.</div>`,
 bn:`<div class="elab-block"><div class="elab-head">পোষক রোগ প্রতিরোধ শক্তিই আসল রক্ষা</div>কম DO, উচ্চ জৈব ভার বা H₂S-এ দুর্বল চিংড়ির ফুলকায় জুথ্যামনিয়াম, এপিস্টিলিস, ফিউসারিয়াম আক্রমণ করে। ২২% পূর্ব ভারত উপকূলীয় পুকুরে ফুলকা কালোকরণ।</div><div class="symp-h">লক্ষণ</div><div class="symp-t">ফুলকা ধূসর, বাদামী বা কালো। চিংড়ি উপরে O₂ নিতে যায়। FCR খারাপ হয়।</div><ul class="rx"><li>সব এয়ারেটর তক্ষুনি চালু</li><li>পানি বদল <span class="dose">২০–২৫%</span></li><li>BKC 80% <span class="dose">৫০০ মিলি/একর · সন্ধ্যায়</span></li><li>TCCA <span class="dose">০.৫ পিপিএম · সন্ধ্যায়</span></li><li>জিওলাইট <span class="dose">১৫ কেজি/একর</span></li><li>ডলোমাইট <span class="dose">১০০ কেজি/একর</span></li></ul><div class="inl-t"><span class="bxh">প্রতিরোধ</span>পক্ষকালে BKC + প্রোবায়োটিক পর্যায়ক্রমে দিন। DO &gt;৫ বজায় রাখুন।</div>`,
 te:`<div class="elab-block"><div class="elab-head">అతిథి రోగనిరోధకత నిజమైన రక్షణ</div>తక్కువ DO, అధిక సేంద్రియ భారం లేదా H₂S లో బలహీనపడిన రొయ్యల గిల్‌లపై జూథ్యాంమ్నియమ్, ఎపిస్టిలిస్, ఫ్యుసారియమ్ వలసపోతాయి. 22% తూర్పు భారత్ తీర చెరువులలో నల్లని గిల్స్.</div><div class="symp-h">లక్షణాలు</div><div class="symp-t">గిల్స్ బూడిద, గోధుమ, లేదా నల్లగా మారుతాయి. రొయ్యలు O₂ కోసం పైకి వస్తాయి. FCR దెబ్బతింటుంది.</div><ul class="rx"><li>అన్ని ఏరేటర్లు వెంటనే ఆన్</li><li>నీటి మార్పు <span class="dose">20–25%</span></li><li>BKC 80% <span class="dose">500 మి.లీ/ఎకరా · సాయంత్రం</span></li><li>TCCA <span class="dose">0.5 ppm · సాయంత్రం</span></li><li>జియోలైట్ <span class="dose">15 కి.గ్రా/ఎకరా</span></li><li>డోలమైట్ <span class="dose">100 కి.గ్రా/ఎకరా</span></li></ul><div class="inl-t"><span class="bxh">నివారణ</span>పక్షానికోసారి BKC + ప్రొబయోటిక్ పర్యాయంగా. DO &gt;5 నిర్వహించండి.</div>`
},

{id:"whitemuscle",icon:"⚪",color:"c-green",tab:"dis",
 tags:[{c:"tag-enviro",t:"Mg Zn K Deficiency"},{c:"tag-enviro",t:"Osmotic Stress"}],
 title:{en:"White Muscle, Gut &amp; Cramp",bn:"সাদা পেশি, পেট ও পেশি টান",te:"తెల్ల కండరం, ప్రేగు &amp; తిమ్మిర్లు"},
 sub:{en:"Mineral deficiency · Osmotic shock · Ionic imbalance",bn:"খনিজ ঘাটতি · অসমোটিক শক",te:"ఖనిజ లోపం · ఆస్మోటిక్ షాక్"},
 en:`<div class="elab-block"><div class="elab-head">Cause Matrix</div>White gut = gut cleared of microbiome (starvation, Vibrio, EHP HP failure — midgut appears white/empty on dissection). White muscle = Mg and Zn deficiency + temperature stress — opaque white patches on abdominal segments. Muscle cramp = osmotic shock, low Mg, low K, abrupt salinity change &gt;5 ppt — bent/curled body at tail, cannot swim straight. Inland 4–10 ppt ponds at highest risk — K and Mg proportionally even lower than NaCl.</div><ul class="rx"><li>Mg supplement (MgSO4) in feed <span class="dose">3–5 g/kg · 10 days</span></li><li>Zinc + manganese mineral supplement <span class="dose">1–2 g/kg feed</span></li><li>KCl inland ponds — K restoration <span class="dose">10 kg/acre</span></li><li>Raise salinity slowly if &lt;8 ppt <span class="dose">max 3 ppt/day</span></li><li>Probiotic + prebiotic — gut microbiome restoration <span class="dose">3–5 g + 2 g/kg feed</span></li><li>Vitamin E + C — antioxidant muscle support <span class="dose">2 g/kg feed</span></li></ul>`,
 bn:`<div class="elab-block"><div class="elab-head">কারণ ম্যাট্রিক্স</div>সাদা পেট = পেটের মাইক্রোবায়োম শূন্য। সাদা পেশি = Mg ও Zn ঘাটতি + তাপমাত্রার চাপ। পেশি টান = অসমোটিক শক, কম Mg, K, হঠাৎ লবণাক্ততা পরিবর্তন।</div><ul class="rx"><li>MgSO4 খাবারে <span class="dose">৩–৫ গ্রা/কেজি · ১০ দিন</span></li><li>জিংক + ম্যাঙ্গানিজ <span class="dose">১–২ গ্রা/কেজি</span></li><li>KCl <span class="dose">১০ কেজি/একর</span></li><li>লবণাক্ততা ধীরে বাড়ান <span class="dose">সর্বোচ্চ ৩ ppt/দিন</span></li><li>প্রোবায়োটিক + প্রিবায়োটিক <span class="dose">৩–৫ + ২ গ্রা/কেজি</span></li><li>ভিটামিন E + C <span class="dose">২ গ্রা/কেজি</span></li></ul>`,
 te:`<div class="elab-block"><div class="elab-head">కారణాల మ్యాట్రిక్స్</div>తెల్ల ప్రేగు = ప్రేగు మైక్రోబయోమ్ ఖాళీ. తెల్ల కండరం = Mg &amp; Zn లోపం + ఉష్ణ ఒత్తిడి. కండర తిమ్మిర్లు = ఆస్మోటిక్ షాక్, తక్కువ Mg, K, అకస్మాత్తు లవణీయత మార్పు.</div><ul class="rx"><li>MgSO4 ఆహారంలో <span class="dose">3–5 గ్రా/కి.గ్రా · 10 రోజులు</span></li><li>జింక్ + మాంగనీస్ <span class="dose">1–2 గ్రా/కి.గ్రా</span></li><li>KCl <span class="dose">10 కి.గ్రా/ఎకరా</span></li><li>లవణీయత నెమ్మదిగా పెంచండి <span class="dose">గరిష్టం 3 ppt/రోజు</span></li><li>ప్రొబయోటిక్ + ప్రీబయోటిక్ <span class="dose">3–5 + 2 గ్రా/కి.గ్రా</span></li><li>విటమిన్ E + C <span class="dose">2 గ్రా/కి.గ్రా</span></li></ul>`
},
{id:"moult",icon:"🦀",color:"c-pink",tab:"dis",
 tags:[{c:"tag-enviro",t:"Ca Mg Alkalinity"},{c:"tag-enviro",t:"Lunar Cycle"}],
 title:{en:"Moulting Failure — Soft Shell",bn:"মোল্টিং ব্যর্থতা — নরম খোল",te:"వలువ విడవడం వైఫల్యం"},
 sub:{en:"Incomplete moult + lunar clustering + cannibalism",bn:"অসম্পূর্ণ মোল্ট + চাঁদের চক্র + নরখাদকতা",te:"అసంపూర్ణ వలువ + చంద్ర చక్రం"},
 en:`<div class="elab-block"><div class="elab-head">Why Moults Fail</div>Moulting requires Ca uptake from water + alkalinity buffering for cuticle calcification. Below 80 ppm alkalinity, Ca uptake fails. Low Mg²⁺ impairs neuromuscular coordination during ecdysis. Abrupt pH, salinity, or temperature change during moult causes fatal "locked moult" — shrimp trapped between old and new cuticle.</div><div class="symp-h">Symptoms</div><div class="symp-t">Soft shell not hardening within 6–12 hours post-moult. Empty shells found with shrimp body still partially inside (fatal incomplete moult). Increased dawn mortality. Cannibalism marks on soft-shelled shrimp.</div><ul class="rx"><li>Maintain alkalinity DOC-appropriate at all times <span class="dose">120–180 ppm CaCO₃</span></li><li>Dolomite maintenance — fortnightly minimum <span class="dose">100 kg/ha</span></li><li>Ca + Mg + P mineral supplement in feed <span class="dose">5 g/kg</span></li><li>Vitamin C — chitin synthesis cofactor <span class="dose">2 g/kg feed</span></li><li>Stable salinity during moult windows — avoid changes &gt;2 ppt</li><li>Maximum night aeration — post-moult shrimp need highest DO</li><li>Reduce stocking density — reduce cannibalism opportunity</li></ul><div class="inl-t"><span class="bxh">Lunar Moult Tip</span>Shrimp moult on similar lunar cycles — clustering around new and full moon. Expect elevated vulnerability 48–72 hrs around these periods. Do NOT apply disinfectants in this window.</div>`,
 bn:`<div class="elab-block"><div class="elab-head">মোল্টিং ব্যর্থ কেন হয়</div>মোল্টিংয়ে পানি থেকে Ca + ক্ষারত্ব বাফারিং দরকার। ৮০ পিপিএম-এর নিচে Ca শোষণ ব্যর্থ। কম Mg²⁺ মোল্টিং সমন্বয় নষ্ট করে। হঠাৎ pH/লবণাক্ততা/তাপমাত্রা পরিবর্তনে "আটকে যাওয়া মোল্ট"।</div><div class="symp-h">লক্ষণ</div><div class="symp-t">মোল্টিংয়ের ৬–১২ ঘণ্টার মধ্যেও খোল শক্ত হয় না। অসম্পূর্ণ মোল্ট। ভোরে বেশি মৃত্যু। নরম চিংড়ির উপর নরখাদকতার দাগ।</div><ul class="rx"><li>সর্বদা DOC-অনুযায়ী ক্ষারত্ব <span class="dose">১২০–১৮০ পিপিএম CaCO₃</span></li><li>ডলোমাইট রক্ষণাবেক্ষণ <span class="dose">১০০ কেজি/হেক্টর পক্ষকালে</span></li><li>Ca + Mg + P খাবারে <span class="dose">৫ গ্রা/কেজি</span></li><li>ভিটামিন C <span class="dose">২ গ্রা/কেজি</span></li><li>মোল্টিং সময়ে লবণাক্ততা স্থিতিশীল রাখুন</li><li>রাতে সর্বোচ্চ বায়ু সঞ্চালন</li></ul><div class="inl-t"><span class="bxh">চাঁদের চক্রের টিপস</span>অমাবস্যা ও পূর্ণিমার কাছাকাছি ৪৮–৭২ ঘণ্টা বিশেষ সতর্কতা। এই সময়ে জীবাণুনাশক বা চাপমূলক নমুনা এড়ান।</div>`,
 te:`<div class="elab-block"><div class="elab-head">వలువ విడవడం ఎందుకు విఫలమవుతుంది</div>వలువ విడవడానికి నీటి నుండి Ca + క్షారత బఫరింగ్ అవసరం. 80 ppm కంటే తక్కువ క్షారత వద్ద Ca శోషణ విఫలం. తక్కువ Mg²⁺ నాడీకండర సమన్వయం దెబ్బతీస్తుంది.</div><div class="symp-h">లక్షణాలు</div><div class="symp-t">వలువ విడిచిన 6–12 గంటల్లోనూ గుల్ల గట్టిపడదు. అసంపూర్ణ వలువ. తెల్లవారు ఎక్కువ మరణాలు. మెత్తని రొయ్యలపై నరమాంస భక్షణ.</div><ul class="rx"><li>DOC ప్రకారం క్షారత నిర్వహించండి <span class="dose">120–180 ppm CaCO₃</span></li><li>డోలమైట్ నిర్వహణ <span class="dose">100 కి.గ్రా/హెక్టార్ పక్షానికోసారి</span></li><li>Ca + Mg + P ఆహారంలో <span class="dose">5 గ్రా/కి.గ్రా</span></li><li>విటమిన్ C <span class="dose">2 గ్రా/కి.గ్రా</span></li><li>వలువ విడవడం సమయంలో లవణీయత స్థిరంగా ఉంచండి</li><li>రాత్రి గరిష్ట గాలి సంచలనం</li></ul><div class="inl-t"><span class="bxh">చంద్ర వలువ చిట్కా</span>అమావాస్య &amp; పౌర్ణమి సమయంలో 48–72 గంటలు జాగ్రత్తగా ఉండండి. ఈ కాలంలో జీవాణురహిత ఔషధాలు వేయవద్దు.</div>`
}
]};

// ═══════════════════════════════════
// APP STATE
// ═══════════════════════════════════
let currentTab = 'wq';
let currentLang = 'en';
let currentId = null;
let touchStartX = 0;
const ALL = [...C.wq, ...C.dis].reduce((m, c) => (m[c.id] = c, m), {});

// ═══════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════
function setLang(l) {
  currentLang = l;
  document.documentElement.setAttribute('data-lang', l);
  document.querySelectorAll('.ls-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-l') === l);
  });
  try { localStorage.setItem('aqgl', l); } catch(e) {}
}

// ═══════════════════════════════════
// TAB
// ═══════════════════════════════════
function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-tab') === t);
  });
  renderList('');
  document.getElementById('search-box').value = '';
}

// ═══════════════════════════════════
// RENDER CARD LIST
// ═══════════════════════════════════
function renderList(q) {
  const list = document.getElementById('card-list');
  const cards = C[currentTab];
  const sq = (q || '').toLowerCase().trim();
  let html = '';
  let n = 0;

  cards.forEach(function(card) {
    const titleLower = card.title.en.toLowerCase();
    const subLower = card.sub.en.toLowerCase();
    const match = !sq || titleLower.includes(sq) || subLower.includes(sq)
      || card.title.bn.includes(sq) || card.title.te.includes(sq) || card.id.includes(sq);
    if (!match) return;
    n++;

    const tags = card.tags.map(function(t) {
      return '<span class="pc-tag ' + t.c + '">' + t.t + '</span>';
    }).join('');

    html += '<div class="pcard ' + card.color + '" data-id="' + card.id + '">'
      + '<div class="pc-icon">' + card.icon + '</div>'
      + '<div class="pc-body">'
        + '<div class="pc-title t-en">' + card.title.en + '</div>'
        + '<div class="pc-title t-bn">' + card.title.bn + '</div>'
        + '<div class="pc-title t-te">' + card.title.te + '</div>'
        + '<div class="pc-sub t-en">' + card.sub.en + '</div>'
        + '<div class="pc-sub t-bn">' + card.sub.bn + '</div>'
        + '<div class="pc-sub t-te">' + card.sub.te + '</div>'
        + '<div class="pc-tags">' + tags + '</div>'
      + '</div>'
      + '<div class="pc-arr">›</div>'
    + '</div>';
  });

  list.innerHTML = html;

  const empty = document.getElementById('empty-msg');
  empty.className = n ? '' : 'show';
}

// ═══════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════
function openDetail(id) {
  const card = ALL[id];
  if (!card) return;
  currentId = id;

  document.getElementById('d-icon').textContent = card.icon;
  document.getElementById('d-title').innerHTML =
    '<span class="t-en">' + card.title.en + '</span>' +
    '<span class="t-bn">' + card.title.bn + '</span>' +
    '<span class="t-te">' + card.title.te + '</span>';
  document.getElementById('d-sub').innerHTML =
    '<span class="t-en">' + card.sub.en + '</span>' +
    '<span class="t-bn">' + card.sub.bn + '</span>' +
    '<span class="t-te">' + card.sub.te + '</span>';

  const badgeHTML = (card.badges || []).map(function(b) {
    return '<span class="dbadge ' + b.c + '">' + b.t + '</span>';
  }).join('');
  document.getElementById('d-badges').innerHTML = badgeHTML;

  document.getElementById('den').innerHTML = card.en;
  document.getElementById('dbn').innerHTML = card.bn;
  document.getElementById('dte').innerHTML = card.te;
  document.getElementById('dscroll').scrollTop = 0;
  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  currentId = null;
}

// ═══════════════════════════════════
// EVENT LISTENERS — zero inline handlers
// ═══════════════════════════════════
document.querySelectorAll('.ls-btn').forEach(function(btn) {
  btn.addEventListener('click', function() { setLang(btn.getAttribute('data-l')); });
});

document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() { setTab(btn.getAttribute('data-tab')); });
});

document.getElementById('card-list').addEventListener('click', function(e) {
  var el = e.target;
  while (el && el !== this) {
    if (el.classList && el.classList.contains('pcard')) {
      openDetail(el.getAttribute('data-id'));
      return;
    }
    el = el.parentElement;
  }
});

document.getElementById('back-btn').addEventListener('click', closeDetail);

document.getElementById('search-box').addEventListener('input', function(e) {
  renderList(e.target.value);
});

// Swipe right to close detail
var dv = document.getElementById('detail');
dv.addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
dv.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  if (dx > 70 && touchStartX < 50) closeDetail();
}, { passive: true });

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
(function() {
  var saved = 'en';
  try { saved = localStorage.getItem('aqgl') || 'en'; } catch(e) {}
  setLang(saved);
  renderList('');
})();
</script>

</body>
</html>
