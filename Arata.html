<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shrimp Aqua Guide</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050e1a; --panel:#0d1f36; --p2:#071230;
  --bd:#18305a; --teal:#12c8d0; --gold:#e8b824;
  --red:#f06060; --orange:#f09040; --green:#44da88;
  --purple:#a070ff; --sky:#48ceff; --pink:#ff7ab0;
  --lime:#8ee030; --txt:#ddeeff; --mid:#88aacc; --dim:#4a6890;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--txt);
  font-family:'IBM Plex Sans',sans-serif;
}

/* Language */
.en,.bn,.te{display:none}
body.en .en{display:block}
body.bn .bn{display:block}
body.te .te{display:block}

.bn{font-family:'Hind Siliguri',sans-serif}
.te{font-family:'Noto Sans Telugu',sans-serif}

/* Top bar */
#bar{
  background:var(--panel);
  border-bottom:2px solid var(--teal);
  padding:10px;
}

.logo{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--teal);
  margin-bottom:6px;
}

.lpills{
  display:flex;
  gap:6px;
}

.lbtn{
  padding:4px 10px;
  border:none;
  border-radius:6px;
  background:#111;
  color:#ccc;
  cursor:pointer;
}

.lbtn.on{
  background:var(--teal);
  color:#000;
}

#srch{
  width:100%;
  margin-top:8px;
  padding:8px;
  border-radius:6px;
  border:1px solid var(--bd);
  background:#000;
  color:white;
}

/* Cards */
#list{padding:10px}

.card{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--panel);
  border-radius:8px;
  padding:10px;
  margin-bottom:8px;
  cursor:pointer;
}

.card:hover{opacity:0.85}

.ci{font-size:22px}
.ct{font-weight:700}

/* Detail */
#det{
  position:fixed;
  inset:0;
  background:var(--bg);
  transform:translateX(100%);
  transition:0.3s;
}

#det.open{transform:translateX(0)}

#back{
  margin:10px;
  border:none;
  background:none;
  color:var(--teal);
  font-size:14px;
  cursor:pointer;
}

#dscr{
  padding:12px;
}
</style>
</head>

<body class="en">

<div id="bar">
  <div class="logo">SHRIMP / AQUA GUIDE</div>

  <div class="lpills">
    <button class="lbtn on" data-l="en">EN</button>
    <button class="lbtn" data-l="bn">বাংলা</button>
    <button class="lbtn" data-l="te">తెలుగు</button>
  </div>

  <input id="srch" placeholder="Search problems...">
</div>

<div id="list"></div>

<div id="det">
  <button id="back">← Back</button>
  <div id="dscr"></div>
</div>

<script>
const CARDS = [
{
id:"do",
icon:"💨",
en:"Dissolved Oxygen (DO)",
bn:"দ্রবীভূত অক্সিজেন",
te:"కరిగిన ఆక్సిజన్",
content:"Critical parameter. Maintain above 5 mg/L. Low DO leads to stress, surface crowding, and death."
},
{
id:"ph",
icon:"⚖️",
en:"pH Balance",
bn:"pH ভারসাম্য",
te:"pH సమతుల్యత",
content:"Maintain between 7.5–8.5. High pH increases ammonia toxicity."
},
{
id:"ammonia",
icon:"☠️",
en:"Ammonia",
bn:"অ্যামোনিয়া",
te:"అమోనియా",
content:"Keep TAN below 0.1 mg/L. Toxic NH3 increases with pH."
},
{
id:"nitrite",
icon:"🔶",
en:"Nitrite",
bn:"নাইট্রাইট",
te:"నైట్రైట్",
content:"Causes brown blood disease. Maintain Cl:NO2 ratio."
}
];

let lang="en";

function render(q=""){
let html="";
CARDS.forEach(c=>{
if(q && !c.en.toLowerCase().includes(q)) return;

html+=`
<div class="card" onclick="openDetail('${c.id}')">
<div class="ci">${c.icon}</div>
<div>
<div class="ct ${lang}">${c[lang]}</div>
</div>
</div>`;
});

document.getElementById("list").innerHTML=html;
}

function openDetail(id){
const c=CARDS.find(x=>x.id===id);
document.getElementById("dscr").innerHTML=`
<h2>${c[lang]}</h2>
<p>${c.content}</p>
`;
document.getElementById("det").classList.add("open");
}

document.getElementById("back").onclick=()=>{
document.getElementById("det").classList.remove("open");
};

document.getElementById("srch").oninput=(e)=>{
render(e.target.value.toLowerCase());
};

document.querySelectorAll(".lbtn").forEach(b=>{
b.onclick=()=>{
lang=b.dataset.l;
document.body.className=lang;

document.querySelectorAll(".lbtn").forEach(x=>x.classList.remove("on"));
b.classList.add("on");

render();
};
});

render();
</script>

</body>
</html>
