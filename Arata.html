<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Shrimp Aqua Guide</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --bg:#050e1a; --panel:#0d1f36; --p2:#071230;
  --bd:#18305a; --teal:#12c8d0; --gold:#e8b824;
  --red:#f06060; --orange:#f09040; --green:#44da88;
  --purple:#a070ff; --sky:#48ceff; --pink:#ff7ab0;
  --lime:#8ee030; --txt:#ddeeff; --mid:#88aacc; --dim:#4a6890;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.5}

/* ── LANGUAGE — body class approach, NO !important needed ── */
.en,.bn,.te{display:none}
body.en .en{display:block}
body.bn .bn{display:block}
body.te .te{display:block}
.bn{font-family:‘Hind Siliguri’,sans-serif}
.te{font-family:‘Noto Sans Telugu’,sans-serif}

/* ── TOPBAR ── */
#bar{background:var(–panel);border-bottom:2px solid var(–teal);padding:10px 12px 8px}
.bar-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-family:‘IBM Plex Mono’,monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:var(–teal);text-transform:uppercase}
.logo span{color:var(–dim);font-weight:400}
.lpills{display:flex;background:var(–p2);border:1px solid var(–bd);border-radius:20px;padding:2px;gap:2px}
.lbtn{padding:4px 12px;border-radius:18px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(–dim);font-family:‘IBM Plex Sans’,sans-serif}
.lbtn.on{background:var(–teal);color:#000}
.lbtn[data-l=“te”].on{background:var(–purple);color:#fff}
#srch{width:100%;background:var(–p2);border:1px solid var(–bd);border-radius:8px;padding:7px 12px 7px 34px;color:var(–txt);font-size:13px;font-family:‘IBM Plex Sans’,sans-serif;outline:none;-webkit-appearance:none}
#srch::placeholder{color:var(–dim)}
#srch:focus{border-color:var(–teal)}
.sw{position:relative}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

/* ── TABS ── */
#tabs{display:flex;background:var(–p2);border-bottom:1px solid var(–bd)}
.tbtn{flex:1;padding:10px 4px;border:none;background:transparent;color:var(–dim);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:‘IBM Plex Sans’,sans-serif;border-bottom:2px solid transparent}
.tbtn.on{color:var(–teal);border-bottom-color:var(–teal)}
.tbtn.dis.on{color:var(–red);border-bottom-color:var(–red)}
.tc{font-family:‘IBM Plex Mono’,monospace;font-size:9px;background:rgba(255,255,255,.08);border-radius:8px;padding:1px 6px}

/* ── CARD LIST ── */
#list{padding:10px 12px 80px}
.card{display:flex;align-items:center;gap:10px;width:100%;background:var(–panel);border:1px solid var(–bd);border-left:3px solid;border-radius:10px;margin-bottom:9px;padding:11px 12px;cursor:pointer;text-align:left;-webkit-tap-highlight-color:transparent}
.card:active{opacity:.7}
.ci{font-size:22px;flex-shrink:0;width:32px;text-align:center}
.cb{flex:1;min-width:0;overflow:hidden}
.ct{font-size:13px;font-weight:700;color:var(–txt);line-height:1.3;margin-bottom:2px}
.cs{font-size:11px;color:var(–dim);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.ctags{display:flex;gap:3px;flex-wrap:wrap}
.tag{font-family:‘IBM Plex Mono’,monospace;font-size:8px;letter-spacing:.5px;text-transform:uppercase;padding:1px 5px;border-radius:3px;font-weight:700}
.ca{color:var(–dim);font-size:18px;flex-shrink:0}
/* card accent */
.ac-teal{border-left-color:var(–teal)} .ac-gold{border-left-color:var(–gold)}
.ac-red{border-left-color:var(–red)} .ac-orange{border-left-color:var(–orange)}
.ac-purple{border-left-color:var(–purple)} .ac-sky{border-left-color:var(–sky)}
.ac-green{border-left-color:var(–green)} .ac-pink{border-left-color:var(–pink)}
.ac-lime{border-left-color:var(–lime)}
/* tag colors */
.tv{background:rgba(240,96,96,.15);color:#ff9090}
.tb{background:rgba(240,144,64,.15);color:#ffb070}
.tp{background:rgba(160,112,255,.15);color:#c090ff}
.te-c{background:rgba(72,206,255,.15);color:#80d8ff}
.tk{background:rgba(240,96,96,.2);color:#ff8080}
.tw{background:rgba(18,200,208,.12);color:var(–teal)}
#nores{display:none;text-align:center;padding:60px 20px;color:var(–dim)}
#nores.show{display:block}

/* ── DETAIL PANEL ── */
#det{position:fixed;inset:0;z-index:99;background:var(–bg);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#det.open{transform:translateX(0)}
#dh{background:var(–panel);border-bottom:2px solid var(–teal);padding:12px 14px 10px;flex-shrink:0}
#back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(–teal);font-size:13px;font-weight:700;cursor:pointer;padding:0;margin-bottom:8px;font-family:‘IBM Plex Sans’,sans-serif}
#dico{font-size:26px;margin-bottom:3px}
#dtit{font-size:16px;font-weight:700;line-height:1.3;color:var(–txt)}
#dsub{font-size:10px;color:var(–dim);margin-top:2px;font-family:‘IBM Plex Mono’,monospace;letter-spacing:.5px}
#dbdg{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.dbadge{font-family:‘IBM Plex Mono’,monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;border-radius:4px;padding:2px 7px;font-weight:700}
#dscr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px}

/* ── DETAIL CONTENT ── */
.or{display:flex;align-items:baseline;gap:6px;background:var(–p2);border-radius:6px;padding:6px 9px;margin-bottom:8px;flex-wrap:wrap}
.ok{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:var(–dim);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.ov{font-family:‘IBM Plex Mono’,monospace;font-size:11px;font-weight:700;color:var(–green)}
.eb{background:rgba(18,200,208,.05);border:1px solid rgba(18,200,208,.14);border-radius:6px;padding:9px 11px;margin-bottom:8px}
.eh{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:1.5px;color:var(–teal);text-transform:uppercase;margin-bottom:5px}
.pb{border-left:2px solid;border-radius:0 6px 6px 0;padding:8px 10px;margin-bottom:8px}
.pb.lo{border-color:#4080ff;background:rgba(64,128,255,.05)}
.pb.hi{border-color:var(–red);background:rgba(240,96,96,.05)}
.pb.sw{border-color:var(–orange);background:rgba(240,144,64,.05)}
.pb.wn{border-color:var(–gold);background:rgba(232,184,36,.05)}
.pb.ti{border-color:var(–teal);background:rgba(18,200,208,.07)}
.pl{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.pb.lo .pl{color:#6090ff}.pb.hi .pl{color:var(–red)}.pb.sw .pl{color:var(–orange)}.pb.wn .pl{color:var(–gold)}.pb.ti .pl{color:var(–teal)}
.ps{font-size:11.5px;color:var(–mid);margin-bottom:6px;font-style:italic;line-height:1.55}
.rx{list-style:none;display:flex;flex-direction:column;gap:4px}
.rx li{display:flex;align-items:baseline;gap:5px;font-size:12px;line-height:1.55}
.rx li::before{content:“→”;color:var(–teal);font-family:monospace;font-size:11px;flex-shrink:0}
.dose{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:var(–gold);background:rgba(232,184,36,.08);border-radius:4px;padding:1px 5px;margin-left:2px;white-space:nowrap}
.nt{font-size:10px;color:var(–dim);display:block;margin-left:14px;font-style:italic;margin-top:1px}
.sl{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:2px;color:var(–teal);text-transform:uppercase;border-bottom:1px solid rgba(24,48,90,.5);padding-bottom:3px;margin:10px 0 6px}
.iw{background:#1c1000;border:1px solid #a05010;border-radius:6px;padding:7px 10px;font-size:12px;color:#ffc840;margin-bottom:8px}
.ib{background:#160000;border:1px solid #901820;border-radius:6px;padding:7px 10px;font-size:12px;color:#ffb0b0;margin-bottom:8px}
.it{background:rgba(18,200,208,.07);border:1px solid rgba(18,200,208,.25);border-radius:6px;padding:7px 10px;font-size:12px;color:#55ddd5;margin-bottom:8px}
.bh{font-family:‘IBM Plex Mono’,monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:inline-block;margin-right:4px}
.iw .bh{color:var(–gold)}.ib .bh{color:var(–red)}.it .bh{color:var(–teal)}
.sc{background:rgba(232,184,36,.06);border:1px solid rgba(232,184,36,.2);border-radius:6px;padding:7px 9px;margin-bottom:8px}
.sc .zh{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:1.5px;color:var(–gold);text-transform:uppercase;margin-bottom:5px}
.sr{display:flex;align-items:baseline;gap:6px;font-size:12px;line-height:1.7}
.sz{font-family:‘IBM Plex Mono’,monospace;font-size:10px;color:var(–gold);white-space:nowrap;min-width:65px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ec{background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.25);border-radius:6px;padding:6px 9px;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.en_{font-family:‘IBM Plex Mono’,monospace;font-size:16px;font-weight:700;color:var(–red)}
.el{font-size:10px;color:var(–mid)}
.sh{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:2px;color:var(–dim);text-transform:uppercase;margin-bottom:4px;display:block}
.st{font-size:12px;color:var(–mid);line-height:1.6;margin-bottom:8px}
</style>

</head>
<body class="en">

<div id="bar">
  <div class="bar-r1">
    <div class="logo">SHRIMP<span> / AQUA GUIDE</span></div>
    <div class="lpills">
      <button class="lbtn on" data-l="en">EN</button>
      <button class="lbtn" data-l="bn">বাংলা</button>
      <button class="lbtn" data-l="te">తె</button>
    </div>
  </div>
  <div class="sw">
    <span class="si">🔍</span>
    <input id="srch" type="search" placeholder="Search problems…" autocomplete="off">
  </div>
</div>

<div id="tabs">
  <button class="tbtn on" data-tab="wq">💧 Water Quality <span class="tc">10</span></button>

</div>

<div id="list">
  <!-- cards rendered by JS -->
  <div id="nores">🔎 No results</div>
</div>

<div id="det">
  <div id="dh">
    <button id="back">← Back</button>

    <div id="dtit"></div>
    <div id="dsub"></div>
    <div id="dbdg"></div>

  <div id="dscr">
    <div id="den" class="en"></div>
    <div id="dbn" class="bn"></div>
    <div id="dte" class="te"></div>
  </div>
</div>

<script>
var CARDS = {
wq:[
{id:"do",icon:"💨",ac:"ac-teal",tags:[{c:"tw",t:"Water Quality"},{c:"tk",t:"Most Critical"}],
 ten:"Dissolved Oxygen (DO)",tbn:"দ্রবীভূত অক্সিজেন (DO)",tte:"కరిగిన ఆక్సిజన్ (DO)",
 sen:"Dawn 2–6 AM kill window · Bottom crisis first",sbn:"ভোর ২–৬টা বিপদজনক · তলায় সংকট আগে",ste:"తెల్లవారు 2–6 AM ప్రమాదం · నేల వద్ద ముందు",
 en:"<div class='or'><span class='ok'>Target</span><span class='ov'>≥5 mg/L day · ≥4 dawn · &gt;3 min</span></div><div class='eb'><div class='eh'>Why Bottom Crisis Hits First</div>Shrimp live at the pond floor — DO is always lowest there. At DO&lt;3, shrimp cannot extract O₂ across gill membranes — they surface-gasp. Within hours: gill damage, immune collapse, Vibrio invasion. DO crashes kill in hours, not days.</div><div class='pb lo'><div class='pl'>⬇ Low DO (&lt;4 mg/L) — Emergency</div><div class='ps'>Shrimp crowd edges &amp; surface at 2–5 AM. Feed tray empty next morning.</div><ul class='rx'><li>Run ALL aerators immediately — do not wait for daylight<span class='nt'>Dawn 2–6 AM is peak danger. Night watchman must check DO at 3 AM.</span></li><li>Emergency water exchange from clean reservoir <span class='dose'>20–30%</span></li><li>Stop feeding until DO stable ≥5 mg/L for 2+ hours</li><li>CaO (quicklime) <span class='dose'>8–12 kg/acre</span></li><li>Zeolite — absorb ammonia spike <span class='dose'>15–20 kg/acre</span></li><li>Remove dead shrimp immediately</li></ul></div><div class='pb hi'><div class='pl'>⬆ Supersaturation (&gt;12 mg/L) — Gas Bubble</div><ul class='rx'><li>Partial water exchange <span class='dose'>15–20%</span></li><li>Stop fertiliser. Cut feeding 50%.</li></ul></div><div class='iw'><span class='bh'>⚠ DO–Algae Crash</span>Dense bloom → DO 12+ at 2 PM → crash to 1–2 by 4 AM. Monitor Secchi daily. &lt;25 cm = crash within 24–48 hrs.</div>",
 bn:"<div class='or'><span class='ok'>লক্ষ্যমাত্রা</span><span class='ov'>≥৫ মি.গ্রা/লি (দিনে) · ≥৪ (ভোরে) · ন্যূনতম &gt;৩</span></div><div class='eb'><div class='eh'>চিংড়ি কেন তলায় আগে কষ্ট পায়</div>চিংড়ি পুকুরের তলায় বাস করে — সেখানে DO সর্বদা কম। DO &lt;৩-এ ফুলকা দিয়ে O₂ নেওয়া যায় না। ঘণ্টার মধ্যে ফুলকার ক্ষতি, ভিব্রিও সংক্রমণ।</div><div class='pb lo'><div class='pl'>⬇ কম DO (&lt;৪) — জরুরি পদক্ষেপ</div><ul class='rx'><li>সব এয়ারেটর তক্ষুনি চালু করুন<span class='nt'>ভোর ২–৬টা সর্বাধিক বিপজ্জনক। রাতের পাহারাদার ভোর ৩টায় DO মাপবে।</span></li><li>পরিষ্কার ভান্ডার থেকে জরুরি পানি বদল <span class='dose'>২০–৩০%</span></li><li>DO ≥৫ না হওয়া পর্যন্ত খাওয়ানো বন্ধ</li><li>CaO (পোড়া চুন) <span class='dose'>৮–১২ কেজি/একর</span></li><li>জিওলাইট <span class='dose'>১৫–২০ কেজি/একর</span></li><li>মরা চিংড়ি দ্রুত সরান</li></ul></div><div class='iw'><span class='bh'>⚠ শেওলা-অক্সিজেন চক্র</span>ঘন শেওলা → বিকেলে DO ১২+ → ভোর ৪টায় DO ১–২। সেচি &lt;২৫ সেমি = ২৪–৪৮ ঘণ্টায় ক্র্যাশ।</div>",
 te:"<div class='or'><span class='ok'>లక్ష్యం</span><span class='ov'>≥5 mg/L పగటి · ≥4 తెల్లవారు · కనిష్టం &gt;3</span></div><div class='eb'><div class='eh'>రొయ్యలు నేల వద్ద ఎందుకు ముందు కష్టపడతాయి</div>రొయ్యలు చెరువు నేలపై జీవిస్తాయి — DO అక్కడ ఎల్లప్పుడూ తక్కువ. DO &lt;3 వద్ద గిల్స్ O₂ తీసుకోలేవు. గంటల్లో నష్టం, విబ్రియో సంక్రమణ.</div><div class='pb lo'><div class='pl'>⬇ తక్కువ DO (&lt;4) — అత్యవసరం</div><ul class='rx'><li>అన్ని ఏరేటర్లు వెంటనే ఆన్<span class='nt'>తెల్లవారు 2–6 AM అత్యంత ప్రమాదకర. కాపలా 3 AM కి DO తనిఖీ చేయాలి.</span></li><li>నిల్వ నీటి నుండి అత్యవసర నీటి మార్పు <span class='dose'>20–30%</span></li><li>DO ≥5 స్థిరంగా వచ్చేంత వరకు ఆహారం ఆపండి</li><li>CaO <span class='dose'>8–12 కి.గ్రా/ఎకరా</span></li><li>జియోలైట్ <span class='dose'>15–20 కి.గ్రా/ఎకరా</span></li><li>చనిపోయిన రొయ్యలు వెంటనే తీసివేయండి</li></ul></div><div class='iw'><span class='bh'>⚠ ఆల్గే-DO చక్రం</span>దట్టమైన ఆల్గే → మధ్యాహ్నం DO 12+ → తెల్లవారు 4 AM కి DO 1–2. సెక్కి &lt;25 సెం.మీ = 24–48 గంటల్లో క్రాష్.</div>"},
{id:"ph",icon:"⚖️",ac:"ac-gold",tags:[{c:"tw",t:"Water Quality"},{c:"tw",t:"Ammonia Link"}],
 ten:"pH — Acid-Base Balance",tbn:"pH — অম্ল-ক্ষার ভারসাম্য",tte:"pH — ఆమ్ల-క్షార సమతుల్యత",
 sen:"NH₃ 10× more toxic at pH 9 · Swing ≤0.5/day",sbn:"pH ৯-এ NH₃ ১০× বিষাক্ত",ste:"pH 9 వద్ద NH₃ 10× విషపూరితం",
 en:"<div class='or'><span class='ok'>Target</span><span class='ov'>7.5–8.5 · AM 7.8 · PM 8.3 · Swing ≤0.5/day</span></div><div class='eb'><div class='eh'>pH Management = Ammonia Management</div>At pH 7.5: only 0.3% of TAN is toxic NH₃. At pH 8.5 → 3%. At pH 9.0 → 15%. Every algae bloom pushes pH up as CO₂ is consumed — simultaneously amplifying ammonia toxicity tenfold.</div><div class='pb lo'><div class='pl'>⬇ Low pH (&lt;7.5) — Acid Pond</div><ul class='rx'><li>Agricultural lime Ca(OH)₂ — fastest <span class='dose'>100–200 kg/acre</span><span class='nt'>Apply at dusk. Check pH next morning. Raises 0.5–1.0 per application.</span></li><li>Dolomite CaMg(CO₃)₂ — sustained buffering <span class='dose'>100–200 kg/ha fortnightly</span></li><li>CaO — dry pond inter-crop treatment <span class='dose'>300–400 kg/acre</span></li></ul></div><div class='pb hi'><div class='pl'>⬆ High pH (&gt;9.0) — Algae Bloom</div><ul class='rx'><li>Alum Al₂(SO₄)₃ <span class='dose'>5–10 kg/acre</span></li><li>Gypsum CaSO₄ <span class='dose'>50–75 kg/acre</span></li><li>Partial water exchange <span class='dose'>15–20%</span></li><li>Probiotic <span class='dose'>1 kg/acre</span></li></ul></div><div class='pb sw'><div class='pl'>↕ Wide Diurnal Swing (&gt;0.5 units)</div><ul class='rx'><li>Dolomite — raise buffering to 150–180 ppm <span class='dose'>100–200 kg/ha fortnightly</span></li><li>Water exchange <span class='dose'>10–15% daily × 3–5 days</span></li></ul></div>",
 bn:"<div class='or'><span class='ok'>লক্ষ্যমাত্রা</span><span class='ov'>৭.৫–৮.৫ · ভোরে ৭.৮ · বিকেলে ৮.৩</span></div><div class='eb'><div class='eh'>pH ব্যবস্থাপনা = অ্যামোনিয়া ব্যবস্থাপনা</div>pH ৭.৫-এ TAN-এর মাত্র ০.৩% বিষাক্ত NH₃। pH ৮.৫-এ → ৩%। pH ৯.০-এ → ১৫%।</div><div class='pb lo'><div class='pl'>⬇ কম pH (&lt;৭.৫)</div><ul class='rx'><li>কৃষি চুন Ca(OH)₂ <span class='dose'>১০০–২০০ কেজি/একর</span><span class='nt'>সন্ধ্যায় দিন। পরের দিন pH মাপুন।</span></li><li>ডলোমাইট <span class='dose'>১০০–২০০ কেজি/হেক্টর পক্ষকালে</span></li><li>CaO <span class='dose'>৩০০–৪০০ কেজি/একর</span></li></ul></div><div class='pb hi'><div class='pl'>⬆ বেশি pH (&gt;৯.০)</div><ul class='rx'><li>ফিটকিরি Al₂(SO₄)₃ <span class='dose'>৫–১০ কেজি/একর</span></li><li>জিপসাম CaSO₄ <span class='dose'>৫০–৭৫ কেজি/একর</span></li><li>আংশিক পানি বদল <span class='dose'>১৫–২০%</span></li></ul></div>",
 te:"<div class='or'><span class='ok'>లక్ష్యం</span><span class='ov'>7.5–8.5 · తెల్లవారు 7.8 · మధ్యాహ్నం 8.3</span></div><div class='eb'><div class='eh'>pH నిర్వహణ = అమోనియా నిర్వహణ</div>pH 7.5 వద్ద TAN లో 0.3% మాత్రమే NH₃. pH 8.5 వద్ద → 3%. pH 9.0 వద్ద → 15%.</div><div class='pb lo'><div class='pl'>⬇ తక్కువ pH (&lt;7.5)</div><ul class='rx'><li>వ్యవసాయ సున్నం Ca(OH)₂ <span class='dose'>100–200 కి.గ్రా/ఎకరా</span><span class='nt'>సాయంత్రం వేయండి. మరుసటి రోజు pH తనిఖీ చేయండి.</span></li><li>డోలమైట్ <span class='dose'>100–200 కి.గ్రా/హెక్టార్ పక్షానికోసారి</span></li></ul></div><div class='pb hi'><div class='pl'>⬆ అధిక pH (&gt;9.0)</div><ul class='rx'><li>అలం Al₂(SO₄)₃ <span class='dose'>5–10 కి.గ్రా/ఎకరా</span></li><li>జిప్సం CaSO₄ <span class='dose'>50–75 కి.గ్రా/ఎకరా</span></li><li>పాక్షిక నీటి మార్పు <span class='dose'>15–20%</span></li></ul></div>"},
{id:"ammonia",icon:"☠️",ac:"ac-red",tags:[{c:"tw",t:"Water Quality"},{c:"tk",t:"pH Amplified"}],
 ten:"Ammonia (TAN / NH₃)",tbn:"অ্যামোনিয়া (TAN / NH₃)",tte:"అమోనియా (TAN / NH₃)",
 sen:"10× more toxic at pH 9 · Gill damage gateway",sbn:"pH ৯-এ ১০× বিষাক্ত",ste:"pH 9 వద్ద 10× విషపూరితం",
 en:"<div class='or'><span class='ok'>Target</span><span class='ov'>TAN ≤0.1 mg/L · NH₃ &lt;0.01 mg/L</span></div><div class='eb'><div class='eh'>Two Forms — One Harmless, One Lethal</div>Ammonia exists as NH₄⁺ (harmless) and NH₃ (toxic). As pH and temperature rise, more shifts to toxic NH₃. At pH 9.0 and 32°C, up to 20% of TAN is NH₃ — opening the door to Vibrio septicaemia.</div><div class='pb hi'><div class='pl'>Elevated TAN (&gt;0.1 mg/L)</div><div class='ps'>Reduced feeding (first sign). Gill reddening. Sluggish at edges.</div><ul class='rx'><li>Stop feeding — cut primary nitrogen input immediately</li><li>Water exchange <span class='dose'>15–25%</span></li><li>Zeolite (clinoptilolite) <span class='dose'>15–20 kg/acre</span><span class='nt'>Most effective at &lt;5 ppt. Drops above 15 ppt due to Na⁺ competition.</span></li><li>Molasses — C:N for heterotrophic bacteria <span class='dose'>5–10 kg/acre dissolved</span></li><li>Probiotics (Bacillus) <span class='dose'>1 kg/acre</span></li><li>Maintain pH 7.5–8.0 — keeps toxic NH₃ fraction low</li></ul></div><div class='iw'><span class='bh'>⚠ pH Multiplier</span>At pH 8.5 &amp; 30°C → ~5% TAN is NH₃. At pH 9.0 → ~15%. Any algae bloom pH spike converts moderate TAN into an immediate lethal crisis.</div>",
 bn:"<div class='or'><span class='ok'>লক্ষ্যমাত্রা</span><span class='ov'>TAN ≤০.১ মি.গ্রা/লি · NH₃ &lt;০.০১</span></div><div class='eb'><div class='eh'>দুই রূপ — একটি নিরীহ, একটি মারণ</div>NH₄⁺ (নিরীহ) ও NH₃ (বিষাক্ত)। pH ও তাপমাত্রা বাড়লে বেশি NH₃ হয়। pH ৯.০ ও ৩২°C-এ TAN-এর ২০% পর্যন্ত NH₃।</div><div class='pb hi'><div class='pl'>উচ্চ TAN (&gt;০.১)</div><ul class='rx'><li>খাওয়ানো বন্ধ করুন</li><li>পানি বদল <span class='dose'>১৫–২৫%</span></li><li>জিওলাইট <span class='dose'>১৫–২০ কেজি/একর</span></li><li>গুড় <span class='dose'>৫–১০ কেজি/একর গুলিয়ে</span></li><li>প্রোবায়োটিক <span class='dose'>১ কেজি/একর</span></li><li>pH ৭.৫–৮.০ বজায় রাখুন</li></ul></div>",
 te:"<div class='or'><span class='ok'>లక్ష్యం</span><span class='ov'>TAN ≤0.1 mg/L · NH₃ &lt;0.01 mg/L</span></div><div class='eb'><div class='eh'>రెండు రూపాలు — ఒకటి హానిరహితం, ఒకటి మారణం</div>NH₄⁺ (హానిరహితం) &amp; NH₃ (విషపూరితం). pH &amp; ఉష్ణోగ్రత పెరిగే కొద్దీ ఎక్కువ NH₃ అవుతుంది.</div><div class='pb hi'><div class='pl'>అధిక TAN (&gt;0.1)</div><ul class='rx'><li>ఆహారం ఆపండి</li><li>నీటి మార్పు <span class='dose'>15–25%</span></li><li>జియోలైట్ <span class='dose'>15–20 కి.గ్రా/ఎకరా</span></li><li>మొలాసెస్ <span class='dose'>5–10 కి.గ్రా/ఎకరా కరిగించి</span></li><li>ప్రొబయోటిక్ <span class='dose'>1 కి.గ్రా/ఎకరా</span></li><li>pH 7.5–8.0 నిర్వహించండి</li></ul></div>"},
{id:"nitrite",icon:"🔶",ac:"ac-orange",tags:[{c:"tw",t:"Water Quality"},{c:"tk",t:"Inland Risk"}],
 ten:"Nitrite (NO₂⁻) — Brown Blood",tbn:"নাইট্রাইট (NO₂⁻) — বাদামী রক্ত",tte:"నైట్రైట్ (NO₂⁻) — గోధుమ రక్తం",
 sen:"Cl:NO₂ ≥20:1 critical · Inland &lt;8 ppt = extreme danger",sbn:"৪–৮ ppt পুকুরে চরম ঝুঁকি",ste:"4–8 ppt లో తీవ్ర ముప్పు",
 en:"<div class='or'><span class='ok'>Target</span><span class='ov'>&lt;0.1 mg/L · Cl:NO₂ ≥20:1 (inland critical)</span></div><div class='eb'><div class='eh'>Why Inland Ponds Face Extreme Danger</div>Nitrite competes with chloride (Cl⁻) for gill membrane uptake. At 4–8 ppt inland ponds, Cl⁻ is scarce — even 0.3 mg/L NO₂ causes methaemoglobinaemia (blood loses O₂-carrying capacity).</div><div class='sc'><div class='zh'>Salinity-Specific Nitrite Risk</div><div class='sr'><span class='sz'>4–8 ppt</span>Extreme risk. 0.3 mg/L = crisis. Add NaCl/KCl immediately.</div><div class='sr'><span class='sz'>8–15 ppt</span>High risk — monitor closely.</div><div class='sr'><span class='sz'>15–30 ppt</span>Natural Cl⁻ buffer. Usually manageable.</div></div><div class='pb hi'><div class='pl'>Nitrite Spike — Emergency</div><ul class='rx'><li>Emergency NaCl — raises Cl⁻ to outcompete NO₂ at gill <span class='dose'>20–50 kg/acre</span></li><li>KCl — where K⁺ also deficient <span class='dose'>10–20 kg/acre</span></li><li>Water exchange <span class='dose'>20–30%</span></li><li>Zeolite <span class='dose'>15 kg/acre</span></li><li>Probiotic — complete N-cycle faster <span class='dose'>1 kg/acre</span></li></ul></div>",
 bn:"<div class='or'><span class='ok'>লক্ষ্যমাত্রা</span><span class='ov'>&lt;০.১ মি.গ্রা/লি · Cl:NO₂ ≥২০:১</span></div><div class='eb'><div class='eh'>কম লবণাক্ত পুকুরে বিপদ বেশি কেন</div>৪–৮ ppt-এ Cl⁻ কম — ০.৩ মি.গ্রা/লি NO₂-তেই মেথেমোগ্লোবিনেমিয়া।</div><div class='sc'><div class='zh'>লবণাক্ততা অনুযায়ী ঝুঁকি</div><div class='sr'><span class='sz'>৪–৮ ppt</span>চরম ঝুঁকি। NaCl/KCl অবিলম্বে।</div><div class='sr'><span class='sz'>৮–১৫ ppt</span>উচ্চ ঝুঁকি। নিবিড় পর্যবেক্ষণ।</div><div class='sr'><span class='sz'>১৫–৩০ ppt</span>প্রাকৃতিক Cl⁻ সুরক্ষা দেয়।</div></div><div class='pb hi'><div class='pl'>নাইট্রাইট স্পাইক — জরুরি</div><ul class='rx'><li>NaCl জরুরি <span class='dose'>২০–৫০ কেজি/একর</span></li><li>KCl <span class='dose'>১০–২০ কেজি/একর</span></li><li>পানি বদল <span class='dose'>২০–৩০%</span></li><li>জিওলাইট <span class='dose'>১৫ কেজি/একর</span></li><li>প্রোবায়োটিক <span class='dose'>১ কেজি/একর</span></li></ul></div>",
 te:"<div class='or'><span class='ok'>లక్ష్యం</span><span class='ov'>&lt;0.1 mg/L · Cl:NO₂ ≥20:1</span></div><div class='eb'><div class='eh'>తక్కువ లవణీయత చెరువులలో ఎందుకు అత్యధిక ముప్పు</div>4–8 ppt లో Cl⁻ కొద్దిగా — 0.3 mg/L NO₂ తో మెత్‌హీమోగ్లోబినీమియా.</div><div class='sc'><div class='zh'>లవణీయత ప్రకారం ముప్పు</div><div class='sr'><span class='sz'>4–8 ppt</span>తీవ్ర ముప్పు. NaCl/KCl వెంటనే.</div><div class='sr'><span class='sz'>8–15 ppt</span>అధిక ముప్పు. నిఘా పెంచండి.</div><div class='sr'><span class='sz'>15–30 ppt</span>సహజ Cl⁻ రక్షణ.</div></div><div class='pb hi'><div class='pl'>నైట్రైట్ స్పైక్ — అత్యవసరం</div><ul class='rx'><li>NaCl అత్యవసర <span class='dose'>20–50 కి.గ్రా/ఎకరా</span></li><li>KCl <span class='dose'>10–20 కి.గ్రా/ఎకరా</span></li><li>నీటి మార్పు <span class='dose'>20–30%</span></li><li>జియోలైట్ <span class='dose'>15 కి.గ్రా/ఎకరా</span></li><li>ప్రొబయోటిక్ <span class='dose'>1 కి.గ్రా/ఎకరా</span></li></ul></div>"},
{id:"h2s",icon:"🖤",ac:"ac-purple",tags:[{c:"tw",t:"Water Quality"},{c:"tk",t:"Silent Killer"}],
 ten:"H₂S — Hydrogen Sulfide",tbn:"H₂S — হাইড্রোজেন সালফাইড",tte:"H₂S — హైడ్రోజన్ సల్ఫైడ్",
 sen:"0.1 ppm = loss of equilibrium · 4 ppm = instant death",sbn:"পচা ডিমের গন্ধ · মোনোডন সর্বাধিক ঝুঁকিতে",ste:"కుళ్ళిన గుడ్ల వాసన · మోనోడన్ అత్యధిక ముప్పు",
 en:"<div class='or'><span class='ok'>Target</span><span class='ov'>0 — undetectable · &lt;0.01 mg/L absolute maximum</span></div><div class='eb'><div class='eh'>How H₂S Forms — The Black Bottom Cycle</div>Sulphate-reducing bacteria (Desulfovibrio) thrive in anaerobic bottom conditions — they reduce SO₄²⁻ to H₂S gas. Black pond bottom + rotten egg smell = active production. P. monodon burrows into sediment — directly exposed. 0.1 ppm: loss of equilibrium. 4 ppm: instant death.</div><div class='pb hi'><div class='pl'>H₂S Buildup — Emergency Response</div><div class='ps'>Pond bottom black &amp; malodorous when disturbed. Feed trays empty — first warning. Monodon shows stress first.</div><ul class='rx'><li>Increase water exchange daily from DOC 30+ <span class='dose'>10–30%</span></li><li>Bottom aeration — re-oxygenate sediment<span class='nt'>NEVER violently disturb H₂S-active bottom — gas pulse kills entire pond in 30–60 minutes.</span></li><li>CaO on pond bottom between crops <span class='dose'>200–300 kg/ha</span></li><li>Zeolite <span class='dose'>15–20 kg/acre</span></li><li>Probiotics (B. subtilis) <span class='dose'>1–2 kg/acre biweekly</span></li></ul></div><div class='ib'><span class='bh'>✖ Critical Warning</span>NEVER drag nets through H₂S-active pond bottom. Sudden gas pulse kills entire pond in 30–60 minutes.</div>",
 bn:"<div class='or'><span class='ok'>লক্ষ্যমাত্রা</span><span class='ov'>০ — শনাক্তযোগ্য নয় · সর্বোচ্চ &lt;০.০১ মি.গ্রা/লি</span></div><div class='eb'><div class='eh'>H₂S তৈরি হয় কীভাবে</div>সালফেট-বিজারক ব্যাকটেরিয়া অ্যানারোবিক তলায় SO₄²⁻ থেকে H₂S তৈরি করে। কালো পুকুরের তল + পচা ডিমের গন্ধ = সক্রিয় H₂S। মোনোডন তলায় গর্ত করে। ০.১ পিপিএমে ভারসাম্য হারানো, ৪ পিপিএমে তাৎক্ষণিক মৃত্যু।</div><div class='pb hi'><div class='pl'>H₂S জমা — জরুরি পদক্ষেপ</div><ul class='rx'><li>DOC ৩০+ থেকে পানি বদল বাড়ান <span class='dose'>১০–৩০% প্রতিদিন</span></li><li>তলায় বায়ু সঞ্চালন<span class='nt'>সক্রিয় H₂S পুকুরে তল হঠাৎ নাড়াবেন না — পুরো পুকুর মারা যেতে পারে।</span></li><li>ফসলের মাঝে তলায় CaO <span class='dose'>২০০–৩০০ কেজি/হেক্টর</span></li><li>জিওলাইট <span class='dose'>১৫–২০ কেজি/একর</span></li><li>প্রোবায়োটিক <span class='dose'>১–২ কেজি/একর পক্ষকালে</span></li></ul></div><div class='ib'><span class='bh'>✖ সতর্কতা</span>H₂S সক্রিয় পুকুরে জাল টেনে নাড়াবেন না। ৩০–৬০ মিনিটে পুরো পুকুর শেষ।</div>",
 te:"<div class='or'><span class='ok'>లక్ష్యం</span><span class='ov'>0 — శనాక్తించలేనిది · గరిష్టం &lt;0.01 mg/L</span></div><div class='eb'><div class='eh'>H₂S ఎలా ఏర్పడుతుంది</div>సల్ఫేట్-తగ్గించే బాక్టీరియా వాయురహిత నేల వద్ద SO₄²⁻ ను H₂S కి మారుస్తాయి. నల్ల చెరువు అడుగు + కుళ్ళిన వాసన = చురుకైన H₂S. 0.1 ppm: సమతుల్యత కోల్పోవడం. 4 ppm: తక్షణ మరణం.</div><div class='pb hi'><div class='pl'>H₂S పేరుకుపోవడం — అత్యవసరం</div><ul class='rx'><li>DOC 30+ నుండి నీటి మార్పు పెంచండి <span class='dose'>10–30% రోజూ</span></li><li>నేల వద్ద గాలి సంచలనం<span class='nt'>H₂S చురుకైన చెరువు అడుగు హఠాత్తుగా కదలించకండి.</span></li><li>పంటల మధ్య CaO <span class='dose'>200–300 కి.గ్రా/హెక్టార్</span></li><li>జియోలైట్ <span class='dose'>15–20 కి.గ్రా/ఎకరా</span></li><li>ప్రొబయోటిక్ <span class='dose'>1–2 కి.గ్రా/ఎకరా పక్షానికోసారి</span></li></ul></div><div class='ib'><span class='bh'>✖ క్లిష్ట హెచ్చరిక</span>H₂S చురుకైన చెరువు అడుగులో వలలు లాగవద్దు. 30–60 నిమిషాల్లో మొత్తం నష్టపోతుంది.</div>"},
{id:"salinity",icon:"🌊",ac:"ac-sky",tags:[{c:"tw",t:"Water Quality"},{c:"te-c",t:"Ionic Balance"}],
 ten:"Salinity & Osmotic Shock",tbn:"লবণাক্ততা ও অসমোটিক শক",tte:"లవణీయత & ఆస్మోటిక్ షాక్",
 sen:"Never change >3 ppt/day · K⁺ Mg²⁺ critical at <10 ppt",sbn:"প্রতিদিন >৩ ppt পরিবর্তন করবেন না",ste:"రోజుకు >3 ppt మార్చవద్దు",
 en:"<div class='or'><span class='ok'>Targets</span><span class='ov'>vannamei 15–25 ppt · monodon 15–30 · rosenbergii 0–5</span></div><div class='eb'><div class='eh'>Isosmotic Point & Ionic Deficiency</div>P. vannamei isosmotic point ≈ 25 ppt — minimal osmotic energy cost, best growth. At 4–10 ppt inland ponds, K⁺ and Mg²⁺ deficiency is as critical as salinity itself — many inland mortalities are ionic crises, not salinity crises.</div><div class='pb lo'><div class='pl'>⬇ Sudden Salinity Drop — Monsoon</div><ul class='rx'><li>Never add large freshwater volumes at once — max 3 ppt/day</li><li>Sea salt or brine to restore gradually <span class='dose'>≤3 ppt per 24 hrs</span></li><li>KCl + MgSO₄ — restore ionic balance <span class='dose'>5–10 kg/acre each</span></li><li>Reduce feeding 50% during acclimation</li><li>β-Glucan in feed — immune support <span class='dose'>0.1–0.2% feed</span></li></ul></div><div class='pb hi'><div class='pl'>⬆ High Salinity (&gt;30 ppt — Summer)</div><ul class='rx'><li>Gradual freshwater addition — max 3 ppt reduction per day</li><li>Increase water depth to reduce evaporative concentration</li></ul></div>",
 bn:"<div class='or'><span class='ok'>লক্ষ্যমাত্রা</span><span class='ov'>ভ্যানামেই ১৫–২৫ · মোনোডন ১৫–৩০ · রোসেনবার্গি ০–৫ ppt</span></div><div class='eb'><div class='eh'>আইসোঅসমোটিক পয়েন্ট ও আয়নিক ঘাটতি</div>ভ্যানামেইয়ের আইসোঅসমোটিক পয়েন্ট ≈২৫ ppt। ৪–১০ ppt পুকুরে K⁺ ও Mg²⁺ ঘাটতি লবণাক্ততার মতোই গুরুত্বপূর্ণ।</div><div class='pb lo'><div class='pl'>⬇ হঠাৎ লবণাক্ততা কমা</div><ul class='rx'><li>একসাথে বেশি মিঠা পানি দেবেন না — সর্বোচ্চ ৩ ppt/দিন</li><li>সমুদ্রের লবণ বা ব্রাইন <span class='dose'>≤৩ ppt প্রতি ২৪ ঘণ্টা</span></li><li>KCl + MgSO₄ <span class='dose'>৫–১০ কেজি/একর প্রতিটি</span></li><li>খাওয়ানো ৫০% কমান</li><li>β-গ্লুকান খাবারে <span class='dose'>০.১–০.২%</span></li></ul></div>",
 te:"<div class='or'><span class='ok'>లక్ష్యాలు</span><span class='ov'>వనమే 15–25 · మోనోడన్ 15–30 · రోసెన్‌బర్గి 0–5 ppt</span></div><div class='eb'><div class='eh'>ఐసోఆస్మోటిక్ పాయింట్ & అయానిక లోపం</div>వనమేయి ఐసోఆస్మోటిక్ పాయింట్ ≈25 ppt. 4–10 ppt అంతర్గత చెరువులలో K⁺ & Mg²⁺ లోపం లవణీయతంతో సమానంగా ముఖ్యమైనది.</div><div class='pb lo'><div class='pl'>⬇ అకస్మాత్తు లవణీయత తగ్గుదల</div><ul class='rx'><li>ఒకేసారి చాలా మంచినీరు వేయవద్దు — గరిష్టం 3 ppt/రోజు</li><li>సముద్రపు ఉప్పు లేదా బ్రైన్ <span class='dose'>≤3 ppt 24 గంటలకు</span></li><li>KCl + MgSO₄ <span class='dose'>5–10 కి.గ్రా/ఎకరా చొప్పున</span></li><li>ఆహారం 50% తగ్గించండి</li></ul></div>"},
{id:"alkalinity",icon:"🛡️",ac:"ac-green",tags:[{c:"tw",t:"Water Quality"},{c:"tw",t:"Moulting"}],
 ten:"Alkalinity — pH Buffer & Shell",tbn:"ক্ষারত্ব — pH বাফার ও খোলের স্বাস্থ্য",tte:"క్షారత — pH బఫర్ & గుల్ల",
 sen:"Target rises with DOC · Moulting support critical",sbn:"DOC-এর সাথে লক্ষ্যমাত্রা বাড়ে",ste:"DOC తో లక్ష్యం పెరుగుతుంది",
 en:"<div class='or'><span class='ok'>Target</span><span class='ov'>DOC 1–30: 100–120 · DOC 30–60: 120–150 · DOC 60–90: 150–200 ppm</span></div><div class='eb'><div class='eh'>Why Alkalinity Must Rise Through the Crop</div>Alkalinity (HCO₃⁻, CO₃²⁻) resists pH change — the buffer system. Below 80 ppm, small CO₂ changes cause dramatic pH swings. Shrimp absorb calcium carbonate from water during moulting — directly consuming alkalinity. Higher biomass = more moulting = faster consumption.</div><div class='pb lo'><div class='pl'>⬇ Low Alkalinity (&lt;80 ppm)</div><div class='ps'>Wide pH swings. Soft shell not hardening post-moult. Incomplete moults — shrimp trapped in old shell.</div><ul class='rx'><li>Dolomite CaMg(CO₃)₂ — best balanced choice <span class='dose'>100–200 kg/ha every 2–3 days</span></li><li>Agricultural lime Ca(OH)₂ <span class='dose'>100–150 kg/acre</span></li><li>Sodium bicarbonate NaHCO₃ — gentle, no pH spike <span class='dose'>5–10 kg/acre</span></li></ul></div><div class='pb hi'><div class='pl'>⬆ Very High Alkalinity (&gt;200 ppm)</div><ul class='rx'><li>Gypsum CaSO₄ <span class='dose'>50 kg/acre</span></li><li>Dilution with low-alkalinity water <span class='dose'>10–15%</span></li></ul></div>",
 bn:"<div class='or'><span class='ok'>লক্ষ্যমাত্রা</span><span class='ov'>DOC ১–৩০: ১০০–১২০ · ৩০–৬০: ১২০–১৫০ · ৬০–৯০: ১৫০–২০০ পিপিএম</span></div><div class='eb'><div class='eh'>ক্ষারত্ব কেন ফসলের সাথে বাড়াতে হবে</div>ক্ষারত্ব pH পরিবর্তন প্রতিরোধ করে। ৮০ পিপিএম-এর নিচে pH অস্থির। চিংড়ি মোল্টিংয়ে ক্যালসিয়াম কার্বোনেট নেয় — ক্ষারত্ব সরাসরি কমায়।</div><div class='pb lo'><div class='pl'>⬇ কম ক্ষারত্ব (&lt;৮০ পিপিএম)</div><ul class='rx'><li>ডলোমাইট CaMg(CO₃)₂ <span class='dose'>১০০–২০০ কেজি/হেক্টর প্রতি ২–৩ দিন</span></li><li>কৃষি চুন Ca(OH)₂ <span class='dose'>১০০–১৫০ কেজি/একর</span></li><li>NaHCO₃ — মৃদু <span class='dose'>৫–১০ কেজি/একর</span></li></ul></div>",
 te:"<div class='or'><span class='ok'>లక్ష్యం</span><span class='ov'>DOC 1–30: 100–120 · 30–60: 120–150 · 60–90: 150–200 ppm</span></div><div class='eb'><div class='eh'>పంటంతటా క్షారత ఎందుకు పెంచాలి</div>క్షారత pH మార్పు నిరోధిస్తుంది. 80 ppm కంటే తక్కువ వద్ద pH అస్థిరంగా ఉంటుంది. రొయ్యలు వలువ విడవడంలో CaCO₃ శోషిస్తాయి — క్షారత తగ్గిస్తుంది.</div><div class='pb lo'><div class='pl'>⬇ తక్కువ క్షారత (&lt;80 ppm)</div><ul class='rx'><li>డోలమైట్ CaMg(CO₃)₂ <span class='dose'>100–200 కి.గ్రా/హెక్టార్ 2–3 రోజులకోసారి</span></li><li>వ్యవసాయ సున్నం Ca(OH)₂ <span class='dose'>100–150 కి.గ్రా/ఎకరా</span></li><li>NaHCO₃ <span class='dose'>5–10 కి.గ్రా/ఎకరా</span></li></ul></div>"},
{id:"plankton",icon:"🌿",ac:"ac-lime",tags:[{c:"tw",t:"Water Quality"},{c:"tk",t:"Boom-Crash Risk"}],
 ten:"Plankton Bloom, Crash & Harmful Algae",tbn:"প্ল্যাংকটন ব্লুম, ক্র্যাশ ও ক্ষতিকর শেওলা",tte:"ప్లాంక్టన్ బ్లూమ్, క్రాష్ & హానికరమైన ఆల్గే",
 sen:"Secchi 30–40 cm · Phosphorus drives boom-crash cycle",sbn:"সেচি ৩০–৪০ সেমি · ফসফরাস চালিকাশক্তি",ste:"సెక్కి 30–40 సెం.మీ · ఫాస్ఫరస్ చోదక శక్తి",
 en:"<div class='or'><span class='ok'>Target</span><span class='ov'>Secchi 30–40 cm · Diatom-dominant · Stable TOM</span></div><div class='eb'><div class='eh'>The Phosphorus–Bloom–Crash Cycle</div>72–89% of feed phosphorus is not absorbed by shrimp — it fuels continuous plankton growth. Dense blooms (Secchi &lt;25 cm) create DO boom-crash cycles. Algae crash simultaneously releases massive ammonia AND depletes all O₂. The 24–48 hours after a bloom crash = most dangerous period in shrimp culture.</div><div class='pb hi'><div class='pl'>Dense Bloom (&lt;25 cm) — Prevent Crash</div><ul class='rx'><li>Reduce feed 50% immediately</li><li>Water exchange <span class='dose'>15–25%</span></li><li>Probiotic — competes with algae for nutrients <span class='dose'>1 kg/acre</span></li><li>Do NOT apply algaecide to thick bloom — DO crashes to zero</li><li>Run aerators 24/7 in anticipation of overnight crash</li></ul></div><div class='pb lo'><div class='pl'>Crash (Suddenly Clear &gt;50 cm) — Emergency</div><ul class='rx'><li>Emergency aeration — all aerators ON</li><li>Stop feeding 24–48 hours</li><li>Zeolite — absorb ammonia spike <span class='dose'>15–20 kg/acre</span></li><li>Probiotic + molasses <span class='dose'>1 + 5 kg/acre</span></li></ul></div><div class='iw'><span class='bh'>⚠ Cyanobacteria Alert</span>Blue-green bloom: surface scum, musty odour. Microcystis produces microcystin hepatotoxin. Do NOT apply CuSO₄ without species confirmation.</div>",
 bn:"<div class='or'><span class='ok'>লক্ষ্যমাত্রা</span><span class='ov'>সেচি ৩০–৪০ সেমি · ডায়াটম-প্রধান</span></div><div class='eb'><div class='eh'>ফসফরাস-ব্লুম-ক্র্যাশ চক্র</div>খাবারের ৭২–৮৯% ফসফরাস চিংড়ি শোষণ করে না — শেওলার বৃদ্ধি চালায়। ব্লুম ক্র্যাশ একসাথে সর্বোচ্চ NH₃ ও শূন্য O₂ তৈরি করে।</div><div class='pb hi'><div class='pl'>ঘন ব্লুম (&lt;২৫ সেমি) — ক্র্যাশ প্রতিরোধ</div><ul class='rx'><li>খাওয়ানো ৫০% কমান</li><li>পানি বদল <span class='dose'>১৫–২৫%</span></li><li>প্রোবায়োটিক <span class='dose'>১ কেজি/একর</span></li><li>ঘন ব্লুমে শেওলানাশক দেবেন না</li><li>সারারাত সব এয়ারেটর চালু রাখুন</li></ul></div><div class='pb lo'><div class='pl'>ব্লুম ক্র্যাশ (হঠাৎ পরিষ্কার &gt;৫০ সেমি)</div><ul class='rx'><li>সব এয়ারেটর তক্ষুনি চালু</li><li>২৪–৪৮ ঘণ্টা খাওয়ানো বন্ধ</li><li>জিওলাইট <span class='dose'>১৫–২০ কেজি/একর</span></li><li>প্রোবায়োটিক + গুড় <span class='dose'>১ + ৫ কেজি/একর</span></li></ul></div>",
 te:"<div class='or'><span class='ok'>లక్ష్యం</span><span class='ov'>సెక్కి 30–40 సెం.మీ · డయాటమ్ ప్రధానం</span></div><div class='eb'><div class='eh'>ఫాస్ఫరస్–బ్లూమ్–క్రాష్ చక్రం</div>72–89% ఆహారపు ఫాస్ఫరస్ రొయ్యలు శోషించవు — ఆల్గే వృద్ధిని నడిపిస్తుంది. బ్లూమ్ క్రాష్ ఒకేసారి గరిష్ట NH₃ & సున్నం O₂ కలిగిస్తుంది.</div><div class='pb hi'><div class='pl'>దట్టమైన బ్లూమ్ (&lt;25 సెం.మీ)</div><ul class='rx'><li>ఆహారం 50% వెంటనే తగ్గించండి</li><li>నీటి మార్పు <span class='dose'>15–25%</span></li><li>ప్రొబయోటిక్ <span class='dose'>1 కి.గ్రా/ఎకరా</span></li><li>దట్టమైన బ్లూమ్ పై ఆల్గేనాశిని వేయవద్దు</li></ul></div><div class='pb lo'><div class='pl'>బ్లూమ్ క్రాష్ (అకస్మాత్తు &gt;50 సెం.మీ)</div><ul class='rx'><li>అన్ని ఏరేటర్లు వెంటనే ఆన్</li><li>24–48 గంటలు ఆహారం ఆపండి</li><li>జియోలైట్ <span class='dose'>15–20 కి.గ్రా/ఎకరా</span></li><li>ప్రొబయోటిక్ + మొలాసెస్ <span class='dose'>1 + 5 కి.గ్రా/ఎకరా</span></li></ul></div>"},
{id:"temperature",icon:"🌡️",ac:"ac-pink",tags:[{c:"tw",t:"Water Quality"},{c:"te-c",t:"Vibrio Risk"}],
 ten:"Temperature Stress",tbn:"তাপমাত্রার চাপ",tte:"ఉష్ణోగ్రత ఒత్తిడి",
 sen:"Optimal 28–30°C · Cold stops feeding · Heat boosts Vibrio",sbn:"আদর্শ ২৮–৩০°C · ঠান্ডায় খাওয়া বন্ধ",ste:"అనుకూలం 28–30°C · చలి ఆహారం ఆపుతుంది",
 en:"<div class='or'><span class='ok'>Optimal</span><span class='ov'>28–30°C · vannamei: 15–33°C · monodon: 23–32°C</span></div><div class='pb lo'><div class='pl'>⬇ Cold Stress (&lt;24°C)</div><div class='ps'>Feeding stops at 22°C. Immunity reduced. Moult intervals extend 40–60%. Vibrio more virulent in cold.</div><ul class='rx'><li>Reduce feed 50% below 24°C. Stop completely below 20°C.</li><li>Raise water depth to 1.5–1.8 m — thermal buffering</li><li>Vitamin C + E in feed <span class='dose'>1–2 g/kg</span></li><li>Probiotic <span class='dose'>0.5 kg/acre fortnightly</span></li><li>Consider early harvest if &lt;22°C expected for &gt;2 weeks</li></ul></div><div class='pb hi'><div class='pl'>⬆ Heat Stress (&gt;33°C)</div><div class='ps'>High metabolic O₂ demand + reduced DO solubility = crisis. Vibrio growth doubles every 4°C above 25°C.</div><ul class='rx'><li>Water exchange with cooler reservoir water <span class='dose'>10–15%</span></li><li>Maximise aeration 10 AM–4 PM</li><li>Increase water depth ≥1.5 m</li><li>Partial harvest if heat persists &gt;5 days</li><li>Feed only morning and evening — skip midday</li></ul></div>",
 bn:"<div class='or'><span class='ok'>আদর্শ</span><span class='ov'>২৮–৩০°C · ভ্যানামেই: ১৫–৩৩°C · মোনোডন: ২৩–৩২°C</span></div><div class='pb lo'><div class='pl'>⬇ ঠান্ডার চাপ (&lt;২৪°C)</div><ul class='rx'><li>২৪°C-এর নিচে খাওয়ানো ৫০% কমান। ২০°C-এ সম্পূর্ণ বন্ধ।</li><li>পানির গভীরতা ১.৫–১.৮ মিটার বাড়ান</li><li>ভিটামিন C + E <span class='dose'>১–২ গ্রা/কেজি</span></li><li>প্রোবায়োটিক <span class='dose'>০.৫ কেজি/একর পক্ষকালে</span></li></ul></div><div class='pb hi'><div class='pl'>⬆ গরমের চাপ (&gt;৩৩°C)</div><ul class='rx'><li>ঠান্ডা পানি দিয়ে পানি বদল <span class='dose'>১০–১৫%</span></li><li>সকাল ১০ – বিকেল ৪টা সর্বোচ্চ বায়ু সঞ্চালন</li><li>পানির গভীরতা ≥১.৫ মিটার</li><li>৫ দিনের বেশি গরম থাকলে আংশিক ধরুন</li></ul></div>",
 te:"<div class='or'><span class='ok'>అనుకూలం</span><span class='ov'>28–30°C · వనమే: 15–33°C · మోనోడన్: 23–32°C</span></div><div class='pb lo'><div class='pl'>⬇ చలి ఒత్తిడి (&lt;24°C)</div><ul class='rx'><li>24°C కంటే తక్కువ వద్ద 50% తగ్గించండి. 20°C వద్ద పూర్తిగా ఆపండి.</li><li>నీటి లోతు 1.5–1.8 మీ. కి పెంచండి</li><li>విటమిన్ C + E <span class='dose'>1–2 గ్రా/కి.గ్రా</span></li><li>ప్రొబయోటిక్ <span class='dose'>0.5 కి.గ్రా/ఎకరా పక్షానికోసారి</span></li></ul></div><div class='pb hi'><div class='pl'>⬆ వేడి ఒత్తిడి (&gt;33°C)</div><ul class='rx'><li>చల్లని నిల్వ నీటితో నీటి మార్పు <span class='dose'>10–15%</span></li><li>ఉదయం 10 AM – 4 PM గరిష్ట గాలి సంచలనం</li><li>నీటి లోతు ≥1.5 మీ.</li><li>5 రోజులకంటే ఎక్కువ వేడి ఉంటే పాక్షిక వేట</li></ul></div>"},
{id:"organic",icon:"🧱",ac:"ac-teal",tags:[{c:"tw",t:"Water Quality"},{c:"te-c",t:"DOC 30+ Daily"}],
 ten:"Organic Load & Black Water",tbn:"জৈব ভার ও কালো পানি",tte:"సేంద్రియ భారం & నల్ల నీరు",
 sen:"Sludge + H₂S + high TOM — daily management from DOC 30+",sbn:"কাদা + H₂S + TOM — DOC ৩০+ থেকে দৈনিক",ste:"నేల + H₂S + TOM — DOC 30+ నుండి నిత్యం",
 en:"<div class='pb hi'><div class='pl'>Black Water (H₂S + Organic Overload)</div><ul class='rx'><li>MgSO₄ <span class='dose'>5 kg/acre</span></li><li>Agricultural lime Ca(OH)₂ <span class='dose'>50 kg/acre</span></li><li>Groundnut cake soaked 4 hrs — flocculation <span class='dose'>5–10 kg/acre at 10 AM</span></li><li>Cut feeding 50%. Aerate immediately.</li></ul></div><div class='pb wn'><div class='pl'>Dense Green / Brown Water</div><ul class='rx'><li>Aquafloc / PAC (poly-aluminium chloride) <span class='dose'>1 kg/acre</span></li><li>Probiotic cycle <span class='dose'>1 kg/acre fortnightly</span></li><li>Zeolite <span class='dose'>15 kg/acre</span></li></ul></div><div class='pb wn'><div class='pl'>Sludge Buildup (DOC 45+ Intensive)</div><ul class='rx'><li>Bottom siphoning daily after DOC 30<span class='nt'>Slow, targeted. Never agitate entire bottom at once — H₂S pulse risk.</span></li><li>TCCA spot treatment <span class='dose'>0.5 kg/acre targeted</span></li><li>Probiotics (B. subtilis + B. licheniformis) <span class='dose'>1–2 kg/acre biweekly</span></li><li>Reduce feeding 15% when sludge visible</li></ul></div>",
 bn:"<div class='pb hi'><div class='pl'>কালো পানি (H₂S + জৈব ভার)</div><ul class='rx'><li>MgSO₄ <span class='dose'>৫ কেজি/একর</span></li><li>কৃষি চুন Ca(OH)₂ <span class='dose'>৫০ কেজি/একর</span></li><li>চিনাবাদামের খৈল (৪ ঘণ্টা ভিজিয়ে) <span class='dose'>৫–১০ কেজি/একর সকাল ১০টায়</span></li><li>খাওয়ানো ৫০% কমান। বায়ু সঞ্চালন শুরু।</li></ul></div><div class='pb wn'><div class='pl'>তলার কাদা (DOC ৪৫+ নিবিড়)</div><ul class='rx'><li>DOC ৩০+ থেকে প্রতিদিন সিফোনিং</li><li>TCCA লক্ষ্যভিত্তিক <span class='dose'>০.৫ কেজি/একর</span></li><li>প্রোবায়োটিক <span class='dose'>১–২ কেজি/একর পক্ষকালে</span></li><li>কাদা দেখা গেলে খাওয়ানো ১৫% কমান</li></ul></div>",
 te:"<div class='pb hi'><div class='pl'>నల్ల నీరు (H₂S + సేంద్రియ అధిక భారం)</div><ul class='rx'><li>MgSO₄ <span class='dose'>5 కి.గ్రా/ఎకరా</span></li><li>వ్యవసాయ సున్నం Ca(OH)₂ <span class='dose'>50 కి.గ్రా/ఎకరా</span></li><li>వేరుశెనగ పిండి (4 గంటలు నానించి) <span class='dose'>5–10 కి.గ్రా/ఎకరా 10 AM కి</span></li><li>ఆహారం 50% తగ్గించండి. గాలి సరఫరా చేయండి.</li></ul></div><div class='pb wn'><div class='pl'>నేల నేల పేరుకుపోవడం (DOC 45+)</div><ul class='rx'><li>DOC 30+ నుండి నిత్యం సైఫోనింగ్</li><li>TCCA లక్ష్యంగా <span class='dose'>0.5 కి.గ్రా/ఎకరా</span></li><li>ప్రొబయోటిక్ <span class='dose'>1–2 కి.గ్రా/ఎకరా పక్షానికోసారి</span></li><li>నేల నేల కనిపిస్తే ఆహారం 15% తగ్గించండి</li></ul></div>"}

{id:"wssv",icon:"🔴",ac:"ac-red",tags:[{c:"tv",t:"Viral"},{c:"tk",t:"No Cure"},{c:"tk",t:"Mass Mortality"}],
 ten:"WSSV — White Spot Syndrome Virus",tbn:"WSSV — হোয়াইট স্পট সিন্ড্রোম ভাইরাস",tte:"WSSV — తెల్ల మచ్చ సిండ్రోమ్ వైరస్",
 sen:"$90M India annual loss · Prevention only · No antiviral",sbn:"ভারতে বার্ষিক $৯০M ক্ষতি · প্রতিরোধই একমাত্র পথ",ste:"భారత్ వార్షిక $90M నష్టం · నివారణ మాత్రమే",
 en:"<div class='ec'><div class='en_'>$90M</div><div><div class='el'>India Annual Loss — Patil et al. 2025</div></div></div><div class='eb'><div class='eh'>Agent & Spread</div>White Spot Syndrome Virus — 300 nm, infects 78+ crustacean species. Spreads via contaminated water, infected broodstock, wild crabs (asymptomatic carriers), birds (mechanical vectors). Peak: rainy season. India east coast prevalence: 6.48% (down from 25%).</div><div class='sh'>Field Timeline</div><div class='st'>Day 1–2: Sudden dramatic feeding drop. Day 2–4: Shrimp at pond edges, white calcified spots 0.5–2.0 mm under carapace, body turns pink-reddish, loose shells. Day 5–10: Mass mortality 30–80%.</div><div class='two'><div><div class='sl'>Mandatory Prevention</div><ul class='rx'><li>SPF PCR-certified seed only</li><li>Chlorinate all incoming water <span class='dose'>30 ppm TCCA · 24 hrs</span></li><li>Bird netting over entire pond</li><li>60-mesh filter on all inlet gates — exclude wild crabs</li><li>PCR test at DOC 15, 30, 45</li><li>Pond dry + CaO between crops <span class='dose'>300–400 kg/acre · 2 wks dry</span></li></ul></div><div><div class='sl'>Outbreak Management</div><ul class='rx'><li>No antiviral treatment exists</li><li>Emergency partial harvest — &gt;15g immediately</li><li>Stop feeding completely</li><li>β-Glucan <span class='dose'>0.2% of feed</span></li><li>Notify MPEDA / State Fisheries</li><li>Disinfect all discharge water <span class='dose'>TCCA 30 ppm</span></li><li>Pond rest minimum 30 days</li></ul></div></div><div class='ib'><span class='bh'>✖ Biosecurity</span>Never share WSSV-positive pond water with other ponds. WSSV survives 3–5 days in pond water. Zero-tolerance biosecurity is the only protection.</div>",
 bn:"<div class='ec'><div class='en_'>$৯০M</div><div><div class='el'>ভারতের বার্ষিক ক্ষতি</div></div></div><div class='eb'><div class='eh'>কারক ও বিস্তার</div>৭৮+ ক্রাস্টেসিয়ান প্রজাতি আক্রান্ত করে। বন্য কাঁকড়া ও পাখি বাহক। বর্ষায় তাপমাত্রা পতনে সংক্রমণ শিখরে। প্রকোপ ৬.৪৮%।</div><div class='sh'>মাঠ পরিচিতি</div><div class='st'>দিন ১–২: খাবার হঠাৎ কমে। দিন ২–৪: পুকুর পাড়ে, সাদা স্পট ০.৫–২.০ মিমি, গোলাপী-লালচে শরীর। দিন ৫–১০: ৩০–৮০% মৃত্যু।</div><div class='two'><div><div class='sl'>বাধ্যতামূলক প্রতিরোধ</div><ul class='rx'><li>PCR-পরীক্ষিত SPF বীজ কেবল</li><li>আগত পানি ক্লোরিনেশন <span class='dose'>৩০ পিপিএম TCCA</span></li><li>পুরো পুকুরে পাখি জাল</li><li>সব প্রবেশপথে ৬০ মেশ জাল</li><li>DOC ১৫, ৩০, ৪৫-এ PCR</li><li>পুকুর শুকনো + CaO <span class='dose'>৩০০–৪০০ কেজি/একর</span></li></ul></div><div><div class='sl'>প্রাদুর্ভাব ব্যবস্থাপনা</div><ul class='rx'><li>কোনো ভাইরাসনাশক নেই</li><li>জরুরি আংশিক ধরা (&gt;১৫ গ্রা)</li><li>খাওয়ানো বন্ধ</li><li>β-গ্লুকান <span class='dose'>০.২% খাবার</span></li><li>MPEDA/রাজ্য মৎস্য বিভাগকে জানান</li><li>নির্গমন পানি জীবাণুমুক্ত</li></ul></div></div>",
 te:"<div class='ec'><div class='en_'>$90M</div><div><div class='el'>భారత్ వార్షిక నష్టం</div></div></div><div class='eb'><div class='eh'>కారకం & వ్యాప్తి</div>78+ క్రస్టేసియన్ జాతులను సంక్రమిస్తుంది. అడవి పీతలు & పక్షులు వాహకాలు. వర్షాకాలంలో శిఖరం. తూర్పు తీరం వ్యాప్తి 6.48%.</div><div class='sh'>క్షేత్ర గుర్తింపు</div><div class='st'>రోజు 1–2: ఆహారం అకస్మాత్తు తగ్గడం. రోజు 2–4: చెరువు అంచులకు, తెల్లని మచ్చలు, గులాబీ-ఎరుపు శరీరం. రోజు 5–10: 30–80% మరణం.</div><div class='two'><div><div class='sl'>తప్పనిసరి నివారణ</div><ul class='rx'><li>PCR ధృవీకరించిన SPF విత్తనాలు మాత్రమే</li><li>వచ్చే నీటిని క్లోరినేషన్ <span class='dose'>30 ppm TCCA</span></li><li>మొత్తం చెరువుపై పక్షి వలలు</li><li>అన్ని ద్వారాలలో 60 మెష జాలీ</li><li>DOC 15, 30, 45 లో PCR</li><li>చెరువు ఆరబెట్టడం + CaO <span class='dose'>300–400 కి.గ్రా/ఎకరా</span></li></ul></div><div><div class='sl'>వ్యాప్తి నిర్వహణ</div><ul class='rx'><li>యాంటీవైరల్ ఔషధం లేదు</li><li>అత్యవసర పాక్షిక వేట (&gt;15 గ్రా)</li><li>ఆహారం పూర్తిగా ఆపండి</li><li>β-గ్లూకాన్ <span class='dose'>0.2% ఆహారం</span></li><li>MPEDA తెలియజేయండి</li><li>నీటి విడుదల ముందు జీవాణురహితం</li></ul></div></div>"},
{id:"ehp",icon:"🦠",ac:"ac-purple",tags:[{c:"tp",t:"Microsporidian"},{c:"tk",t:"#1 India Loss"},{c:"tk",t:"No Cure"}],
 ten:"EHP — Enterocytozoon hepatopenaei",tbn:"EHP — এন্টেরোসাইটোজুন হেপাটোপেনাই",tte:"EHP — ఎంటెరోసైటోజూన్ హెపటోపెనాయి",
 sen:"$571M #1 India loss · 78% of total · Growth variation key sign",sbn:"ভারতে #১ ক্ষতি $৫৭১M · বৃদ্ধির তারতম্য মূল লক্ষণ",ste:"$571M భారత్ #1 నష్టం · పెరుగుదల వ్యత్యాసం కీలక సంకేతం",
 en:"<div class='ec'><div class='en_'>$571M</div><div><div class='el'>India #1 Loss · 78% of total — Patil et al. 2025</div></div></div><div class='eb'><div class='eh'>Why EHP is the Biggest Economic Threat</div>EHP spores infect hepatopancreatic tubule cells — destroying the nutrient absorption organ. Spores survive in pond soil for months, resistant to drying, UV, and most disinfectants. India east coast prevalence: 32.4%. Co-infection with WSSV = combined loss 1.89 t/ha/crop.</div><div class='sh'>Key Diagnostic Sign</div><div class='st'>Extreme growth variation by DOC 35–40 — shrimp of same age showing 30–50% size variation (giants and dwarfs). HP pale, whitish, shrunken. White stringy feces in feed trays. No mass die-off — chronic productivity loss. Definitive diagnosis: PCR of HP tissue ONLY.</div><div class='sl'>Prevention — The Only Effective Intervention</div><ul class='rx'><li>PCR test PL seed before stocking — reject EHP-positive lots absolutely <span class='dose'>NACA PL15 PCR</span></li><li>Aggressive inter-crop drying + CaO — destroys soil spore reservoir <span class='dose'>300 kg/acre · 2+ weeks full dry</span></li><li>HDPE pond liner — eliminates soil spore reservoir permanently</li><li>Chlorinate all incoming water <span class='dose'>30 ppm TCCA · 48 hrs</span></li><li>Reduce stocking density <span class='dose'>60–80 PL/m² max for EHP-endemic farms</span></li></ul><div class='sl'>Active EHP Management</div><ul class='rx'><li>Organic acids in feed — inhibit spore germination <span class='dose'>3–5 g/kg · 10–15 days</span></li><li>Probiotics — competitive exclusion <span class='dose'>1 kg/acre biweekly</span></li><li>Water exchange <span class='dose'>15–20% daily from DOC 40</span></li><li>Partial harvest at DOC 60 if ABW deviation &gt;25%</li></ul>",
 bn:"<div class='ec'><div class='en_'>$৫৭১M</div><div><div class='el'>ভারতে #১ ক্ষতি · মোটের ৭৮%</div></div></div><div class='eb'><div class='eh'>EHP কেন সবচেয়ে বড় হুমকি</div>EHP রেণু হেপাটোপ্যাংক্রেটিক নলকোষ আক্রান্ত করে। রেণু মাটিতে মাসের পর মাস বেঁচে থাকে। পূর্ব উপকূলে প্রকোপ ৩২.৪%।</div><div class='sh'>মূল লক্ষণ</div><div class='st'>DOC ৩৫–৪০-এ চরম বৃদ্ধির তারতম্য — একই বয়সে ৩০–৫০% আকার বৈচিত্র্য। HP ফ্যাকাশে, সংকুচিত। সাদা পাতলা মল। গণমৃত্যু নেই — ধীরে ধীরে উৎপাদন ক্ষতি।</div><div class='sl'>প্রতিরোধ — একমাত্র কার্যকর হস্তক্ষেপ</div><ul class='rx'><li>মজুদের আগে PL-এর PCR পরীক্ষা <span class='dose'>NACA PL15 PCR</span></li><li>আক্রমণাত্মক শুকনো + CaO <span class='dose'>৩০০ কেজি/একর · ২+ সপ্তাহ পূর্ণ শুকনো</span></li><li>HDPE পুকুর লাইনার — মাটির রেণু স্থায়ীভাবে দূর করে</li><li>আগত পানি ক্লোরিনেশন <span class='dose'>৩০ পিপিএম · ৪৮ ঘণ্টা</span></li><li>মজুদ ঘনত্ব কমান <span class='dose'>৬০–৮০ PL/m²</span></li></ul>",
 te:"<div class='ec'><div class='en_'>$571M</div><div><div class='el'>భారత్ #1 నష్టం · మొత్తంలో 78%</div></div></div><div class='eb'><div class='eh'>EHP ఎందుకు అతి పెద్ద ఆర్థిక ముప్పు</div>EHP స్పోర్లు హెపటోప్యాంక్రియాటిక్ నాళ కణాలను సంక్రమిస్తాయి. స్పోర్లు నేలలో నెలల తరబడి జీవించగలవు. తూర్పు తీరం వ్యాప్తి 32.4%.</div><div class='sh'>కీలక సంకేతం</div><div class='st'>DOC 35–40 నాటికి తీవ్ర పెరుగుదల వ్యత్యాసం — ఒకే వయసులో 30–50% పరిమాణ వ్యత్యాసం. HP లేత, సంకోచిత. తెల్లని మలం. గణ మరణం లేదు.</div><div class='sl'>నివారణ — ఏకైక ప్రభావవంతమైన జోక్యం</div><ul class='rx'><li>నిల్వకు ముందు PL PCR పరీక్ష <span class='dose'>NACA PL15 PCR</span></li><li>తీవ్రంగా ఆరబెట్టడం + CaO <span class='dose'>300 కి.గ్రా/ఎకరా · 2+ వారాలు</span></li><li>HDPE చెరువు లైనర్</li><li>నీటి క్లోరినేషన్ <span class='dose'>30 ppm TCCA · 48 గంటలు</span></li><li>నిల్వ సాంద్రత <span class='dose'>గరిష్టం 60–80 PL/m²</span></li></ul>"},
{id:"ahpnd",icon:"⚡",ac:"ac-orange",tags:[{c:"tb",t:"Bacterial"},{c:"tk",t:"Mass Mortality <DOC 30"}],
 ten:"AHPND / EMS — Vibriosis",tbn:"AHPND/EMS — ভিব্রিওসিস",tte:"AHPND/EMS — విబ్రియోసిస్",
 sen:"V. parahaemolyticus · $40M India · No antibiotic",sbn:"V. parahaemolyticus · ভারতে $৪০M ক্ষতি",ste:"V. parahaemolyticus · $40M భారత్",
 en:"<div class='eb'><div class='eh'>Agent & Mechanism</div>V. parahaemolyticus strains carrying pVA1 plasmid produce PirA/PirB binary toxins causing acute HP tubule epithelium destruction. V. harveyi (luminescent) — infected shrimp glow green under UV at night. India east coast: V. parahaemolyticus 27.7%, V. alginolyticus 16.1%, V. harveyi 13.1%.</div><div class='sh'>Field Identification</div><div class='st'>AHPND: Mass mortality within first 20–30 DOC. HP pale, white, mushy. Shrimp spiral-swim then sink and die. Vibriosis: shrimp glow green-blue under UV flashlight at night (V. harveyi). Opaque white muscles. Necrotic appendages. Black gills.</div><div class='sl'>Prevention</div><ul class='rx'><li>TCCA reservoir treatment <span class='dose'>1 ppm · 24 hrs</span></li><li>BKC 80% — routine Vibrio TVC control <span class='dose'>500 mL/acre monthly</span></li><li>Probiotics — competitive exclusion <span class='dose'>1 kg/acre every 10 days</span></li><li>Organic acids in feed — gut acidification <span class='dose'>3–5 g/kg</span></li><li>Monitor Vibrio TVC weekly from DOC 30 — target &lt;10³ CFU/mL</li></ul><div class='sl'>Active Vibriosis Management</div><ul class='rx'><li>TCCA pond treatment <span class='dose'>0.5 ppm · evening · all aerators ON</span></li><li>BKC 80% <span class='dose'>250 mL/acre — alternate with TCCA</span></li><li>Probiotic surge dose <span class='dose'>2 kg/acre</span></li><li>NO antibiotics without confirmed sensitivity testing + registered vet prescription</li></ul><div class='ib'><span class='bh'>✖ MDR Warning</span>Multidrug-resistant V. parahaemolyticus dominates India east coast. Antibiotic residues = export rejection.</div>",
 bn:"<div class='eb'><div class='eh'>কারক ও প্রক্রিয়া</div>pVA1 প্লাজমিড-বহনকারী V. parahaemolyticus PirA/PirB টক্সিন তৈরি করে। V. harveyi সংক্রমিত চিংড়ি রাতে UV আলোয় সবুজ জ্বলে।</div><div class='sh'>মাঠ পরিচিতি</div><div class='st'>AHPND: DOC ২০–৩০-এ ৮০% পর্যন্ত গণমৃত্যু। HP ফ্যাকাশে, নরম। সর্পিলাকার সাঁতার তারপর মৃত্যু।</div><div class='sl'>প্রতিরোধ</div><ul class='rx'><li>ভান্ডার TCCA চিকিৎসা <span class='dose'>১ পিপিএম · ২৪ ঘণ্টা</span></li><li>BKC 80% <span class='dose'>৫০০ মিলি/একর মাসিক</span></li><li>প্রোবায়োটিক <span class='dose'>১ কেজি/একর প্রতি ১০ দিন</span></li><li>জৈব অ্যাসিড খাবারে <span class='dose'>৩–৫ গ্রা/কেজি</span></li></ul><div class='sl'>সক্রিয় ভিব্রিওসিস ব্যবস্থাপনা</div><ul class='rx'><li>TCCA পুকুর চিকিৎসা <span class='dose'>০.৫ পিপিএম · সন্ধ্যায়</span></li><li>BKC 80% <span class='dose'>২৫০ মিলি/একর</span></li><li>প্রোবায়োটিক বাড়তি মাত্রা <span class='dose'>২ কেজি/একর</span></li><li>অ্যান্টিবায়োটিক নয় — ভেটেরিনারি প্রেসক্রিপশন ছাড়া</li></ul>",
 te:"<div class='eb'><div class='eh'>కారకం & విధానం</div>pVA1 ప్లాస్మిడ్ బేరిరిన V. parahaemolyticus PirA/PirB టాక్సిన్లు తయారుచేస్తాయి. V. harveyi — సోకిన రొయ్యలు రాత్రి UV లో ఆకుపచ్చగా మెరుస్తాయి.</div><div class='sh'>క్షేత్ర గుర్తింపు</div><div class='st'>AHPND: DOC 20–30 లో 80% వరకు గణ మరణం. HP లేత, మెత్తని. చుట్టు తిరిగి ఈదిన తర్వాత చనిపోతాయి.</div><div class='sl'>నివారణ</div><ul class='rx'><li>నిల్వలో TCCA <span class='dose'>1 ppm · 24 గంటలు</span></li><li>BKC 80% <span class='dose'>500 మి.లీ/ఎకరా నెలవారీ</span></li><li>ప్రొబయోటిక్ <span class='dose'>1 కి.గ్రా/ఎకరా 10 రోజులకోసారి</span></li><li>సేంద్రియ ఆమ్లాలు ఆహారంలో <span class='dose'>3–5 గ్రా/కి.గ్రా</span></li></ul><div class='sl'>చురుకైన విబ్రియోసిస్ నిర్వహణ</div><ul class='rx'><li>TCCA చెరువు చికిత్స <span class='dose'>0.5 ppm · సాయంత్రం</span></li><li>BKC 80% <span class='dose'>250 మి.లీ/ఎకరా</span></li><li>ప్రొబయోటిక్ అదనపు మోతాదు <span class='dose'>2 కి.గ్రా/ఎకరా</span></li><li>యాంటీబయోటిక్‌లు వద్దు — నమోదిత జంతువైద్యుని ప్రిస్క్రిప్షన్ లేకుండా</li></ul>"},

 ten:"RMS — Running Mortality Syndrome",tbn:"RMS — রানিং মর্টালিটি সিন্ড্রোম",tte:"RMS — పరిగెత్తే మరణం సిండ్రోమ్",
 sen:"Daily losses · Survival 40–60% · Diagnose by exclusion",sbn:"প্রতিদিন মৃত্যু · বেঁচে থাকা ৪০–৬০%",ste:"నిత్యం మరణాలు · మనుగడ 40–60%",
 en:"<div class='eb'><div class='eh'>Not a Single Disease — A Failure Cascade</div>RMS = combination of poor seed quality (hatchery-stressed PL), high Vibrio load, shallow ponds (&lt;1.2 m), high organic load, water quality stress, and opportunistic bacterial infections. India survey: production loss 1.1 t/ha/crop. Diagnose only AFTER ruling out WSSV, EHP, AHPND by PCR.</div><div class='sh'>Symptoms</div><div class='st'>Continuous daily mortality — 0.01–0.05% of stock dying on pond edges every morning. No single dramatic event. Shrimp lethargic with dark gill coloration. FCR deteriorating week by week. Survival at harvest 40–60% (expected 70–80%).</div><ul class='rx'><li>24/7 intensive aeration — minimum 1 HP per 1000 kg biomass</li><li>Reduce stocking density — partial harvest if &gt;DOC 50 <span class='dose'>Target &lt;100/m²</span></li><li>Probiotic 10-day cycle throughout crop <span class='dose'>1 kg/acre</span></li><li>Molasses when Vibrio TVC high <span class='dose'>5 kg/acre dissolved</span></li><li>Daily water exchange DOC 40+ <span class='dose'>10–15%</span></li><li>Vitamin C + immunostimulants <span class='dose'>1–2 g/kg feed continuously</span></li><li>Increase depth ≥1.5 m — thermal and DO stability</li></ul>",
 bn:"<div class='eb'><div class='eh'>একক রোগ নয় — ব্যর্থতার শৃঙ্খল</div>দুর্বল বীজ + উচ্চ ভিব্রিও + অগভীর পুকুর + উচ্চ জৈব ভার + পানি মানের চাপের সংমিশ্রণ। ভারত সর্বেক্ষণ: ১.১ টন/হেক্টর/ফসল ক্ষতি। WSSV, EHP, AHPND বাদ দেওয়ার পরেই RMS নির্ণয়।</div><div class='sh'>লক্ষণ</div><div class='st'>প্রতিদিন মজুদের ০.০১–০.০৫% পুকুর পাড়ে মরে। FCR ধীরে খারাপ হয়। বেঁচে থাকা ৪০–৬০%।</div><ul class='rx'><li>২৪/৭ নিবিড় বায়ু সঞ্চালন</li><li>মজুদ ঘনত্ব কমান <span class='dose'>সর্বোচ্চ ১০০/m²</span></li><li>প্রোবায়োটিক ১০ দিনের চক্র <span class='dose'>১ কেজি/একর</span></li><li>গুড় <span class='dose'>৫ কেজি/একর গুলিয়ে</span></li><li>DOC ৪০+ থেকে দৈনিক পানি বদল <span class='dose'>১০–১৫%</span></li><li>ভিটামিন C + ইমিউনোস্টিমুল্যান্ট <span class='dose'>১–২ গ্রা/কেজি খাবার</span></li></ul>",
 te:"<div class='eb'><div class='eh'>ఏకైక వ్యాధి కాదు — వైఫల్యాల శ్రేణి</div>పేలవమైన విత్తన నాణ్యత + అధిక విబ్రియో + నిస్సారమైన చెరువులు + అధిక సేంద్రియ భారం కలయిక. భారత్ సర్వే: 1.1 టన్నులు/హెక్టార్/పంట నష్టం. WSSV, EHP, AHPND PCR లో తోసిపుచ్చిన తర్వాతే నిర్ధారణ.</div><div class='sh'>లక్షణాలు</div><div class='st'>నిల్వలో 0.01–0.05% రోజూ చనిపోతాయి. FCR క్రమంగా దెబ్బతింటుంది. మనుగడ 40–60%.</div><ul class='rx'><li>24/7 నిబిడ గాలి సంచలనం</li><li>నిల్వ సాంద్రత తగ్గించండి <span class='dose'>గరిష్టం 100/m²</span></li><li>ప్రొబయోటిక్ 10-రోజు చక్రం <span class='dose'>1 కి.గ్రా/ఎకరా</span></li><li>మొలాసెస్ <span class='dose'>5 కి.గ్రా/ఎకరా</span></li><li>DOC 40+ నుండి నిత్యం నీటి మార్పు <span class='dose'>10–15%</span></li><li>విటమిన్ C + ఇమ్యూనోస్టిమ్యులెంట్లు <span class='dose'>1–2 గ్రా/కి.గ్రా ఆహారం</span></li></ul>"},
{id:"wfs",icon:"⬜",ac:"ac-gold",tags:[{c:"tp",t:"EHP + Vibrio"},{c:"te-c",t:"Gut & Shell"}],
 ten:"WFS — White Feces & Loose Shell",tbn:"WFS — সাদা মল ও ঢিলা খোল",tte:"WFS — తెల్ల మలం & వదులైన గుల్ల",
 sen:"EHP + Vibrio + mineral deficiency combined",sbn:"EHP + ভিব্রিও + খনিজ ঘাটতির সংমিশ্রণ",ste:"EHP + విబ్రియో + ఖనిజ లోపం",
 en:"<div class='eb'><div class='eh'>Two Linked Problems</div>White feces = EHP-damaged HP + Vibrio gut infection + Gregarine intestinal parasite + overfeeding. Loose shell = Ca/Mg/alkalinity deficiency + moulting disruption. Both commonly occur together in stressed ponds.</div><div class='sh'>Symptoms</div><div class='st'>White/pale stringy feces floating on pond surface and collecting in feed trays. HP pale, shrunken. Shell separates from body — soft even days after moulting. Reduced feeding and slow growth.</div><div class='sl'>White Feces Protocol</div><ul class='rx'><li>Reduce feeding 30–50% immediately</li><li>Probiotic pond + feed <span class='dose'>Pond: 2 kg/acre · Feed: 3 g/kg</span></li><li>Organic acids in feed <span class='dose'>3–5 g/kg · 15 days</span></li><li>Hepatoprotective supplement — liver tonic <span class='dose'>1–2 kg/ton feed</span></li><li>Water exchange <span class='dose'>15–20% daily</span></li></ul><div class='sl'>Loose Shell Protocol</div><ul class='rx'><li>Dolomite — Ca + Mg for cuticle biosynthesis <span class='dose'>100 kg/acre</span></li><li>Ca + Mg mineral in feed <span class='dose'>5 g/kg</span></li><li>Raise alkalinity to 150–180 ppm</li><li>Vitamin C + K <span class='dose'>2 g/kg feed</span></li></ul>",
 bn:"<div class='eb'><div class='eh'>দুটি সম্পর্কিত সমস্যা</div>সাদা মল = EHP-ক্ষতিগ্রস্ত HP + ভিব্রিও অন্ত্র সংক্রমণ + গ্রেগারিন পরজীবী + অতিরিক্ত খাওয়ানো। ঢিলা খোল = Ca, Mg, ক্ষারত্বের ঘাটতি + মোল্টিং ব্যাঘাত।</div><div class='sl'>সাদা মল প্রোটোকল</div><ul class='rx'><li>খাওয়ানো ৩০–৫০% তক্ষুনি কমান</li><li>প্রোবায়োটিক <span class='dose'>পুকুরে ২ কেজি/একর · খাবারে ৩ গ্রা/কেজি</span></li><li>জৈব অ্যাসিড <span class='dose'>৩–৫ গ্রা/কেজি · ১৫ দিন</span></li><li>হেপাটোপ্রোটেক্টিভ সাপ্লিমেন্ট <span class='dose'>১–২ কেজি/টন</span></li><li>পানি বদল <span class='dose'>১৫–২০% প্রতিদিন</span></li></ul><div class='sl'>ঢিলা খোল প্রোটোকল</div><ul class='rx'><li>ডলোমাইট <span class='dose'>১০০ কেজি/একর</span></li><li>Ca + Mg খাবারে <span class='dose'>৫ গ্রা/কেজি</span></li><li>ক্ষারত্ব ১৫০–১৮০ পিপিএম</li><li>ভিটামিন C + K <span class='dose'>২ গ্রা/কেজি</span></li></ul>",
 te:"<div class='eb'><div class='eh'>రెండు అనుసంధానించబడిన సమస్యలు</div>తెల్ల మలం = EHP-దెబ్బతిన్న HP + విబ్రియో పేగు సంక్రమణ + గ్రిగరైన్ పరాన్నజీవి + అతి ఆహారం. వదులైన గుల్ల = Ca, Mg, క్షారత లోపం + వలువ విడవడం అంతరాయం.</div><div class='sl'>తెల్ల మలం ప్రోటోకాల్</div><ul class='rx'><li>ఆహారం 30–50% వెంటనే తగ్గించండి</li><li>ప్రొబయోటిక్ <span class='dose'>చెరువులో 2 కి.గ్రా/ఎకరా · ఆహారంలో 3 గ్రా/కి.గ్రా</span></li><li>సేంద్రియ ఆమ్లాలు <span class='dose'>3–5 గ్రా/కి.గ్రా · 15 రోజులు</span></li><li>హెపటోప్రొటెక్టివ్ సప్లిమెంట్ <span class='dose'>1–2 కి.గ్రా/టన్</span></li><li>నీటి మార్పు <span class='dose'>15–20% నిత్యం</span></li></ul><div class='sl'>వదులైన గుల్ల ప్రోటోకాల్</div><ul class='rx'><li>డోలమైట్ <span class='dose'>100 కి.గ్రా/ఎకరా</span></li><li>Ca + Mg ఆహారంలో <span class='dose'>5 గ్రా/కి.గ్రా</span></li><li>క్షారత 150–180 ppm</li><li>విటమిన్ C + K <span class='dose'>2 గ్రా/కి.గ్రా</span></li></ul>"},
{id:"blackgill",icon:"🖤",ac:"ac-teal",tags:[{c:"tp",t:"Ciliate + Fusarium"},{c:"te-c",t:"Low DO Trigger"}],
 ten:"Black Gill Disease",tbn:"কালো ফুলকা রোগ",tte:"నల్ల గిల్ వ్యాధి",
 sen:"Ciliate + fungal fouling · Immunity is the real defence",sbn:"সিলিয়েট + ছত্রাক · রোগ প্রতিরোধ শক্তিই রক্ষা",ste:"సిలియేట్ + శిలీంధ్రం · రోగనిరోధకత నిజమైన రక్షణ",
 en:"<div class='eb'><div class='eh'>Host Immunity Is the Real Defence</div>Zoothamnium, Epistylis, Vorticella (ciliates) + Fusarium + bacteria colonise gills only when host immunity is compromised by low DO, high organic load, or H₂S. 22% of east India coastal farms showed darkened gills in suboptimal ponds.</div><div class='sh'>Symptoms</div><div class='st'>Gills turn grey, brown, or black (normal: pale pink-white). Fluffy/slimy fouling material on gill surface. Shrimp surface-gasping to increase O₂. FCR worsens despite adequate feeding.</div><ul class='rx'><li>Emergency aeration — all aerators ON immediately</li><li>Water exchange <span class='dose'>20–25%</span></li><li>BKC 80% <span class='dose'>500 mL/acre · evening</span></li><li>TCCA <span class='dose'>0.5 ppm · evening · alternate with BKC</span></li><li>Zeolite <span class='dose'>15 kg/acre</span></li><li>Dolomite — raise pH, suppress ciliate environment <span class='dose'>100 kg/acre</span></li></ul><div class='it'><span class='bh'>Prevention</span>Fortnightly BKC + probiotic alternation dramatically reduces incidence. Maintain DO &gt;5 mg/L at all times.</div>",
 bn:"<div class='eb'><div class='eh'>পোষক রোগ প্রতিরোধ শক্তিই আসল রক্ষা</div>কম DO, উচ্চ জৈব ভার বা H₂S-এ দুর্বল চিংড়ির ফুলকায় জুথ্যামনিয়াম, এপিস্টিলিস, ফিউসারিয়াম আক্রমণ করে। ২২% পূর্ব ভারত উপকূলীয় পুকুরে ফুলকা কালোকরণ।</div><ul class='rx'><li>সব এয়ারেটর তক্ষুনি চালু</li><li>পানি বদল <span class='dose'>২০–২৫%</span></li><li>BKC 80% <span class='dose'>৫০০ মিলি/একর · সন্ধ্যায়</span></li><li>TCCA <span class='dose'>০.৫ পিপিএম · সন্ধ্যায়</span></li><li>জিওলাইট <span class='dose'>১৫ কেজি/একর</span></li><li>ডলোমাইট <span class='dose'>১০০ কেজি/একর</span></li></ul><div class='it'><span class='bh'>প্রতিরোধ</span>পক্ষকালে BKC + প্রোবায়োটিক পর্যায়ক্রমে দিন। DO &gt;৫ বজায় রাখুন।</div>",
 te:"<div class='eb'><div class='eh'>అతిథి రోగనిరోధకత నిజమైన రక్షణ</div>తక్కువ DO, అధిక సేంద్రియ భారం లేదా H₂S లో బలహీనపడిన రొయ్యల గిల్‌లపై జూథ్యాంమ్నియమ్, ఎపిస్టిలిస్, ఫ్యుసారియమ్ వలసపోతాయి.</div><ul class='rx'><li>అన్ని ఏరేటర్లు వెంటనే ఆన్</li><li>నీటి మార్పు <span class='dose'>20–25%</span></li><li>BKC 80% <span class='dose'>500 మి.లీ/ఎకరా · సాయంత్రం</span></li><li>TCCA <span class='dose'>0.5 ppm · సాయంత్రం</span></li><li>జియోలైట్ <span class='dose'>15 కి.గ్రా/ఎకరా</span></li><li>డోలమైట్ <span class='dose'>100 కి.గ్రా/ఎకరా</span></li></ul><div class='it'><span class='bh'>నివారణ</span>పక్షానికోసారి BKC + ప్రొబయోటిక్ పర్యాయంగా. DO &gt;5 నిర్వహించండి.</div>"},
{id:"whitemuscle",icon:"⚪",ac:"ac-green",tags:[{c:"te-c",t:"Mg Zn K Deficiency"},{c:"te-c",t:"Osmotic Stress"}],
 ten:"White Muscle, Gut & Cramp",tbn:"সাদা পেশি, পেট ও পেশি টান",tte:"తెల్ల కండరం, ప్రేగు & తిమ్మిర్లు",
 sen:"Mineral deficiency · Osmotic shock · Ionic imbalance",sbn:"খনিজ ঘাটতি · অসমোটিক শক",ste:"ఖనిజ లోపం · ఆస్మోటిక్ షాక్",
 en:"<div class='eb'><div class='eh'>Cause Matrix</div>White gut = gut cleared of microbiome — midgut appears white/empty on dissection (starvation, Vibrio, EHP HP failure). White muscle = Mg and Zn deficiency + temperature stress — opaque white patches on abdominal segments. Muscle cramp = osmotic shock, low Mg, low K, abrupt salinity change &gt;5 ppt — bent/curled body at tail, cannot swim straight. Inland 4–10 ppt ponds at highest risk.</div><ul class='rx'><li>MgSO₄ in feed <span class='dose'>3–5 g/kg · 10 days</span></li><li>Zinc + manganese mineral supplement <span class='dose'>1–2 g/kg feed</span></li><li>KCl inland ponds — K⁺ restoration <span class='dose'>10 kg/acre</span></li><li>Raise salinity slowly if &lt;8 ppt <span class='dose'>max 3 ppt/day</span></li><li>Probiotic + prebiotic — gut microbiome restoration <span class='dose'>3–5 g + 2 g/kg feed</span></li><li>Vitamin E + C — antioxidant muscle support <span class='dose'>2 g/kg feed</span></li></ul>",
 bn:"<div class='eb'><div class='eh'>কারণ ম্যাট্রিক্স</div>সাদা পেট = পেটের মাইক্রোবায়োম শূন্য। সাদা পেশি = Mg ও Zn ঘাটতি + তাপমাত্রার চাপ। পেশি টান = অসমোটিক শক, কম Mg, K, হঠাৎ লবণাক্ততা পরিবর্তন।</div><ul class='rx'><li>MgSO₄ খাবারে <span class='dose'>৩–৫ গ্রা/কেজি · ১০ দিন</span></li><li>জিংক + ম্যাঙ্গানিজ <span class='dose'>১–২ গ্রা/কেজি</span></li><li>KCl <span class='dose'>১০ কেজি/একর</span></li><li>লবণাক্ততা ধীরে বাড়ান <span class='dose'>সর্বোচ্চ ৩ ppt/দিন</span></li><li>প্রোবায়োটিক + প্রিবায়োটিক <span class='dose'>৩–৫ + ২ গ্রা/কেজি</span></li><li>ভিটামিন E + C <span class='dose'>২ গ্রা/কেজি</span></li></ul>",
 te:"<div class='eb'><div class='eh'>కారణాల మ్యాట్రిక్స్</div>తెల్ల ప్రేగు = ప్రేగు మైక్రోబయోమ్ ఖాళీ. తెల్ల కండరం = Mg & Zn లోపం + ఉష్ణ ఒత్తిడి. కండర తిమ్మిర్లు = ఆస్మోటిక్ షాక్, తక్కువ Mg, K, అకస్మాత్తు లవణీయత మార్పు.</div><ul class='rx'><li>MgSO₄ ఆహారంలో <span class='dose'>3–5 గ్రా/కి.గ్రా · 10 రోజులు</span></li><li>జింక్ + మాంగనీస్ <span class='dose'>1–2 గ్రా/కి.గ్రా</span></li><li>KCl <span class='dose'>10 కి.గ్రా/ఎకరా</span></li><li>లవణీయత నెమ్మదిగా పెంచండి <span class='dose'>గరిష్టం 3 ppt/రోజు</span></li><li>ప్రొబయోటిక్ + ప్రీబయోటిక్ <span class='dose'>3–5 + 2 గ్రా/కి.గ్రా</span></li><li>విటమిన్ E + C <span class='dose'>2 గ్రా/కి.గ్రా</span></li></ul>"},
{id:"moult",icon:"🦀",ac:"ac-pink",tags:[{c:"te-c",t:"Ca Mg Alkalinity"},{c:"te-c",t:"Lunar Cycle"}],
 ten:"Moulting Failure — Soft Shell",tbn:"মোল্টিং ব্যর্থতা — নরম খোল",tte:"వలువ విడవడం వైఫల్యం",
 sen:"Incomplete moult + lunar clustering + cannibalism",sbn:"অসম্পূর্ণ মোল্ট + চাঁদের চক্র",ste:"అసంపూర్ణ వలువ + చంద్ర చక్రం",
 en:"<div class='eb'><div class='eh'>Why Moults Fail</div>Moulting requires Ca uptake from water + alkalinity buffering for cuticle calcification. Below 80 ppm alkalinity, Ca uptake fails. Low Mg²⁺ impairs neuromuscular coordination during ecdysis. Abrupt pH, salinity, or temperature change causes fatal locked moult — shrimp trapped between old and new cuticle.</div><div class='sh'>Symptoms</div><div class='st'>Soft shell not hardening within 6–12 hours post-moult. Empty shells found with shrimp body still partially inside (fatal incomplete moult). Increased dawn mortality. Cannibalism marks on soft-shelled shrimp.</div><ul class='rx'><li>Maintain alkalinity DOC-appropriate at all times <span class='dose'>120–180 ppm CaCO₃</span></li><li>Dolomite maintenance — fortnightly minimum <span class='dose'>100 kg/ha</span></li><li>Ca + Mg + P mineral supplement in feed <span class='dose'>5 g/kg</span></li><li>Vitamin C — chitin synthesis cofactor <span class='dose'>2 g/kg feed</span></li><li>Stable salinity during moult windows — avoid changes &gt;2 ppt</li><li>Maximum night aeration — post-moult shrimp need highest DO</li><li>Reduce stocking density — reduce cannibalism opportunity</li></ul><div class='it'><span class='bh'>Lunar Moult Tip</span>Shrimp moult on similar lunar cycles — clustering around new and full moon. Expect elevated vulnerability 48–72 hrs around these periods. Do NOT apply disinfectants in this window.</div>",
 bn:"<div class='eb'><div class='eh'>মোল্টিং ব্যর্থ কেন হয়</div>মোল্টিংয়ে পানি থেকে Ca + ক্ষারত্ব বাফারিং দরকার। ৮০ পিপিএম-এর নিচে Ca শোষণ ব্যর্থ। কম Mg²⁺ মোল্টিং সমন্বয় নষ্ট করে। হঠাৎ পরিবর্তনে আটকে যাওয়া মোল্ট।</div><div class='sh'>লক্ষণ</div><div class='st'>মোল্টিংয়ের ৬–১২ ঘণ্টার মধ্যেও খোল শক্ত হয় না। অসম্পূর্ণ মোল্ট। ভোরে বেশি মৃত্যু। নরম চিংড়ির উপর নরখাদকতার দাগ।</div><ul class='rx'><li>সর্বদা DOC-অনুযায়ী ক্ষারত্ব <span class='dose'>১২০–১৮০ পিপিএম CaCO₃</span></li><li>ডলোমাইট রক্ষণাবেক্ষণ <span class='dose'>১০০ কেজি/হেক্টর পক্ষকালে</span></li><li>Ca + Mg + P খাবারে <span class='dose'>৫ গ্রা/কেজি</span></li><li>ভিটামিন C <span class='dose'>২ গ্রা/কেজি</span></li><li>মোল্টিং সময়ে লবণাক্ততা স্থিতিশীল রাখুন</li><li>রাতে সর্বোচ্চ বায়ু সঞ্চালন</li></ul><div class='it'><span class='bh'>চাঁদের চক্রের টিপস</span>অমাবস্যা ও পূর্ণিমার কাছাকাছি ৪৮–৭২ ঘণ্টা বিশেষ সতর্কতা। এই সময়ে জীবাণুনাশক বা চাপমূলক নমুনা এড়ান।</div>",
 te:"<div class='eb'><div class='eh'>వలువ విడవడం ఎందుకు విఫలమవుతుంది</div>వలువ విడవడానికి నీటి నుండి Ca + క్షారత బఫరింగ్ అవసరం. 80 ppm కంటే తక్కువ క్షారత వద్ద Ca శోషణ విఫలం. తక్కువ Mg²⁺ నాడీకండర సమన్వయం దెబ్బతీస్తుంది.</div><div class='sh'>లక్షణాలు</div><div class='st'>వలువ విడిచిన 6–12 గంటల్లోనూ గుల్ల గట్టిపడదు. అసంపూర్ణ వలువ. తెల్లవారు ఎక్కువ మరణాలు. మెత్తని రొయ్యలపై నరమాంస భక్షణ.</div><ul class='rx'><li>DOC ప్రకారం క్షారత నిర్వహించండి <span class='dose'>120–180 ppm CaCO₃</span></li><li>డోలమైట్ నిర్వహణ <span class='dose'>100 కి.గ్రా/హెక్టార్ పక్షానికోసారి</span></li><li>Ca + Mg + P ఆహారంలో <span class='dose'>5 గ్రా/కి.గ్రా</span></li><li>విటమిన్ C <span class='dose'>2 గ్రా/కి.గ్రా</span></li><li>వలువ విడవడం సమయంలో లవణీయత స్థిరంగా ఉంచండి</li><li>రాత్రి గరిష్ట గాలి సంచలనం</li></ul><div class='it'><span class='bh'>చంద్ర వలువ చిట్కా</span>అమావాస్య & పౌర్ణమి సమయంలో 48–72 గంటలు జాగ్రత్తగా ఉండండి. ఈ కాలంలో జీవాణురహిత ఔషధాలు వేయవద్దు.</div>"}
]};

// ── ALL lookup ──
var ALL = {};
CARDS.wq.concat(CARDS.dis).forEach(function(c){ ALL[c.id] = c; });

// ── STATE ──
var curTab = 'wq', curLang = 'en', curId = null, txStart = 0;

// ── LANGUAGE ── body class approach — zero CSS complexity
function setLang(l) {
  curLang = l;
  document.body.className = l;
  document.querySelectorAll('.lbtn').forEach(function(b){ b.className = 'lbtn' + (b.getAttribute('data-l')===l?' on':''); });
  try{ localStorage.setItem('aql',l); }catch(e){}
}

// ── TABS ──
function setTab(t) {
  curTab = t;
  document.querySelectorAll('.tbtn').forEach(function(b){ b.className = 'tbtn'+(b.getAttribute('data-tab')==='dis'?' dis':'')+(b.getAttribute('data-tab')===t?' on':''); });
  document.getElementById('srch').value = '';
  renderList('');
}

// ── RENDER CARD LIST ──
function renderList(q) {
  var cards = CARDS[curTab];
  var sq = (q||'').toLowerCase().trim();
  var html = '';
  var n = 0;
  for (var i=0; i<cards.length; i++) {
    var c = cards[i];
    if (sq && c.ten.toLowerCase().indexOf(sq)<0 && c.sen.toLowerCase().indexOf(sq)<0
            && c.tbn.indexOf(sq)<0 && c.tte.indexOf(sq)<0 && c.id.indexOf(sq)<0) continue;
    n++;
    var tags = '';
    for (var j=0; j<c.tags.length; j++) tags += "<span class='tag "+c.tags[j].c+"'>"+c.tags[j].t+"</span>";
    html += "<div class='card "+c.ac+"' data-id='"+c.id+"'>"
      + "<div class='ci'>"+c.icon+"</div>"
      + "<div class='cb'>"
        + "<div class='ct en'>"+c.ten+"</div>"
        + "<div class='ct bn'>"+c.tbn+"</div>"
        + "<div class='ct te'>"+c.tte+"</div>"
        + "<div class='cs en'>"+c.sen+"</div>"
        + "<div class='cs bn'>"+c.sbn+"</div>"
        + "<div class='cs te'>"+c.ste+"</div>"
        + "<div class='ctags'>"+tags+"</div>"
      + "</div>"
      + "<div class='ca'>›</div>"
    + "</div>";
  }
  document.getElementById('list').innerHTML = html + "<div id='nores'"+(n?"":" class='show'")+">\uD83D\uDD0E No results</div>";
  // Re-attach click listeners
  var list = document.getElementById('list');
  list.onclick = function(e) {
    var el = e.target;
    while (el && el !== list) {
      if (el.getAttribute && el.getAttribute('data-id')) { openDetail(el.getAttribute('data-id')); return; }
      el = el.parentElement;
    }
  };
}

// ── DETAIL VIEW ──
function openDetail(id) {
  var c = ALL[id]; if(!c) return;
  curId = id;
  document.getElementById('dico').textContent = c.icon;
  document.getElementById('dtit').innerHTML = "<span class='en'>"+c.ten+"</span><span class='bn'>"+c.tbn+"</span><span class='te'>"+c.tte+"</span>";
  document.getElementById('dsub').innerHTML = "<span class='en'>"+c.sen+"</span><span class='bn'>"+c.sbn+"</span><span class='te'>"+c.ste+"</span>";
  document.getElementById('dbdg').innerHTML = '';
  document.getElementById('den').innerHTML = c.en;
  document.getElementById('dbn').innerHTML = c.bn;
  document.getElementById('dte').innerHTML = c.te;
  document.getElementById('dscr').scrollTop = 0;
  document.getElementById('det').classList.add('open');
}

function closeDetail() {
  document.getElementById('det').classList.remove('open');
  curId = null;
}

// ── EVENTS — zero inline handlers ──
document.querySelectorAll('.lbtn').forEach(function(b){
  b.addEventListener('click', function(){ setLang(b.getAttribute('data-l')); });
});
document.querySelectorAll('.tbtn').forEach(function(b){
  b.addEventListener('click', function(){ setTab(b.getAttribute('data-tab')); });
});
document.getElementById('back').addEventListener('click', closeDetail);
document.getElementById('srch').addEventListener('input', function(e){ renderList(e.target.value); });

// Swipe right to go back
document.getElementById('det').addEventListener('touchstart', function(e){ txStart = e.touches[0].clientX; }, {passive:true});
document.getElementById('det').addEventListener('touchend', function(e){ if(e.changedTouches[0].clientX - txStart > 70 && txStart < 50) closeDetail(); }, {passive:true});

// ── INIT ──
(function(){
  var l = 'en';
  try{ l = localStorage.getItem('aql') || 'en'; }catch(e){}
  setLang(l);
  renderList('');
})();
</script>

</body>
</html>
