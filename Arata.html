<div class="step-label">తెల్ల మలం ప్రోటోకాల్</div>
<ul class="rx"><li>ఆహారం 30–50% వెంటనే తగ్గించండి</li><li>ప్రొబయోటిక్ <span class="dose">చెరువులో 2 కి.గ్రా/ఎకరా · ఆహారంలో 3 గ్రా/కి.గ్రా</span></li><li>సేంద్రియ ఆమ్లాలు <span class="dose">3–5 గ్రా/కి.గ్రా · 15 రోజులు</span></li><li>హెపటోప్రొటెక్టివ్ సప్లిమెంట్ <span class="dose">1–2 కి.గ్రా/టన్</span></li><li>నీటి మార్పు <span class="dose">15–20% నిత్యం</span></li></ul>
<div class="step-label">వదులైన గుల్ల ప్రోటోకాల్</div>
<ul class="rx"><li>డోలమైట్ <span class="dose">100 కి.గ్రా/ఎకరా</span></li><li>Ca + Mg ఆహారంలో <span class="dose">5 గ్రా/కి.గ్రా</span></li><li>క్షారత 150–180 ppm</li><li>విటమిన్ C + K <span class="dose">2 గ్రా/కి.గ్రా</span></li></ul>`
},
{id:"blackgill",icon:"🖤",color:"c-teal",tab:"dis",
 tags:[{c:"tag-para",t:"Ciliate + Fusarium"},{c:"tag-enviro",t:"Low DO Trigger"}],
 title:{en:"Black Gill Disease",bn:"কালো ফুলকা রোগ",te:"నల్ల గిల్ వ్యాధి"},
 sub:{en:"Ciliate + fungal fouling · Immunity is the real defence",bn:"সিলিয়েট + ছত্রাক · রোগ প্রতিরোধ শক্তিই আসল রক্ষা",te:"సిలియేట్ + శిలీంధ్రం · రోగనిరోధకత నిజమైన రక్షణ"},
 badges:[],
 en:`<div class="elab-block"><div class="elab-head">Host Immunity Is the Real Defence</div>Zoothamnium, Epistylis, Vorticella (ciliates) + Fusarium + bacteria colonise gill surfaces only when host immunity is compromised by low DO, high organic load, or H₂S. These organisms are always present in pond water — they exploit weakened shrimp. 22% of east India coastal farms showed darkened gills in suboptimal ponds.</div>
<div class="symp-h">Symptoms</div>
<div class="symp-t">Gills turn grey, brown, or black (normal: pale pink-white). Fluffy/slimy fouling material on gill surface under magnification. Shrimp surface-gasping to increase O₂. FCR worsens despite adequate feeding. Severe cases: gill necrosis — irreversible tissue loss.</div>
<ul class="rx"><li>Emergency aeration — all aerators ON immediately</li><li>Water exchange <span class="dose">20–25%</span></li><li>BKC 80% — protozoan + bacterial control <span class="dose">500 mL/acre · evening</span></li><li>TCCA <span class="dose">0.5 ppm · evening · alternate with BKC</span></li><li>Zeolite — TAN + H₂S bottom management <span class="dose">15 kg/acre</span></li><li>Dolomite — raise pH, suppress ciliate growth environment <span class="dose">100 kg/acre</span></li></ul>
<div class="inl-t"><span class="bxh">Prevention</span>Fortnightly BKC + probiotic alternation dramatically reduces incidence. Maintain DO &gt;5 mg/L at all times — healthy shrimp with strong immunity resist ciliate colonisation even in contaminated water.</div>`,
 bn:`<div class="elab-block"><div class="elab-head">পোষক রোগ প্রতিরোধ শক্তিই আসল রক্ষা</div>কম DO, উচ্চ জৈব ভার বা H₂S-এ দুর্বল চিংড়ির ফুলকায় জুথ্যামনিয়াম, এপিস্টিলিস, ফিউসারিয়াম আক্রমণ করে। ২২% পূর্ব ভারত উপকূলীয় পুকুরে ফুলকা কালোকরণ।</div>
<div class="symp-h">লক্ষণ</div>
<div class="symp-t">ফুলকা ধূসর, বাদামী বা কালো। চিংড়ি উপরে O₂ নিতে যায়। FCR খারাপ হয়।</div>
<ul class="rx"><li>সব এয়ারেটর তক্ষুনি চালু</li><li>পানি বদল <span class="dose">২০–২৫%</span></li><li>BKC 80% <span class="dose">৫০০ মিলি/একর · সন্ধ্যায়</span></li><li>TCCA <span class="dose">০.৫ পিপিএম · সন্ধ্যায়</span></li><li>জিওলাইট <span class="dose">১৫ কেজি/একর</span></li><li>ডলোমাইট <span class="dose">১০০ কেজি/একর</span></li></ul>
<div class="inl-t"><span class="bxh">প্রতিরোধ</span>পক্ষকালে BKC + প্রোবায়োটিক পর্যায়ক্রমে দিন। DO &gt;৫ বজায় রাখুন।</div>`,
 te:`<div class="elab-block"><div class="elab-head">అతిథి రోగనిరోధకత నిజమైన రక్షణ</div>తక్కువ DO, అధిక సేంద్రియ భారం లేదా H₂S లో బలహీనపడిన రొయ్యల గిల్‌లపై జూథ్యాంమ్నియమ్, ఎపిస్టిలిస్, ఫ్యుసారియమ్ వలసపోతాయి. 22% తూర్పు భారత్ తీర చెరువులలో నల్లని గిల్స్.</div>
<div class="symp-h">లక్షణాలు</div>
<div class="symp-t">గిల్స్ బూడిద, గోధుమ, లేదా నల్లగా మారుతాయి. రొయ్యలు O₂ కోసం పైకి వస్తాయి. FCR దెబ్బతింటుంది.</div>
<ul class="rx"><li>అన్ని ఏరేటర్లు వెంటనే ఆన్</li><li>నీటి మార్పు <span class="dose">20–25%</span></li><li>BKC 80% <span class="dose">500 మి.లీ/ఎకరా · సాయంత్రం</span></li><li>TCCA <span class="dose">0.5 ppm · సాయంత్రం</span></li><li>జియోలైట్ <span class="dose">15 కి.గ్రా/ఎకరా</span></li><li>డోలమైట్ <span class="dose">100 కి.గ్రా/ఎకరా</span></li></ul>
<div class="inl-t"><span class="bxh">నివారణ</span>పక్షానికోసారి BKC + ప్రొబయోటిక్ పర్యాయంగా. DO &gt;5 నిర్వహించండి.</div>`
},
{id:"whitemuscle",icon:"⚪",color:"c-green",tab:"dis",
 tags:[{c:"tag-enviro",t:"Mg²⁺ Zn K⁺ Deficiency"},{c:"tag-enviro",t:"Osmotic Stress"}],
 title:{en:"White Muscle, Gut &amp; Cramp",bn:"সাদা পেশি, পেট ও পেশি টান",te:"తెల్ల కండరం, ప్రేగు &amp; తిమ్మిర్లు"},
 sub:{en:"Mineral deficiency · Osmotic shock · Ionic imbalance",bn:"খনিজ ঘাটতি · অসমোটিক শক",te:"ఖనిజ లోపం · ఆస్మోటిక్ షాక్"},
 badges:[],
 en:`<div class="elab-block"><div class="elab-head">Cause Matrix</div>White gut = gut cleared of microbiome (starvation, Vibrio, EHP HP failure — gut appears white/empty on dissection). White muscle = Mg and Zn deficiency + temperature stress (summer shallow ponds — opaque white patches on abdominal segments). Muscle cramp = osmotic shock, low Mg²⁺, low K⁺, abrupt salinity change &gt;5 ppt (bent/curled body at tail — cannot swim straight). Inland low-salinity (4–10 ppt) ponds highest risk — K⁺ and Mg²⁺ proportionally even lower than NaCl.</div>
<ul class="rx"><li>Mg supplement (MgSO₄) in feed <span class="dose">3–5 g/kg · 10 days</span></li><li>Zinc + manganese mineral supplement <span class="dose">1–2 g/kg feed</span></li><li>KCl inland ponds — K⁺ restoration <span class="dose">10 kg/acre</span></li><li>Raise salinity slowly if &lt;8 ppt <span class="dose">≤3 ppt/day</span></li><li>Probiotic + prebiotic — gut microbiome restoration <span class="dose">3–5 g + 2 g/kg feed</span></li><li>Vitamin E + C — antioxidant muscle support <span class="dose">2 g/kg feed</span></li></ul>`,
 bn:`<div class="elab-block"><div class="elab-head">কারণ ম্যাট্রিক্স</div>সাদা পেট = পেটের মাইক্রোবায়োম শূন্য। সাদা পেশি = Mg ও Zn ঘাটতি + তাপমাত্রার চাপ। পেশি টান = অসমোটিক শক, কম Mg²⁺, K⁺, হঠাৎ লবণাক্ততা পরিবর্তন।</div>
<ul class="rx"><li>MgSO₄ খাবারে <span class="dose">৩–৫ গ্রা/কেজি · ১০ দিন</span></li><li>জিংক + ম্যাঙ্গানিজ <span class="dose">১–২ গ্রা/কেজি</span></li><li>KCl <span class="dose">১০ কেজি/একর</span></li><li>লবণাক্ততা ধীরে বাড়ান <span class="dose">≤৩ ppt/দিন</span></li><li>প্রোবায়োটিক + প্রিবায়োটিক <span class="dose">৩–৫ + ২ গ্রা/কেজি</span></li><li>ভিটামিন E + C <span class="dose">২ গ্রা/কেজি</span></li></ul>`,
 te:`<div class="elab-block"><div class="elab-head">కారణాల మ్యాట్రిక్స్</div>తెల్ల ప్రేగు = ప్రేగు మైక్రోబయోమ్ ఖాళీ. తెల్ల కండరం = Mg &amp; Zn లోపం + ఉష్ణ ఒత్తిడి. కండర తిమ్మిర్లు = ఆస్మోటిక్ షాక్, తక్కువ Mg²⁺, K⁺, అకస్మాత్తు లవణీయత మార్పు.</div>
<ul class="rx"><li>MgSO₄ ఆహారంలో <span class="dose">3–5 గ్రా/కి.గ్రా · 10 రోజులు</span></li><li>జింక్ + మాంగనీస్ <span class="dose">1–2 గ్రా/కి.గ్రా</span></li><li>KCl <span class="dose">10 కి.గ్రా/ఎకరా</span></li><li>లవణీయత నెమ్మదిగా పెంచండి <span class="dose">≤3 ppt/రోజు</span></li><li>ప్రొబయోటిక్ + ప్రీబయోటిక్ <span class="dose">3–5 + 2 గ్రా/కి.గ్రా</span></li><li>విటమిన్ E + C <span class="dose">2 గ్రా/కి.గ్రా</span></li></ul>`
},
{id:"moult",icon:"🦀",color:"c-pink",tab:"dis",
 tags:[{c:"tag-enviro",t:"Ca Mg Alkalinity"},{c:"tag-enviro",t:"Lunar Cycle Trigger"}],
 title:{en:"Moulting Failure — Soft Shell",bn:"মোল্টিং ব্যর্থতা — নরম খোল",te:"వలువ విడవడం వైఫల్యం — మెత్తని గుల్ల"},
 sub:{en:"Incomplete moult + lunar clustering + cannibalism",bn:"অসম্পূর্ণ মোল্ট + চাঁদের চক্র + নরখাদকতা",te:"అసంపూర్ణ వలువ + చంద్ర చక్రం + నరమాంస భక్షణ"},
 badges:[],
 en:`<div class="elab-block"><div class="elab-head">Why Moults Fail</div>Moulting requires Ca uptake from water + alkalinity buffering for cuticle calcification. Below 80 ppm alkalinity, Ca uptake fails. Low Mg²⁺ impairs neuromuscular coordination during ecdysis sequence. Abrupt pH, salinity, or temperature change during moult cycle causes fatal "locked moult" — shrimp trapped between old and new cuticle. Cannibalism of soft-shelled shrimp escalates at high stocking density.</div>
<div class="symp-h">Symptoms</div>
<div class="symp-t">Soft shell not hardening within 6–12 hours post-moult. Empty shells found with shrimp body still partially inside (fatal incomplete moult). Increased dawn mortality — post-moult shrimp most vulnerable for 4–6 hours. Cannibalism marks on soft-shelled shrimp. Reduced weight gain despite adequate feeding.</div>
<ul class="rx"><li>Maintain alkalinity DOC-appropriate at all times <span class="dose">120–180 ppm CaCO₃</span></li><li>Dolomite maintenance — fortnightly minimum <span class="dose">100 kg/ha</span></li><li>Ca + Mg + P mineral supplement in feed <span class="dose">5 g/kg</span></li><li>Vitamin C — chitin synthesis cofactor <span class="dose">2 g/kg feed</span></li><li>Stable salinity during moult windows — avoid changes &gt;2 ppt</li><li>Maximum night aeration — post-moult shrimp need highest DO</li><li>Reduce stocking density — reduce cannibalism opportunity</li></ul>
<div class="inl-t"><span class="bxh">Lunar Moult Tip</span>Shrimp in a pond moult on similar lunar cycles — clustering around new and full moon. Expect elevated vulnerability 48–72 hrs around these periods. Do NOT apply disinfectants or take stressful samples in this window.</div>`,
 bn:`<div class="elab-block"><div class="elab-head">মোল্টিং ব্যর্থ কেন হয়</div>মোল্টিংয়ে পানি থেকে Ca + ক্ষারত্ব বাফারিং দরকার। ৮০ পিপিএম-এর নিচে Ca শোষণ ব্যর্থ। কম Mg²⁺ মোল্টিং সমন্বয় নষ্ট করে। হঠাৎ pH/লবণাক্ততা/তাপমাত্রা পরিবর্তনে "আটকে যাওয়া মোল্ট"।</div>

// ═══════════════════════════════════
// APP STATE & LOGIC
// ═══════════════════════════════════
let tab=“wq”,lang=“en”,openId=null,touchX=0;

// All cards flat lookup
const ALL = […C.wq,…C.dis].reduce((m,c)=>(m[c.id]=c,m),{});

function setLang(l){
lang=l;
document.documentElement.setAttribute(“data-lang”,l);
document.querySelectorAll(”.ls-btn”).forEach(b=>b.classList.toggle(“active”,b.dataset.l===l));
try{localStorage.setItem(“aqfl”,l);}catch(e){}
if(openId) openDetail(openId);
}

function setTab(t){
tab=t;
document.querySelectorAll(”.tab-btn”).forEach(b=>b.classList.toggle(“active”,b.dataset.tab===t));
renderList(””);
}

function renderList(q){
const list=document.getElementById(“card-list”);
const cards=C[tab];
const sq=(q||””).toLowerCase().trim();
list.innerHTML=””;
let n=0;
cards.forEach(c=>{
const match=!sq||c.title.en.toLowerCase().includes(sq)||c.sub.en.toLowerCase().includes(sq)||c.title.bn.includes(sq)||c.title.te.includes(sq)||c.id.includes(sq);
if(!match)return;
n++;
const el=document.createElement(“div”);
el.className=“pcard “+c.color;
el.dataset.id=c.id;
const tags=c.tags.map(t=>`<span class="pc-tag ${t.c}">${t.t}</span>`).join(””);
el.innerHTML=`<div class="pc-icon">${c.icon}</div>

<div class="pc-body">
  <div class="pc-title t-en">${c.title.en}</div>
  <div class="pc-title t-bn">${c.title.bn}</div>
  <div class="pc-title t-te">${c.title.te}</div>
  <div class="pc-sub t-en">${c.sub.en}</div>
  <div class="pc-sub t-bn">${c.sub.bn}</div>
  <div class="pc-sub t-te">${c.sub.te}</div>
  <div class="pc-tags">${tags}</div>
</div><div class="pc-arr">›</div>`;
    list.appendChild(el);
  });
  const emp=document.getElementById("empty");
  emp.className=n?"":"show";
}

function openDetail(id){
const c=ALL[id]; if(!c)return;
openId=id;
document.getElementById(“dicon”).textContent=c.icon;
document.getElementById(“dtitle”).innerHTML=`<span class="t-en">${c.title.en}</span><span class="t-bn">${c.title.bn}</span><span class="t-te">${c.title.te}</span>`;
document.getElementById(“dsub”).innerHTML=`<span class="t-en">${c.sub.en}</span><span class="t-bn">${c.sub.bn}</span><span class="t-te">${c.sub.te}</span>`;
document.getElementById(“dbadges”).innerHTML=(c.badges||[]).map(b=>`<span class="dbadge ${b.c}">${b.t}</span>`).join(””);
document.getElementById(“den”).innerHTML=c.en;
document.getElementById(“dbn”).innerHTML=c.bn;
document.getElementById(“dte”).innerHTML=c.te;
document.getElementById(“dscroll”).scrollTop=0;
document.getElementById(“detail”).classList.add(“open”);
document.getElementById(“scroll-area”).style.overflowY=“hidden”;
}

function closeDetail(){
document.getElementById(“detail”).classList.remove(“open”);
document.getElementById(“scroll-area”).style.overflowY=“auto”;
openId=null;
}

// ═══════════════════════════════════
// EVENTS — zero inline handlers
// ═══════════════════════════════════
document.querySelectorAll(”.ls-btn”).forEach(b=>b.addEventListener(“click”,()=>setLang(b.dataset.l)));
document.querySelectorAll(”.tab-btn”).forEach(b=>b.addEventListener(“click”,()=>setTab(b.dataset.tab)));
document.getElementById(“card-list”).addEventListener(“click”,e=>{
const c=e.target.closest(”.pcard”); if(c)openDetail(c.dataset.id);
});
document.getElementById(“back”).addEventListener(“click”,closeDetail);
document.getElementById(“search-input”).addEventListener(“input”,e=>renderList(e.target.value));

// Swipe-right to close detail
const dv=document.getElementById(“detail”);
dv.addEventListener(“touchstart”,e=>{touchX=e.touches[0].clientX;},{passive:true});
dv.addEventListener(“touchend”,e=>{if(e.changedTouches[0].clientX-touchX>70&&touchX<50)closeDetail();},{passive:true});

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
(function(){
let saved=“en”;
try{saved=localStorage.getItem(“aqfl”)||“en”;}catch(e){}
setLang(saved);
renderList(””);
})();
</script>

</body>
</html>
