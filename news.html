<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The Brief — Your Personal Indian Newspaper</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f6f0df;--paper2:#ede5cc;--ink:#1a1410;--ink2:#3d3428;--ink3:#7a6e5c;
  --rule:#1a1410;--rule-lt:#c8b99a;--red:#b5200f;--saffron:#d4691a;
  --ap-gold:#8a6c00;--tg-blue:#1a4a8a;--ai-bg:#fffbf0;--ai-border:#c8a85a;
}
html{scroll-behavior:smooth}
body{background:#d0c4a8;color:var(--ink);font-family:'Lora',serif;min-height:100vh}

/* ── PAPER WRAPPER ── */
#paper{max-width:1400px;margin:0 auto;background:var(--paper);box-shadow:0 4px 40px rgba(0,0,0,.28);min-height:100vh}

/* ── MASTHEAD ── */
#masthead{background:var(--paper);border-bottom:3px solid var(--rule);padding:0 36px;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(26,20,16,.13)}
.mast-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--rule-lt);font-family:'Fira Code',monospace;font-size:.6rem;color:var(--ink3);letter-spacing:.08em;flex-wrap:wrap;gap:8px}
.bar-left{display:flex;gap:14px;align-items:center}
.edition-tag{background:var(--ink);color:var(--paper);padding:2px 8px;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase}
.bar-right{display:flex;align-items:center;gap:8px}
#key-status{font-family:'Fira Code',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border:1px solid}
#key-status.no-key{color:var(--red);border-color:var(--red);background:rgba(181,32,15,.07)}
#key-status.has-key{color:#1a6e2a;border-color:#1a6e2a;background:rgba(26,110,42,.07)}
#key-toggle{font-family:'Fira Code',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;transition:opacity .15s}
#key-toggle:hover{opacity:.8}

/* Key drawer */
#key-drawer{overflow:hidden;max-height:0;transition:max-height .3s ease;background:var(--paper2);border-bottom:1px solid var(--rule-lt)}
#key-drawer.open{max-height:70px}
.key-row{padding:10px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.key-lbl{font-family:'Fira Code',monospace;font-size:.6rem;color:var(--ink2);white-space:nowrap}
#groq-key-input{flex:1;max-width:420px;background:var(--paper);border:1px solid var(--ink3);color:var(--ink);font-family:'Fira Code',monospace;font-size:.68rem;padding:6px 10px;outline:none;transition:border-color .2s}
#groq-key-input:focus{border-color:var(--ink)}
#groq-key-input::placeholder{color:var(--ink3)}
.btn-sv{padding:6px 14px;background:var(--ink);color:var(--paper);border:none;font-family:'Fira Code',monospace;font-size:.6rem;cursor:pointer}
.btn-sv:hover{background:var(--ink2)}
.btn-cl{padding:6px 10px;background:transparent;color:var(--red);border:1px solid var(--red);font-family:'Fira Code',monospace;font-size:.6rem;cursor:pointer}

/* Nameplate */
.nameplate{text-align:center;padding:14px 0 6px}
.paper-name{font-family:'Playfair Display',serif;font-size:3.8rem;font-weight:900;letter-spacing:12px;color:var(--ink);line-height:1;text-transform:uppercase}
.paper-name .dot{color:var(--red);letter-spacing:0}
.paper-tagline{font-family:'Fira Code',monospace;font-size:.55rem;letter-spacing:.28em;color:var(--ink3);text-transform:uppercase;margin-top:4px}
.rule-double{border-top:4px double var(--rule);margin:6px 0 0}

/* Tabs */
.tabs-row{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:2px solid var(--rule);align-items:stretch}
.tabs-row::-webkit-scrollbar{display:none}
.tab{padding:7px 18px;font-family:'Fira Code',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;position:relative;bottom:-2px}
.tab:hover{color:var(--ink2)}
.tab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:500}
.tab.active[data-r=ap]{color:var(--ap-gold);border-bottom-color:var(--ap-gold)}
.tab.active[data-r=tg]{color:var(--tg-blue);border-bottom-color:var(--tg-blue)}
.tab.active[data-r=ai]{color:#5a1a8a;border-bottom-color:#5a1a8a}

/* ── CONTENT ── */
#content-area{padding:28px 36px 56px}
.sec-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.sec-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;font-style:italic;color:var(--ink2);white-space:nowrap}
.sec-rule{flex:1;height:1px;background:var(--rule)}
.sec-src{font-family:'Fira Code',monospace;font-size:.52rem;color:var(--ink3);letter-spacing:.07em;white-space:nowrap}
.sec-cnt{font-family:'Fira Code',monospace;font-size:.52rem;color:var(--muted, var(--ink3));letter-spacing:.08em;white-space:nowrap}
.btn-ref{font-family:'Fira Code',monospace;font-size:.52rem;padding:3px 8px;background:none;border:1px solid var(--ink3);color:var(--ink3);cursor:pointer;transition:all .15s}
.btn-ref:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* ── FRONT PAGE LAYOUT ── */
.front-page{display:grid;grid-template-columns:3fr 1px 2fr;gap:0;border:1px solid var(--rule)}
.col-div{background:var(--rule);width:1px;margin:16px 0}

/* Hero */
.hero{padding:22px 26px;display:flex;flex-direction:column;gap:12px}
.hero-cat{font-family:'Fira Code',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hero-headline{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;line-height:1.22;color:var(--ink);border-bottom:2px solid var(--rule);padding-bottom:12px}
.hero-desc{font-size:.88rem;line-height:1.78;color:var(--ink2)}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}

/* Sidebar */
.sidebar{display:flex;flex-direction:column}
.side-art{padding:16px 20px;border-bottom:1px solid var(--rule-lt);flex:1;display:flex;flex-direction:column;gap:7px}
.side-art:last-child{border-bottom:none}
.side-cat{font-family:'Fira Code',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.side-headline{font-family:'Playfair Display',serif;font-size:.97rem;font-weight:700;line-height:1.3;color:var(--ink)}
.side-desc{font-size:.74rem;line-height:1.6;color:var(--ink3);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.side-actions{display:flex;gap:6px;margin-top:auto;padding-top:6px;flex-wrap:wrap}

/* Lower grid */
.lower-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--rule);border-top:none}
.grid-art{padding:16px 18px;border-right:1px solid var(--rule-lt);border-bottom:1px solid var(--rule-lt);display:flex;flex-direction:column;gap:7px;animation:fadeUp .35s ease backwards}
.grid-art:nth-child(4n){border-right:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.grid-cat{font-family:'Fira Code',monospace;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.grid-headline{font-family:'Playfair Display',serif;font-size:.94rem;font-weight:700;line-height:1.32;color:var(--ink)}
.grid-desc{font-size:.73rem;line-height:1.58;color:var(--ink3);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.grid-actions{display:flex;gap:6px;margin-top:auto;padding-top:6px;flex-wrap:wrap}

/* Category colour classes */
.c-world{color:#5a3a8a}.c-india{color:var(--saffron)}.c-ap{color:var(--ap-gold)}
.c-tg{color:var(--tg-blue)}.c-sport{color:var(--red)}.c-biz{color:#1a6e2a}
.c-health{color:#5a1a6e}.c-ai{color:#5a1a8a}

/* ── BUTTONS ── */
.btn{padding:5px 12px;font-family:'Fira Code',monospace;font-size:.56rem;letter-spacing:.07em;text-transform:uppercase;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px;text-decoration:none}
.btn-ai{background:var(--ink);color:var(--paper)}
.btn-ai:hover:not(:disabled){background:var(--ink2)}
.btn-ai:disabled{background:var(--ink3);cursor:not-allowed}
.btn-ai.r-ap{background:var(--ap-gold);color:#fff}
.btn-ai.r-ap:hover:not(:disabled){background:#7a5c00}
.btn-ai.r-tg{background:var(--tg-blue);color:#fff}
.btn-ai.r-tg:hover:not(:disabled){background:#153a70}
.btn-ai.r-ai{background:#5a1a8a;color:#fff}
.btn-ai.r-ai:hover:not(:disabled){background:#420f66}
.btn-read{background:transparent;color:var(--ink3);border:1px solid var(--rule-lt)}
.btn-read:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* ── AI PANEL ── */
.ai-panel{background:var(--ai-bg);border:1px solid var(--ai-border);border-left:3px solid var(--ink);padding:12px 14px;animation:fadeSlide .3s ease}
.ai-panel.r-ap{border-left-color:var(--ap-gold)}
.ai-panel.r-tg{border-left-color:var(--tg-blue)}
.ai-panel.r-ai{border-left-color:#5a1a8a}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-family:'Fira Code',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase}
.ai-tag{color:var(--ink2)}.groq-tag{color:var(--ink3);margin-left:auto}
.ai-text{font-family:'Lora',serif;font-size:.78rem;font-style:italic;line-height:1.72;color:var(--ink2)}

/* ── LANGUAGE BADGES ── */
.lang-badge{display:inline-flex;align-items:center;font-family:'Fira Code',monospace;font-size:.5rem;font-weight:500;letter-spacing:.09em;padding:1px 6px;border:1px solid;vertical-align:middle;white-space:nowrap}
.lb-te{color:#7a5c00;background:#fff8dd;border-color:#c8a030}
.lb-en{color:#2a4a2a;background:#f0f7f0;border-color:#6a9a6a}

/* ── SKELETON ── */
#skel-wrap{display:grid;grid-template-columns:3fr 2fr;gap:24px;border:1px solid var(--rule);padding:28px}
.skel{background:linear-gradient(90deg,var(--paper2) 25%,#e8ddc0 50%,var(--paper2) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:1px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── ERROR ── */
.err-box{border:1px solid var(--rule);padding:60px;text-align:center}
.err-icon{font-size:2.5rem;display:block;margin-bottom:14px}
.err-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--ink);margin-bottom:8px}
.err-msg{font-family:'Fira Code',monospace;font-size:.65rem;color:var(--ink3);line-height:1.9}

/* ── SPINNER / TOAST ── */
.spin{display:inline-block;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--paper);font-family:'Fira Code',monospace;font-size:.62rem;letter-spacing:.04em;padding:10px 16px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;border-left:3px solid var(--red)}
#toast.show{opacity:1;transform:translateY(0)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--paper2)}
::-webkit-scrollbar-thumb{background:var(--rule-lt);border-radius:2px}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .front-page{grid-template-columns:1fr}.col-div{display:none}
  .lower-grid{grid-template-columns:repeat(2,1fr)}
  #content-area{padding:16px}#masthead{padding:0 16px}
  .paper-name{font-size:2.4rem;letter-spacing:6px}
}
@media(max-width:560px){
  .lower-grid{grid-template-columns:1fr}.paper-name{font-size:1.8rem;letter-spacing:3px}
}
</style>
</head>
<body>
<div id="paper">

<!-- ══════════ MASTHEAD ══════════ -->
<header id="masthead">
  <div class="mast-bar">
    <div class="bar-left">
      <span class="edition-tag">Hyderabad Edition</span>
      <span id="datestamp"></span>
    </div>
    <div class="bar-right">
      <div id="key-status" class="no-key">No API Key</div>
      <button id="key-toggle" onclick="toggleKey()">⚙ Groq Key</button>
    </div>
  </div>

  <div id="key-drawer">
    <div class="key-row">
      <span class="key-lbl">Groq API Key (free · console.groq.com):</span>
      <input type="password" id="groq-key-input" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false"/>
      <button class="btn-sv" onclick="saveKey()">Save</button>
      <button class="btn-cl" onclick="clearKey()">Clear</button>
    </div>
  </div>

  <div class="nameplate">
    <div class="paper-name">THE BRIEF<span class="dot">.</span></div>
    <div class="paper-tagline">Your Personal AI-Powered Indian Newspaper</div>
  </div>
  <div class="rule-double"></div>

  <div class="tabs-row" id="tabs"></div>
</header>

<!-- ══════════ CONTENT ══════════ -->
<main id="content-area">
  <div class="sec-header">
    <span class="sec-name" id="sec-name"></span>
    <div class="sec-rule"></div>
    <span class="sec-src" id="sec-src"></span>
    <span class="sec-cnt" id="sec-cnt"></span>
    <button class="btn-ref" onclick="refreshCat()">↻ Refresh</button>
  </div>
  <div id="content"></div>
</main>
</div>
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   CATEGORIES
   Telugu sources: ABN Andhra Jyothi + BBC Telugu only
═══════════════════════════════════════════════ */
const CATS = [

    id:"world", label:"World", icon:"🌍", region:"world", cc:"c-world", mixed:true,
    feeds:[
      { url:"https://feeds.feedburner.com/ndtvnews-world-news",                   name:"NDTV World",       lang:"en" },

  },

    feeds:[

      { url:"https://feeds.feedburner.com/ndtvnews-top-stories",                  name:"NDTV",             lang:"en" },
      { url:"https://www.thehindu.com/feeder/default.rss",                        name:"The Hindu",        lang:"en" },
      { url:"https://feeds.bbci.co.uk/telugu/rss.xml",                            name:"BBC Telugu",       lang:"te" },

  },
  {

    feeds:[
      { url:"https://www.thehindu.com/news/national/andhra-pradesh/feeder/default.rss", name:"The Hindu AP",     lang:"en" },
      { url:"https://www.thehindu.com/news/national/telangana/feeder/default.rss",      name:"The Hindu TG",     lang:"en" },
      { url:"https://telanganatoday.com/feed",                                           name:"Telangana Today",  lang:"en" },
      { url:"https://andhrajyothy.com/rss/feed.xml",                                    name:"ABN AndhraJyothi", lang:"te" },
      { url:"https://feeds.bbci.co.uk/telugu/rss.xml",                                  name:"BBC Telugu",       lang:"te" },
    ]
  },
  {
    id:"hyd", label:"Hyderabad", icon:"🕌", region:"tg", cc:"c-tg", mixed:true,
    feeds:[
      { url:"https://timesofindia.indiatimes.com/rss/4719148.cms",               name:"TOI Hyderabad",    lang:"en" },
      { url:"https://www.thehindu.com/news/cities/Hyderabad/feeder/default.rss", name:"The Hindu HYD",    lang:"en" },
      { url:"https://telanganatoday.com/hyderabad/feed",                          name:"Telangana Today",  lang:"en" },
      { url:"https://andhrajyothy.com/rss/feed.xml",                             name:"ABN AndhraJyothi", lang:"te" },
      { url:"https://feeds.bbci.co.uk/telugu/rss.xml",                           name:"BBC Telugu",       lang:"te" },
    ]
  },
  {
    id:"vja", label:"Vijayawada · Amaravati", icon:"🏙", region:"ap", cc:"c-ap", mixed:true,
    feeds:[
      { url:"https://www.thehindu.com/news/cities/Vijayawada/feeder/default.rss",       name:"The Hindu VJA",    lang:"en" },
      { url:"https://www.thehindu.com/news/national/andhra-pradesh/feeder/default.rss", name:"The Hindu AP",     lang:"en" },
      { url:"https://andhrajyothy.com/rss/feed.xml",                                    name:"ABN AndhraJyothi", lang:"te" },
      { url:"https://feeds.bbci.co.uk/telugu/rss.xml",                                  name:"BBC Telugu",       lang:"te" },
    ]
  },
  {

    feeds:[
      { url:"https://feeds.feedburner.com/ndtvnews-sports",                      name:"NDTV Sports",      lang:"en" },
      { url:"https://timesofindia.indiatimes.com/rss/4719161.cms",               name:"TOI Sports",       lang:"en" },
      { url:"https://feeds.bbci.co.uk/sport/cricket/rss.xml",                   name:"BBC Cricket",      lang:"en" },

    feeds:[

      { url:"https://economictimes.indiatimes.com/rssfeedstopstories.cms",           name:"Economic Times",  lang:"en" },

    feeds:[
      { url:"https://feeds.feedburner.com/ndtvnews-health",                      name:"NDTV Health",      lang:"en" },
      { url:"https://feeds.bbci.co.uk/news/health/rss.xml",                      name:"BBC Health",       lang:"en" },
      { url:"https://feeds.bbci.co.uk/telugu/rss.xml",                           name:"BBC Telugu",       lang:"te" },

    feeds:[
      { url:"https://techcrunch.com/category/artificial-intelligence/feed/",     name:"TechCrunch AI",    lang:"en" },
      { url:"https://www.technologyreview.com/feed/",                             name:"MIT Tech Review",  lang:"en" },
      { url:"https://www.theverge.com/rss/ai-artificial-intelligence/index.xml", name:"The Verge AI",     lang:"en" },

    ]
  },
];

/* ═══════════════════════════════════════════════
   PROXY CHAIN  (3 independent proxies)
═══════════════════════════════════════════════ */
const PROXIES = [
  {
    name:"AllOrigins",
    fetch: async url => {
      const r = await ftch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, 9000);
      const d = await r.json();
      if (!d.contents) throw new Error("empty");
      return parseXML(d.contents);
    }
  },
  {
    name:"RSS2JSON",
    fetch: async url => {
      const r = await ftch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=15`, 9000);
      const d = await r.json();
      if (d.status !== "ok" || !d.items?.length) throw new Error("bad");
      return d.items.map(i => ({
        title:i.title||"", link:i.link||"",
        description:i.description||i.content||"",
        pubDate:i.pubDate||"", author:i.author||"", guid:i.guid||i.link||""
      }));
    }
  },
  {
    name:"CORSProxy",
    fetch: async url => {
      const r = await ftch(`https://corsproxy.io/?${encodeURIComponent(url)}`, 9000);
      return parseXML(await r.text());
    }
  },
];

async function ftch(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try { const r = await fetch(url,{signal:ctrl.signal}); clearTimeout(t); return r; }
  catch(e) { clearTimeout(t); throw e; }
}

function parseXML(xml) {
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  const items = Array.from(doc.querySelectorAll("item"));
  if (!items.length) throw new Error("no items");
  return items.slice(0,15).map(item => {
    function gT(tag) {
      let el; try{el=item.querySelector(tag)}catch{}
      if (!el) el = item.getElementsByTagName(tag)[0];
      if (!el && tag.includes(":")) el = item.getElementsByTagName(tag.split(":")[1])[0];
      return el ? el.textContent.trim() : "";
    }
    let link = gT("link");
    if (!link) { const l=item.getElementsByTagName("link")[0]; if(l) link=l.getAttribute("href")||l.textContent.trim(); }
    return { title:gT("title"), link, description:gT("description")||gT("summary")||gT("encoded")||gT("content"),
             pubDate:gT("pubDate")||gT("published")||gT("updated")||gT("date"),
             author:gT("author")||gT("creator")||gT("managingEditor"), guid:gT("guid")||link };
  }).filter(i => i.title && i.link);
}

/* ═══════════════════════════════════════════════
   FEED LOADER
═══════════════════════════════════════════════ */
async function loadOne(feed) {
  for (const px of PROXIES) {
    try {
      const items = await px.fetch(feed.url);
      if (items.length) {
        items.forEach(i => { i._src=feed.name; i._lang=feed.lang||"en"; });
        return { items:items.slice(0,8), source:feed.name };
      }
    } catch(e) { console.warn(`[${px.name}] ${feed.name}:`, e.message); }
  }
  return null;
}

async function loadFeed(catId) {
  const cat = CATS.find(c => c.id === catId);

  if (cat.mixed) {
    const settled = await Promise.allSettled(cat.feeds.map(f => loadOne(f)));
    let all=[]; const srcs=new Set();
    for (const r of settled) {
      if (r.status==="fulfilled" && r.value) {
        all.push(...r.value.items);
        srcs.add(r.value.source);
      }
    }
    if (!all.length) throw new Error("all failed");
    all.sort((a,b) => new Date(b.pubDate||0)-new Date(a.pubDate||0));
    const seen=new Set();
    all = all.filter(i => { const k=(i.title||"").slice(0,40).toLowerCase().replace(/\s+/g,""); if(seen.has(k))return false; seen.add(k); return true; });
    return { items:all.slice(0,14), source:[...srcs].join(" · "), proxy:"mixed" };
  }

  for (const feed of cat.feeds) {
    for (const px of PROXIES) {
      try {
        const items = await px.fetch(feed.url);
        if (items.length) {
          items.forEach(i=>{ i._src=feed.name; i._lang=feed.lang||"en"; });
          return { items:items.slice(0,12), source:feed.name, proxy:px.name };
        }
      } catch(e) { console.warn(`[${px.name}] ${feed.name}:`, e.message); }
    }
  }
  throw new Error("all failed");
}

/* ═══════════════════════════════════════════════
   STATE & INIT
═══════════════════════════════════════════════ */
let activeId="world", cache={}, summaries={}, busy=new Set(), keyOpen=false;

document.addEventListener("DOMContentLoaded", () => {
  buildTabs(); loadKeyFromStore(); tick(); setInterval(tick,1000); selectCat("world");
});

function tick() {
  const d=new Date();
  document.getElementById("datestamp").textContent =
    d.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"long",year:"numeric"}) +
    "  ·  " + d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:true});
}

/* ═══════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════ */
function buildTabs() {
  document.getElementById("tabs").innerHTML = CATS.map(c =>
    `<button class="tab${c.id===activeId?" active":""}" id="tab-${c.id}"
             data-r="${c.region}" onclick="selectCat('${c.id}')">
       ${c.icon} ${c.label}
     </button>`).join("");
}
function hlTab(id) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+id)?.classList.add("active");
}

/* ═══════════════════════════════════════════════
   CATEGORY SELECT / REFRESH
═══════════════════════════════════════════════ */
function selectCat(id) {
  activeId = id;
  const cat = CATS.find(c=>c.id===id);
  document.getElementById("sec-name").textContent = cat.icon+" "+cat.label;
  hlTab(id);
  cache[id] ? render(cache[id]) : fetchAndRender(id);
}
function refreshCat() { delete cache[activeId]; fetchAndRender(activeId); }

async function fetchAndRender(catId) {
  showSkeleton();
  document.getElementById("sec-src").textContent = "Loading feeds…";
  document.getElementById("sec-cnt").textContent = "";
  try {
    const result = await loadFeed(catId);
    cache[catId] = result;
    if (catId===activeId) render(result);
  } catch { if (catId===activeId) showError(); }
}

/* ═══════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function render({ items, source, proxy }) {
  document.getElementById("sec-src").textContent  = "via "+source+(proxy&&proxy!=="mixed"?" ["+proxy+"]":"");
  document.getElementById("sec-cnt").textContent  = items.length+" stories";
  if (!items.length) { showError(); return; }

  const cat = CATS.find(c=>c.id===activeId);
  const [hero,...rest] = items;
  const sidebar = rest.slice(0,3);
  const lowers  = rest.slice(3);
  document.getElementById("content").innerHTML = pageHTML(hero, sidebar, lowers, cat);
}

/* ─ Helpers ─ */
function lbadge(item) {
  const te = isTe(item.title)||item._lang==="te";
  return te ? `<span class="lang-badge lb-te">తె Telugu</span>`
             : `<span class="lang-badge lb-en">EN</span>`;
}
function srcName(item) { return item._src ? esc(item._src) : ""; }

/* ─ Page HTML ─ */
function pageHTML(hero, sidebar, lowers, cat) {
  const reg = cat.region;
  const hid = enc(hero.guid||hero.link), hsum=summaries[hid], hbz=busy.has(hid);
  const hPanel = hsum ? aiPanel(hsum,reg) : "";
  const hLbl   = hbz ? `<span class="spin">◌</span> Analysing…` : hsum ? `↻ Re-Analyse` : `⚡ AI Brief`;

  const heroH = `
    <div class="hero">
      <div class="hero-cat ${cat.cc}">${lbadge(hero)} ${srcName(hero)} · ${fmtDate(hero.pubDate)}</div>
      <div class="hero-headline">${esc(hero.title)}</div>
      <div class="hero-desc">${esc(strip(hero.description)).slice(0,400)}${strip(hero.description).length>400?"…":""}</div>
      ${hPanel}
      <div class="hero-actions">
        <button class="btn btn-ai r-${reg}" id="btn-${hid}" ${hbz?"disabled":""} onclick="doAI('${hid}')">${hLbl}</button>
        <a class="btn btn-read" href="${esc(hero.link)}" target="_blank" rel="noopener">Read Full →</a>
      </div>
    </div>`;

  const sideH = sidebar.map(a => {
    const id=enc(a.guid||a.link), sum=summaries[id], bz=busy.has(id);
    const lbl = bz?`<span class="spin">◌</span>`:sum?"↻":"⚡";
    return `
      <div class="side-art">
        <div class="side-cat ${cat.cc}">${lbadge(a)} ${srcName(a)} · ${fmtDate(a.pubDate)}</div>
        <div class="side-headline">${esc(a.title)}</div>
        <div class="side-desc">${esc(strip(a.description))}</div>
        ${sum?aiPanel(sum,reg):""}
        <div class="side-actions">
          <button class="btn btn-ai r-${reg}" id="btn-${id}" ${bz?"disabled":""} onclick="doAI('${id}')">${lbl} AI</button>
          <a class="btn btn-read" href="${esc(a.link)}" target="_blank" rel="noopener">Read →</a>
        </div>
      </div>`;
  }).join("");

  const lowH = lowers.map((a,i) => {
    const id=enc(a.guid||a.link), sum=summaries[id], bz=busy.has(id);
    const lbl = bz?`<span class="spin">◌</span>`:sum?"↻":"⚡";
    return `
      <div class="grid-art" style="animation-delay:${i*.05}s">
        <div class="grid-cat ${cat.cc}">${lbadge(a)} ${srcName(a)} · ${fmtDate(a.pubDate)}</div>
        <div class="grid-headline">${esc(a.title)}</div>
        <div class="grid-desc">${esc(strip(a.description))}</div>
        ${sum?aiPanel(sum,reg):""}
        <div class="grid-actions">
          <button class="btn btn-ai r-${reg}" id="btn-${id}" ${bz?"disabled":""} onclick="doAI('${id}')">${lbl} AI</button>
          <a class="btn btn-read" href="${esc(a.link)}" target="_blank" rel="noopener">Read →</a>
        </div>
      </div>`;
  }).join("");

  return `
    <div class="front-page">
      ${heroH}
      <div class="col-div"></div>
      <div class="sidebar">${sideH}</div>
    </div>
    ${lowH.trim()?`<div class="lower-grid">${lowH}</div>`:""}`;
}

function aiPanel(sum, reg) {
  return `
    <div class="ai-panel r-${reg}">
      <div class="ai-hdr"><span class="ai-tag">⚡ AI Brief</span><span class="groq-tag">llama-3.3-70b · Groq</span></div>
      <div class="ai-text">${esc(sum)}</div>
    </div>`;
}

/* ═══════════════════════════════════════════════
   GROQ AI BRIEF
═══════════════════════════════════════════════ */
async function doAI(eid) {
  const key = getKey();
  if (!key) { toast("⚠ Add your free Groq API key first"); toggleKey(true); return; }

  const cat = CATS.find(c=>c.id===activeId);
  const article = (cache[activeId]?.items||[]).find(a=>enc(a.guid||a.link)===eid);
  if (!article) return;

  busy.add(eid);
  const b=document.getElementById("btn-"+eid);
  if(b){b.disabled=true;b.innerHTML=`<span class="spin">◌</span> Analysing…`}

  const ctx  = {world:"international",india:"national Indian",ap:"Andhra Pradesh regional",tg:"Telangana regional",ai:"global AI & technology"}[cat.region]||"Indian";
  const teArt = isTe(article.title)||article._lang==="te";
  const lang  = teArt ? " The article is in Telugu — read it carefully and write your entire analysis in clear English." : "";
  const body  = strip(article.description||"").slice(0,900);

  const prompt = `You are a sharp ${ctx} news analyst writing for an educated reader.${lang}

Write exactly 3 sentences — no labels, no bullet points:
1. What happened (the core fact)
2. Why it matters
3. What to watch next

TITLE: ${article.title}
CONTENT: ${body}`;

  try {
    const r = await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"user",content:prompt}],max_tokens:280,temperature:.65})
    });
    if (r.status===401) throw new Error("Invalid Groq key");
    if (!r.ok) throw new Error("Groq error "+r.status);
    const d = await r.json();
    summaries[eid] = d.choices?.[0]?.message?.content?.trim()||"Summary unavailable.";
    toast("✓ AI brief ready");
  } catch(e) {
    summaries[eid]=null; toast("✗ "+e.message);
    if(e.message.includes("Invalid")) updateKeyStatus(false);
  } finally {
    busy.delete(eid);
    if(cache[activeId]) render(cache[activeId]);
  }
}

/* ═══════════════════════════════════════════════
   KEY MANAGEMENT
═══════════════════════════════════════════════ */
const SKEY="brief_groq_key";
function loadKeyFromStore() {
  const k=localStorage.getItem(SKEY)||"";
  if(k){document.getElementById("groq-key-input").value=k;updateKeyStatus(true);}
  else updateKeyStatus(false);
}
function getKey(){return localStorage.getItem(SKEY)||"";}
function saveKey(){
  const v=document.getElementById("groq-key-input").value.trim();
  if(!v){toast("Enter a Groq API key");return;}
  localStorage.setItem(SKEY,v); updateKeyStatus(true); toggleKey(false); toast("✓ Key saved");
}
function clearKey(){
  localStorage.removeItem(SKEY);
  document.getElementById("groq-key-input").value=""; updateKeyStatus(false); toast("Key cleared");
}
function updateKeyStatus(has){
  const el=document.getElementById("key-status");
  el.className=has?"has-key":"no-key"; el.textContent=has?"✓ Key Active":"No API Key";
}
function toggleKey(force){
  keyOpen=force!==undefined?force:!keyOpen;
  document.getElementById("key-drawer").classList.toggle("open",keyOpen);
  if(keyOpen) document.getElementById("groq-key-input").focus();
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
let toastT;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),3200);
}

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function isTe(s){return /[\u0C00-\u0C7F]/.test(s||"")}
function strip(h){return(h||"").replace(/<[^>]*>/g,"").replace(/&nbsp;/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&#\d+;/g,"").trim()}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function enc(s){
  if(!s) return"x"+Math.random().toString(36).slice(2,10);
  let h=5381;
  for(let i=0;i<s.length;i++) h=Math.imul(31,h)+s.charCodeAt(i)|0;
  return "id"+Math.abs(h).toString(36).padStart(8,"0");
}
function fmtDate(s){
  try{return new Date(s).toLocaleDateString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",hour12:true})}catch{return""}
}

/* keyboard */
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&document.activeElement.id==="groq-key-input") saveKey();
  if(e.key==="Escape"&&keyOpen) toggleKey(false);
});
</script>
