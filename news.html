<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>The Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  :root {
    --paper:      #f6f0df;
    --paper2:     #ede5cc;
    --ink:        #1a1410;
    --ink2:       #3d3428;
    --ink3:       #7a6e5c;
    --rule:       #1a1410;
    --rule-lt:    #c8b99a;
    --red:        #b5200f;
    --saffron:    #d4691a;
    --ap-gold:    #8a6c00;
    --tg-blue:    #1a4a8a;
    --ai-bg:      #fffbf0;
    --ai-border:  #c8a85a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: #d8ccb0;
    color: var(--ink);
    font-family: 'Lora', serif;
    min-height: 100vh;
  }

  /* в”Ђв”Ђ OUTER WRAPPER в”Ђв”Ђ */
  #paper {
    max-width: 1380px;
    margin: 0 auto;
    background: var(--paper);
    box-shadow: 0 4px 40px rgba(0,0,0,0.25);
    min-height: 100vh;
  }

  /* в”Ђв”Ђ MASTHEAD в”Ђв”Ђ */
  #masthead {
    background: var(--paper);
    border-bottom: 3px solid var(--rule);
    padding: 0 36px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(26,20,16,0.12);
  }

  .mast-top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--rule-lt);
    font-family: 'Fira Code', monospace;
    font-size: 0.6rem;
    color: var(--ink3);
    letter-spacing: 0.08em;
    flex-wrap: wrap;
    gap: 8px;
  }

  .top-left { display:flex; gap:16px; align-items:center; }
  .edition-tag {
    background: var(--ink);
    color: var(--paper);
    padding: 2px 8px;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .top-right { display:flex; align-items:center; gap:8px; }

  #key-status {
    font-family:'Fira Code',monospace;
    font-size:0.56rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:3px 9px;
    border:1px solid;
  }
  #key-status.no-key  { color:var(--red);    border-color:var(--red);    background:rgba(181,32,15,0.07); }
  #key-status.has-key { color:#1a6e2a;       border-color:#1a6e2a;       background:rgba(26,110,42,0.07); }

  #key-toggle {
    font-family:'Fira Code',monospace;
    font-size:0.56rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:3px 10px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    cursor:pointer;
    transition:opacity 0.15s;
  }
  #key-toggle:hover { opacity:0.8; }

  /* Key drawer */
  #key-drawer {
    overflow:hidden;
    max-height:0;
    transition:max-height 0.3s ease;
    background:var(--paper2);
    border-bottom:1px solid var(--rule-lt);
  }
  #key-drawer.open { max-height:70px; }
  .key-row {
    padding:10px 0;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .key-label {
    font-family:'Fira Code',monospace;
    font-size:0.6rem;
    color:var(--ink2);
    white-space:nowrap;
  }
  #groq-key-input {
    flex:1; max-width:420px;
    background:var(--paper);
    border:1px solid var(--ink3);
    color:var(--ink);
    font-family:'Fira Code',monospace;
    font-size:0.68rem;
    padding:6px 10px;
    outline:none;
  }
  #groq-key-input:focus { border-color:var(--ink); }
  #groq-key-input::placeholder { color:var(--ink3); }
  .btn-save { padding:6px 14px; background:var(--ink); color:var(--paper); border:none; font-family:'Fira Code',monospace; font-size:0.6rem; cursor:pointer; }
  .btn-save:hover { background:var(--ink2); }
  .btn-clr  { padding:6px 10px; background:transparent; color:var(--red); border:1px solid var(--red); font-family:'Fira Code',monospace; font-size:0.6rem; cursor:pointer; }

  /* Nameplate */
  .nameplate {
    text-align:center;
    padding:14px 0 6px;
    position:relative;
  }
  .paper-name {
    font-family:'Playfair Display',serif;
    font-size:3.8rem;
    font-weight:900;
    letter-spacing:12px;
    color:var(--ink);
    line-height:1;
    text-transform:uppercase;
  }
  .paper-name .dot { color:var(--red); letter-spacing:0; }
  .paper-tagline {
    font-family:'Fira Code',monospace;
    font-size:0.55rem;
    letter-spacing:0.3em;
    color:var(--ink3);
    text-transform:uppercase;
    margin-top:4px;
  }

  .rule-double {
    border-top:4px double var(--rule);
    margin:6px 0 0;
  }

  /* Category tabs */
  .tabs-row {
    display:flex;
    overflow-x:auto;
    scrollbar-width:none;
    border-bottom:2px solid var(--rule);
    align-items:stretch;
  }
  .tabs-row::-webkit-scrollbar { display:none; }

  .tab {
    padding:7px 18px;
    font-family:'Fira Code',monospace;
    font-size:0.6rem;
    letter-spacing:0.09em;
    text-transform:uppercase;
    color:var(--ink3);
    background:none;
    border:none;
    cursor:pointer;
    border-bottom:3px solid transparent;
    white-space:nowrap;
    transition:color 0.15s,border-color 0.15s;
    position:relative;
    bottom:-2px;
  }
  .tab:hover { color:var(--ink2); }
  .tab.active           { color:var(--ink);      border-bottom-color:var(--ink);      font-weight:500; }
  .tab.active[data-r=ap]{ color:var(--ap-gold);  border-bottom-color:var(--ap-gold);  }
  .tab.active[data-r=tg]{ color:var(--tg-blue);  border-bottom-color:var(--tg-blue);  }

  /* в”Ђв”Ђ CONTENT в”Ђв”Ђ */
  #content-area { padding:28px 36px 48px; }

  /* Section label */
  .section-label {
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:20px;
  }
  .section-name {
    font-family:'Playfair Display',serif;
    font-size:1.05rem;
    font-weight:700;
    font-style:italic;
    color:var(--ink2);
    letter-spacing:0.02em;
    white-space:nowrap;
  }
  .section-rule { flex:1; height:1px; background:var(--rule); }
  .section-source {
    font-family:'Fira Code',monospace;
    font-size:0.52rem;
    color:var(--ink3);
    letter-spacing:0.08em;
    white-space:nowrap;
  }
  .btn-ref {
    font-family:'Fira Code',monospace;
    font-size:0.52rem;
    padding:3px 8px;
    background:none;
    border:1px solid var(--ink3);
    color:var(--ink3);
    cursor:pointer;
    transition:all 0.15s;
  }
  .btn-ref:hover { background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* в”Ђв”Ђ NEWSPAPER LAYOUT в”Ђв”Ђ */
  .front-page {
    display:grid;
    grid-template-columns: 3fr 1px 2fr;
    gap:0;
    border:1px solid var(--rule);
    margin-bottom:0;
  }

  .col-divider {
    background:var(--rule);
    width:1px;
    margin:16px 0;
  }

  /* Hero article */
  .hero {
    padding:22px 24px;
  }
  .hero-cat {
    font-family:'Fira Code',monospace;
    font-size:0.58rem;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--red);
    margin-bottom:8px;
  }
  .hero-headline {
    font-family:'Playfair Display',serif;
    font-size:2rem;
    font-weight:900;
    line-height:1.22;
    color:var(--ink);
    margin-bottom:12px;
    border-bottom:2px solid var(--rule);
    padding-bottom:12px;
  }
  .hero-desc {
    font-size:0.88rem;
    line-height:1.75;
    color:var(--ink2);
    margin-bottom:16px;
    font-family:'Lora',serif;
  }
  .hero-actions { display:flex; gap:8px; flex-wrap:wrap; }

  /* Sidebar stack */
  .sidebar {
    display:flex;
    flex-direction:column;
  }
  .side-article {
    padding:16px 20px;
    border-bottom:1px solid var(--rule-lt);
    flex:1;
    display:flex;
    flex-direction:column;
    gap:7px;
  }
  .side-article:last-child { border-bottom:none; }
  .side-cat {
    font-family:'Fira Code',monospace;
    font-size:0.55rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ink3);
  }
  .side-headline {
    font-family:'Playfair Display',serif;
    font-size:0.98rem;
    font-weight:700;
    line-height:1.3;
    color:var(--ink);
  }
  .side-desc {
    font-size:0.74rem;
    line-height:1.6;
    color:var(--ink3);
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .side-date {
    font-family:'Fira Code',monospace;
    font-size:0.52rem;
    color:var(--ink3);
    margin-top:auto;
  }
  .side-actions { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }

  /* в”Ђв”Ђ LOWER GRID в”Ђв”Ђ */
  .lower-grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    border:1px solid var(--rule);
    border-top:none;
    margin-bottom:0;
  }
  .grid-article {
    padding:16px 18px;
    border-right:1px solid var(--rule-lt);
    border-bottom:1px solid var(--rule-lt);
    display:flex;
    flex-direction:column;
    gap:7px;
    animation: fadeUp 0.35s ease backwards;
  }
  .grid-article:nth-child(4n) { border-right:none; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .grid-cat {
    font-family:'Fira Code',monospace;
    font-size:0.53rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
  }
  .cat-india  { color:var(--saffron); }
  .cat-ap     { color:var(--ap-gold); }
  .cat-tg     { color:var(--tg-blue); }
  .cat-world  { color:#5a3a8a; }
  .cat-biz    { color:#1a6e2a; }
  .cat-sport  { color:var(--red); }
  .cat-tech   { color:#1a4a8a; }
  .cat-health { color:#5a1a6e; }

  /* Telugu language badge */
  .telugu-badge {
    display:inline-block;
    font-size:0.7rem;
    font-weight:600;
    color:#7a5c00;
    background:#fff8dd;
    border:1px solid #c8a030;
    padding:1px 8px;
    margin-bottom:6px;
    letter-spacing:0.04em;
  }
  .telugu-note {
    font-family:'Fira Code',monospace;
    font-size:0.5rem;
    color:var(--ink3);
    letter-spacing:0.06em;
    font-style:italic;
  }

  .grid-headline {
    font-family:'Playfair Display',serif;
    font-size:0.95rem;
    font-weight:700;
    line-height:1.32;
    color:var(--ink);
  }
  .grid-desc {
    font-size:0.73rem;
    line-height:1.58;
    color:var(--ink3);
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .grid-date {
    font-family:'Fira Code',monospace;
    font-size:0.5rem;
    color:var(--ink3);
    margin-top:auto;
  }
  .grid-actions { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }

  /* в”Ђв”Ђ BUTTONS в”Ђв”Ђ */
  .btn {
    padding:5px 12px;
    font-family:'Fira Code',monospace;
    font-size:0.56rem;
    letter-spacing:0.07em;
    text-transform:uppercase;
    border:none;
    cursor:pointer;
    transition:all 0.15s;
    display:inline-flex;
    align-items:center;
    gap:4px;
    text-decoration:none;
  }
  .btn-ai     { background:var(--ink); color:var(--paper); }
  .btn-ai:hover:not(:disabled) { background:var(--ink2); }
  .btn-ai:disabled { background:var(--ink3); cursor:not-allowed; }

  /* Regional AI button tints */
  .btn-ai.r-ap { background:var(--ap-gold); color:#fff; }
  .btn-ai.r-ap:hover:not(:disabled) { background:#a87f00; }
  .btn-ai.r-tg { background:var(--tg-blue); color:#fff; }
  .btn-ai.r-tg:hover:not(:disabled) { background:#1a3a7a; }

  .btn-read {
    background:transparent;
    color:var(--ink3);
    border:1px solid var(--rule-lt);
  }
  .btn-read:hover { background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* в”Ђв”Ђ AI PANEL в”Ђв”Ђ */
  .ai-panel {
    background:var(--ai-bg);
    border:1px solid var(--ai-border);
    border-left:3px solid var(--ink);
    padding:12px 14px;
    margin-top:4px;
    animation:fadeSlide 0.3s ease;
  }
  .ai-panel.r-ap { border-left-color:var(--ap-gold); }
  .ai-panel.r-tg { border-left-color:var(--tg-blue); }
  @keyframes fadeSlide {
    from { opacity:0; transform:translateY(-4px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .ai-hdr {
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
    font-family:'Fira Code',monospace;
    font-size:0.52rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
  }
  .ai-tag { color:var(--ink2); }
  .groq-tag { color:var(--ink3); margin-left:auto; }
  .ai-text {
    font-family:'Lora',serif;
    font-size:0.78rem;
    font-style:italic;
    line-height:1.72;
    color:var(--ink2);
  }

  /* в”Ђв”Ђ LOADING / ERROR в”Ђв”Ђ */
  .skeleton-wrap {
    border:1px solid var(--rule);
    padding:28px;
    display:grid;
    grid-template-columns:3fr 2fr;
    gap:24px;
  }
  .skel {
    background:linear-gradient(90deg, var(--paper2) 25%, #e8ddc0 50%, var(--paper2) 75%);
    background-size:200% 100%;
    animation:shimmer 1.6s infinite;
    border-radius:1px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .err-box {
    border:1px solid var(--rule);
    padding:60px;
    text-align:center;
  }
  .err-icon { font-size:2.5rem; display:block; margin-bottom:14px; }
  .err-title {
    font-family:'Playfair Display',serif;
    font-size:1.2rem;
    font-weight:700;
    color:var(--ink);
    margin-bottom:8px;
  }
  .err-msg {
    font-family:'Fira Code',monospace;
    font-size:0.65rem;
    color:var(--ink3);
    line-height:1.8;
  }

  /* в”Ђв”Ђ SPINNER в”Ђв”Ђ */
  .spin { display:inline-block; animation:rot 0.8s linear infinite; }
  @keyframes rot { to { transform:rotate(360deg); } }

  /* в”Ђв”Ђ TOAST в”Ђв”Ђ */
  #toast {
    position:fixed; bottom:24px; right:24px;
    background:var(--ink); color:var(--paper);
    font-family:'Fira Code',monospace; font-size:0.62rem;
    letter-spacing:0.04em; padding:10px 16px;
    z-index:9999; opacity:0; transform:translateY(8px);
    transition:all 0.25s; pointer-events:none;
    border-left:3px solid var(--red);
  }
  #toast.show { opacity:1; transform:translateY(0); }

  /* в”Ђв”Ђ SCROLLBAR в”Ђв”Ђ */
  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-track { background:var(--paper2); }
  ::-webkit-scrollbar-thumb { background:var(--rule-lt); border-radius:2px; }

  /* в”Ђв”Ђ RESPONSIVE в”Ђв”Ђ */
  @media(max-width:900px){
    .front-page { grid-template-columns:1fr; }
    .col-divider { display:none; }
    .lower-grid { grid-template-columns:repeat(2,1fr); }
    #content-area { padding:16px; }
    #masthead { padding:0 16px; }
    .paper-name { font-size:2.4rem; letter-spacing:6px; }
  }
  @media(max-width:560px){
    .lower-grid { grid-template-columns:1fr; }
    .paper-name { font-size:1.8rem; letter-spacing:4px; }
  }
  </style>

</head>
<body>
<div id="paper">

<!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ MASTHEAD в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->

<header id="masthead">

  <!-- Top bar -->

  <div class="mast-top-bar">
    <div class="top-left">
      <span class="edition-tag">Hyderabad Edition</span>
      <span id="datestamp"></span>
    </div>
    <div class="top-right">
      <div id="key-status" class="no-key">No API Key</div>
      <button id="key-toggle" onclick="toggleKey()">вљ™ Groq Key</button>
    </div>
  </div>

  <!-- Key drawer -->

  <div id="key-drawer">
    <div class="key-row">
      <span class="key-label">Groq API Key (free at console.groq.com):</span>
      <input type="password" id="groq-key-input"
             placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx"
             autocomplete="off" spellcheck="false"/>
      <button class="btn-save" onclick="saveKey()">Save</button>
      <button class="btn-clr"  onclick="clearKey()">Clear</button>
    </div>
  </div>

  <!-- Nameplate -->

  <div class="nameplate">
    <div class="paper-name">THE BRIEF<span class="dot">.</span></div>
    <div class="paper-tagline">Your Personal AI-Powered Indian Newspaper</div>
  </div>
  <div class="rule-double"></div>

  <!-- Category tabs -->

  <div class="tabs-row" id="tabs"></div>
</header>

<!-- в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ CONTENT в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ -->

<main id="content-area">

  <div class="section-label">
    <span class="section-name" id="sec-name">India</span>
    <div class="section-rule"></div>
    <span class="section-source" id="sec-src"></span>
    <span id="sec-count" class="section-source"></span>
    <button class="btn-ref" onclick="refreshCat()">в†» Refresh</button>
  </div>

  <div id="content"></div>

</main>

</div><!-- #paper -->
<div id="toast"></div>

/* в”Ђв”Ђ PROXY STRATEGIES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
// Three independent proxies вЂ” tries all combinations until articles found
const PROXIES = [
  {
    name: "AllOrigins",
    fetch: async (feedUrl) => {
      const url = `https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`;
      const r   = await fetchTimeout(url, 9000);
      const d   = await r.json();
      if (!d.contents) throw new Error("empty");
      return parseRSS(d.contents);
    }
  },
  {
    name: "RSS2JSON",
    fetch: async (feedUrl) => {
      const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&count=15`;
      const r   = await fetchTimeout(url, 9000);
      const d   = await r.json();
      if (d.status !== "ok" || !d.items?.length) throw new Error("bad");
      return d.items.map(i => ({
        title:       i.title       || "",
        link:        i.link        || "",
        description: i.description || i.content || "",
        pubDate:     i.pubDate     || "",
        author:      i.author      || "",
        guid:        i.guid        || i.link    || "",
      }));
    }
  },
  {
    name: "CORSProxy",
    fetch: async (feedUrl) => {
      const url = `https://corsproxy.io/?${encodeURIComponent(feedUrl)}`;
      const r   = await fetchTimeout(url, 9000);
      const txt = await r.text();
      return parseRSS(txt);
    }
  },
];

async function fetchTimeout(url, ms) {
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    return r;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

/* в”Ђв”Ђ XML PARSER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
function parseRSS(xml) {
  const doc   = new DOMParser().parseFromString(xml, "text/xml");
  const items = Array.from(doc.querySelectorAll("item"));
  if (!items.length) throw new Error("no items");

  return items.slice(0, 15).map(item => {
    function gT(tagName) {
      // Try querySelector first, fallback to getElementsByTagName
      let el;
      try { el = item.querySelector(tagName); } catch {}
      if (!el) el = item.getElementsByTagName(tagName)[0];
      if (!el && tagName.includes(":")) {
        el = item.getElementsByTagName(tagName.split(":")[1])[0];
      }
      return el ? el.textContent.trim() : "";
    }

    // Link is special вЂ” can be text content or href attribute
    let link = gT("link");
    if (!link) {
      const linkEl = item.getElementsByTagName("link")[0];
      if (linkEl) link = linkEl.getAttribute("href") || linkEl.textContent.trim() || "";
    }

    return {
      title:       gT("title"),
      link,
      description: gT("description") || gT("summary") || gT("encoded") || gT("content"),
      pubDate:     gT("pubDate")     || gT("published") || gT("updated") || gT("date"),
      author:      gT("author")      || gT("creator")   || gT("managingEditor"),
      guid:        gT("guid")        || link,
    };
  }).filter(i => i.title && i.link);
}

/* в”Ђв”Ђ LOAD FEED (try all proxies Г— all feeds) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
async function loadFeed(catId) {
  const cat = CATS.find(c => c.id === catId);

  for (const feed of cat.feeds) {
    for (const proxy of PROXIES) {
      try {
        const items = await proxy.fetch(feed.url);
        if (items.length > 0) {
          return { items: items.slice(0, 12), source: feed.name, proxy: proxy.name };
        }
      } catch(e) {
        console.warn(`[${proxy.name}] ${feed.name}: ${e.message}`);
      }
    }
  }
  throw new Error("All feeds failed");
}

/* в”Ђв”Ђ GROQ AI в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
async function handleAI(encodedId) {
  const key = getKey();
  if (!key) { toast("вљ  Add your free Groq API key first"); toggleKey(true); return; }

  const cat      = CATS.find(c => c.id === activeId);
  const articles = cache[activeId]?.items || [];
  const article  = articles.find(a => enc(a.guid || a.link) === encodedId);
  if (!article) return;

  busy.add(encodedId);
  setBtn(encodedId, true);

  const ctx = { india:"national Indian", ap:"Andhra Pradesh regional", tg:"Telangana regional", world:"international" }[cat.region] || "Indian";
  const isTelugu = !!cat.telugu;
  const langNote = isTelugu ? " The article may be in Telugu. Read it and summarise clearly in English." : "";
  const body = strip(article.description || "").slice(0, 900);

  const prompt = `You are a seasoned ${ctx} news analyst writing for an educated Indian reader.${langNote}

Analyse this article and write exactly 3 crisp sentences вЂ” no labels, no bullet points:
1. What happened (the core fact)
2. Why it matters to Indian/regional readers
3. What to watch next

TITLE: ${article.title}
CONTENT: ${body}`;

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":`Bearer ${key}` },
      body: JSON.stringify({
        model:"llama-3.3-70b-versatile",
        messages:[{ role:"user", content:prompt }],
        max_tokens:280, temperature:0.65,
      }),
    });
    if (res.status===401) throw new Error("Invalid Groq key");
    if (!res.ok) throw new Error("Groq error "+res.status);

    const d    = await res.json();
    const text = d.choices?.[0]?.message?.content?.trim() || "Summary unavailable.";
    summaries[encodedId] = text;
    toast("вњ“ AI brief ready");
  } catch(e) {
    summaries[encodedId] = null;
    toast("вњ— " + e.message);
    if (e.message.includes("Invalid")) updateKeyStatus(false);
  } finally {
    busy.delete(encodedId);
    if (cache[activeId]) render(cache[activeId]);
  }
}

  b.disabled    = loading;
  b.innerHTML   = loading ? `<span class="spin">в—Њ</span> AnalysingвЂ¦` : `вљЎ AI Brief`;
}

const SKEY = "brief_groq_key";
function loadKeyFromStorage() {
  const k = localStorage.getItem(SKEY)||"";
  if (k) { document.getElementById("groq-key-input").value=k; updateKeyStatus(true); }
  else     updateKeyStatus(false);
}
function getKey() { return localStorage.getItem(SKEY)||""; }
function saveKey() {
  const v = document.getElementById("groq-key-input").value.trim();
  if (!v) { toast("Enter a Groq API key"); return; }
  localStorage.setItem(SKEY,v);
  updateKeyStatus(true);
  toggleKey(false);
  toast("вњ“ Key saved");
}
function clearKey() {
  localStorage.removeItem(SKEY);
  document.getElementById("groq-key-input").value="";
  updateKeyStatus(false);
  toast("Key cleared");
}
function updateKeyStatus(has) {
  const el=document.getElementById("key-status");
  el.className=has?"has-key":"no-key";
  el.textContent=has?"вњ“ Key Active":"No API Key";
}
function toggleKey(force) {
  keyOpen=force!==undefined?force:!keyOpen;
  document.getElementById("key-drawer").classList.toggle("open",keyOpen);
  if (keyOpen) document.getElementById("groq-key-input").focus();
}

/* в”Ђв”Ђ TOAST в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
let toastT;
function toast(msg) {
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove("show"),3200);
}

/* в”Ђв”Ђ UTILS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
function strip(h){ return (h||"").replace(/<[^>]*>/g,"").replace(/&nbsp;/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&#\d+;/g,"").trim(); }
function esc(s)  { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function enc(s) {
  // djb2 hash вЂ” unique per URL, no collision from shared URL prefixes
  if (!s) return "x" + Math.random().toString(36).slice(2,10);
  let h = 5381;
  for (let i = 0; i < s.length; i++) {
    h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  }
  return "id" + Math.abs(h).toString(36).padStart(8, "0");
}
function fmtDate(s){ try{ return new Date(s).toLocaleDateString("en-IN",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",hour12:true}); }catch{return "";} }

/* в”Ђв”Ђ KEYBOARD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
document.addEventListener("keydown", e => {
  if (e.key==="Enter" && document.activeElement.id==="groq-key-input") saveKey();
  if (e.key==="Escape" && keyOpen) toggleKey(false);
});
</script>
