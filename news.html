<!DOCTYPE html>

<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>The Brief · Indian News</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
/* ══════════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════════ */
:root {
  /* Surfaces */
  --bg:       #f0ebe0;
  --bg2:      #e8e2d4;
  --surface:  #ffffff;
  --surface2: #faf8f4;

  /* Ink */
  --ink:      #111827;
  --ink2:     #374151;
  --ink3:     #6b7280;
  --muted:    #9ca3af;

  /* Borders */
  --border:   #e5e0d5;
  --border2:  #d1cdc4;

  /* Brand */
  --red:      #dc2626;
  --red2:     #ef4444;

  /* Category palette */
  --c-world:  #7c3aed; --c-world-bg:  #f5f3ff;
  --c-india:  #c2410c; --c-india-bg:  #fff7ed;
  --c-ap:     #065f46; --c-ap-bg:     #ecfdf5;
  --c-tg:     #1e40af; --c-tg-bg:     #eff6ff;
  --c-sport:  #991b1b; --c-sport-bg:  #fef2f2;
  --c-biz:    #14532d; --c-biz-bg:    #f0fdf4;
  --c-health: #581c87; --c-health-bg: #faf5ff;
  --c-ai:     #0c4a6e; --c-ai-bg:     #f0f9ff;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);

  --radius:   12px;
  --radius-sm:8px;

  --font-head:'Playfair Display', Georgia, serif;
  --font-ui:  'Inter', -apple-system, sans-serif;
  --font-mono:'JetBrains Mono', monospace;

  --hdr-h: 60px;
  --tab-h: 48px;
}

[data-theme="dark"] {
  --bg:#0d0d0d; --bg2:#161616; --surface:#1c1c1e; --surface2:#242424;
  --ink:#f2f0ec; --ink2:#d1cdc6; --ink3:#9ca3af; --muted:#6b7280;
  --border:#2a2a2a; --border2:#333;
  --c-world-bg:#1e1b4b; --c-india-bg:#431407; --c-ap-bg:#052e16;
  --c-tg-bg:#0c1a3a; --c-sport-bg:#3b0000; --c-biz-bg:#052e16;
  --c-health-bg:#2e1065; --c-ai-bg:#0c1e36;
}

/* ══════════════════════════════════════════════
   RESET
══════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font-ui);min-height:100vh;overflow-x:hidden;line-height:1.6}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:#dc2626;color:#fff}

/* ══════════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════════ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--ink3)}

/* ══════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════ */
#hdr {
  position:sticky;top:0;z-index:300;height:var(--hdr-h);
  background:var(--ink);
  display:flex;align-items:center;gap:12px;padding:0 16px;
  box-shadow:0 2px 20px rgba(0,0,0,.35);
}

.brand {
  font-family:var(--font-head);font-size:1.5rem;font-weight:900;
  color:#fff;letter-spacing:-1px;white-space:nowrap;flex-shrink:0;
}
.brand-dot{color:var(--red2)}
.brand-sub{
  font-family:var(--font-mono);font-size:.5rem;font-weight:400;
  color:#9ca3af;letter-spacing:.12em;text-transform:uppercase;
  display:block;margin-top:-4px;
}

/* Search */
.search-wrap {
  flex:1;display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:24px;padding:8px 14px;
  transition:background .2s,border-color .2s;
}
.search-wrap:focus-within{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35)}
.search-wrap svg{width:15px;height:15px;stroke:#9ca3af;flex-shrink:0}
#search-input{
  flex:1;background:none;border:none;outline:none;
  font-size:.85rem;color:#fff;min-width:0;
}
#search-input::placeholder{color:#9ca3af}

/* Header buttons */
.hdr-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.hbtn{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  transition:background .15s;position:relative;flex-shrink:0;
}
.hbtn:hover{background:rgba(255,255,255,.2)}
.hbtn svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:2}
#bm-count{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);color:#fff;font-size:.52rem;
  width:16px;height:16px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:600;
  border:2px solid var(--ink);
}

/* Key status dot */
#key-dot{
  width:8px;height:8px;border-radius:50%;
  background:#6b7280;flex-shrink:0;
  border:2px solid rgba(255,255,255,.3);
  transition:background .3s;
}
#key-dot.active{background:#22c55e}

/* ══════════════════════════════════════════════
   KEY BANNER
══════════════════════════════════════════════ */
#key-banner{
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  border-bottom:1px solid #fcd34d;
  padding:8px 16px;display:flex;align-items:center;gap:8px;
  font-size:.78rem;color:#78350f;font-family:var(--font-ui);
}
[data-theme="dark"] #key-banner{background:linear-gradient(135deg,#2a1a00,#3a2500);border-color:#4a3000;color:#fbbf24}
#key-banner.hidden{display:none}
#key-banner a{font-weight:600;text-decoration:underline;cursor:pointer}
.banner-close{margin-left:auto;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;font-size:.7rem}

/* ══════════════════════════════════════════════
   TAB STRIP
══════════════════════════════════════════════ */
#tab-strip {
  position:sticky;top:var(--hdr-h);z-index:200;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  box-shadow:var(--shadow-sm);
}
#tab-strip::-webkit-scrollbar{display:none}

.tab {
  padding:0 18px;height:var(--tab-h);
  display:flex;align-items:center;gap:7px;
  font-size:.78rem;font-weight:500;color:var(--ink3);
  white-space:nowrap;flex-shrink:0;
  border-bottom:3px solid transparent;
  margin-bottom:-1px;transition:color .2s,border-color .2s;
  position:relative;
}
.tab:hover{color:var(--ink2)}
.tab.active{color:var(--ink);border-bottom-color:var(--red);font-weight:600}

/* Category-coloured active underlines */
.tab[data-r=world].active{border-bottom-color:var(--c-world)}
.tab[data-r=ap].active{border-bottom-color:var(--c-ap)}
.tab[data-r=tg].active{border-bottom-color:var(--c-tg)}
.tab[data-r=sport].active{border-bottom-color:var(--c-sport)}
.tab[data-r=biz].active{border-bottom-color:var(--c-biz)}
.tab[data-r=health].active{border-bottom-color:var(--c-health)}
.tab[data-r=ai].active{border-bottom-color:var(--c-ai)}

.tab-icon{font-size:.95rem}
.tab-loader{
  width:5px;height:5px;border-radius:50%;
  background:var(--muted);display:none;
  animation:pulse .8s ease infinite;
}
.tab.loading .tab-loader{display:block}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
.tab-n{
  font-size:.6rem;font-family:var(--font-mono);
  background:var(--bg2);color:var(--ink3);
  padding:1px 5px;border-radius:8px;
  display:none;
}
.tab-n.show{display:block}

/* ══════════════════════════════════════════════
   SECTION HEADER
══════════════════════════════════════════════ */
.sec-bar {
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
  position:sticky;top:calc(var(--hdr-h) + var(--tab-h));
  background:var(--bg);z-index:100;
}
.sec-label {
  display:flex;align-items:center;gap:8px;
}
.sec-stripe{
  width:4px;height:20px;border-radius:2px;
  background:var(--red);flex-shrink:0;
}
.sec-name{
  font-family:var(--font-head);font-size:1.05rem;
  font-weight:700;color:var(--ink);
}
.sec-count{
  font-family:var(--font-mono);font-size:.62rem;
  color:var(--muted);background:var(--bg2);
  padding:2px 8px;border-radius:10px;
}
.sec-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sec-src{
  font-family:var(--font-mono);font-size:.58rem;
  color:var(--muted);display:none;
}
@media(min-width:640px){.sec-src{display:block}}
.btn-ref{
  padding:5px 12px;border-radius:20px;
  font-size:.72rem;font-weight:500;
  background:var(--surface);border:1px solid var(--border2);
  color:var(--ink2);transition:all .15s;
  display:flex;align-items:center;gap:4px;
}
.btn-ref:hover{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ══════════════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════════════ */
#main {padding:0 0 40px}

/* ── HERO ── */
.hero-wrap{padding:14px 14px 0}
.hero-card {
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow-lg);overflow:hidden;
  border:1px solid var(--border);
  display:grid;grid-template-columns:1fr;
}
@media(min-width:768px){
  .hero-card{grid-template-columns:3fr 2fr}
}

.hero-accent-bar{height:4px;width:100%;background:var(--cat-color,var(--red))}
@media(min-width:768px){
  .hero-accent-bar{display:none}
  .hero-card{position:relative}
  .hero-card::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:5px;
    background:var(--cat-color,var(--red));
  }
}

.hero-body{padding:22px 24px;display:flex;flex-direction:column;gap:14px}
@media(min-width:768px){.hero-body{padding:26px 28px 26px 32px}}

.hero-top-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hero-headline{
  font-family:var(--font-head);font-size:1.5rem;font-weight:900;
  line-height:1.22;color:var(--ink);
}
@media(min-width:640px){.hero-headline{font-size:1.9rem}}
@media(min-width:900px){.hero-headline{font-size:2.2rem}}

.hero-desc{
  font-size:.9rem;line-height:1.78;color:var(--ink2);
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;
}
.hero-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:4px}

/* Hero sidebar (desktop) */
.hero-sidebar{
  border-left:1px solid var(--border);
  display:none;flex-direction:column;
}
@media(min-width:768px){.hero-sidebar{display:flex}}
.hs-item{
  padding:14px 18px;border-bottom:1px solid var(--border);
  flex:1;display:flex;flex-direction:column;gap:6px;
  transition:background .15s;
}
.hs-item:last-child{border-bottom:none}
.hs-item:hover{background:var(--surface2)}
.hs-meta{display:flex;align-items:center;gap:6px}
.hs-headline{
  font-family:var(--font-head);font-size:.88rem;font-weight:700;
  line-height:1.35;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.hs-actions{display:flex;gap:6px;margin-top:auto;padding-top:8px}

/* ── ARTICLE GRID ── */
.grid-wrap{padding:12px 14px}
.art-grid{
  display:grid;grid-template-columns:1fr;gap:10px;
}
@media(min-width:520px){.art-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.art-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1200px){.art-grid{grid-template-columns:repeat(4,1fr)}}

/* ── ARTICLE CARD ── */
.art-card {
  background:var(--surface);border-radius:var(--radius);
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
  display:flex;flex-direction:column;gap:0;overflow:hidden;
  animation:cardIn .3s ease backwards;
  transition:box-shadow .2s,transform .2s;
  position:relative;
}
.art-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Coloured top stripe per category */
.card-stripe{
  height:3px;width:100%;
  background:var(--cat-color,var(--red));
  flex-shrink:0;
}

.card-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-headline{
  font-family:var(--font-head);font-size:.98rem;font-weight:700;
  line-height:1.35;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card-desc{
  font-size:.76rem;line-height:1.65;color:var(--ink3);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  flex:1;
}
.card-footer{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding-top:10px;border-top:1px solid var(--border);margin-top:auto;
}

/* ══════════════════════════════════════════════
   BADGES & TAGS
══════════════════════════════════════════════ */
.lang-te,.lang-en{
  display:inline-flex;align-items:center;
  font-family:var(--font-mono);font-size:.56rem;font-weight:500;
  padding:2px 6px;border-radius:4px;border:1px solid;
  white-space:nowrap;flex-shrink:0;
}
.lang-te{color:#92400e;background:#fef3c7;border-color:#f59e0b}
.lang-en{color:#065f46;background:#d1fae5;border-color:#6ee7b7}
[data-theme="dark"] .lang-te{background:#2a1a00;color:#fbbf24;border-color:#92400e}
[data-theme="dark"] .lang-en{background:#052e16;color:#6ee7b7;border-color:#065f46}

.src-tag{
  font-family:var(--font-mono);font-size:.58rem;
  color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:110px;
}
.date-tag{
  font-family:var(--font-mono);font-size:.56rem;color:var(--muted);
  margin-left:auto;white-space:nowrap;flex-shrink:0;
}
.cat-pill {
  display:inline-flex;align-items:center;
  font-size:.62rem;font-weight:600;letter-spacing:.04em;
  padding:3px 8px;border-radius:20px;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}

/* ══════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════ */
.btn-ai {
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 13px;border-radius:20px;
  font-size:.72rem;font-weight:600;
  color:#fff;background:var(--ink);
  transition:all .2s;border:none;cursor:pointer;
  flex-shrink:0;
}
.btn-ai:hover:not(:disabled){filter:brightness(1.2);transform:translateY(-1px)}
.btn-ai:active:not(:disabled){transform:translateY(0)}
.btn-ai:disabled{opacity:.45;cursor:not-allowed;transform:none}

.btn-read{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 12px;border-radius:20px;
  font-size:.72rem;font-weight:500;
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--ink2);transition:all .15s;text-decoration:none;
  flex-shrink:0;
}
.btn-read:hover{background:var(--ink);color:#fff;border-color:var(--ink)}

.btn-bm{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg2);border:1px solid var(--border);
  font-size:.85rem;transition:all .15s;margin-left:auto;flex-shrink:0;
}
.btn-bm:hover{background:var(--bg);border-color:var(--red);color:var(--red)}
.btn-bm.saved{background:#fef3c7;border-color:#f59e0b}
[data-theme="dark"] .btn-bm.saved{background:#2a1a00;border-color:#d97706}

/* ══════════════════════════════════════════════
   AI PANEL
══════════════════════════════════════════════ */
.ai-panel {
  margin-top:8px;padding:12px 14px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--surface2),var(--bg2));
  border:1px solid var(--border2);
  border-left:4px solid var(--ink);
  animation:slideIn .25s ease;
}
.ai-panel[data-r=ap]{border-left-color:var(--c-ap)}
.ai-panel[data-r=tg]{border-left-color:var(--c-tg)}
.ai-panel[data-r=world]{border-left-color:var(--c-world)}
.ai-panel[data-r=ai]{border-left-color:var(--c-ai)}
@keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ai-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.ai-label{
  display:flex;align-items:center;gap:5px;
  font-size:.62rem;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink2);font-family:var(--font-ui);
}
.ai-label::before{content:"";display:inline-block;width:12px;height:2px;background:currentColor;border-radius:1px}
.ai-model{font-family:var(--font-mono);font-size:.52rem;color:var(--muted)}
.ai-body{
  font-family:'Playfair Display',serif;font-size:.82rem;
  font-style:italic;line-height:1.75;color:var(--ink2);
}

/* ══════════════════════════════════════════════
   SKELETON
══════════════════════════════════════════════ */
.skel-wrap{padding:14px}
.skel{
  background:linear-gradient(90deg,var(--bg2) 25%,var(--border) 50%,var(--bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-hero-card{height:240px;margin-bottom:14px;border-radius:var(--radius)}
.skel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:640px){.skel-grid{grid-template-columns:repeat(3,1fr)}}
.skel-card{height:180px;border-radius:var(--radius)}

/* ══════════════════════════════════════════════
   ERROR / EMPTY
══════════════════════════════════════════════ */
.state-box{
  padding:72px 24px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.state-icon{font-size:3rem;line-height:1}
.state-title{font-family:var(--font-head);font-size:1.15rem;font-weight:700}
.state-msg{font-size:.84rem;color:var(--ink3);line-height:1.7;max-width:320px}
.state-btn{
  padding:10px 24px;border-radius:24px;background:var(--ink);color:#fff;
  font-size:.84rem;font-weight:600;margin-top:4px;transition:opacity .15s;
}
.state-btn:hover{opacity:.85}

/* ══════════════════════════════════════════════
   BOOKMARKS PANEL
══════════════════════════════════════════════ */
#bm-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#bm-overlay.open{opacity:1;pointer-events:auto}
#bm-panel{
  position:fixed;top:0;right:0;bottom:0;
  width:min(380px,100vw);background:var(--surface);
  box-shadow:-8px 0 32px rgba(0,0,0,.2);
  display:flex;flex-direction:column;z-index:501;
  transform:translateX(100%);transition:transform .3s ease;
}
#bm-overlay.open #bm-panel{transform:translateX(0)}
.bm-head{
  padding:20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--ink);color:#fff;
}
.bm-head-title{font-family:var(--font-head);font-size:1.05rem;font-weight:700}
.bm-head-close{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;
  font-size:.85rem;color:#fff;
}
.bm-body{flex:1;overflow-y:auto;padding:12px}
.bm-item{
  padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--surface2);margin-bottom:8px;
  display:flex;flex-direction:column;gap:7px;
}

.bm-meta{display:flex;gap:8px;font-family:var(--font-mono);font-size:.6rem;color:var(--muted)}
.bm-btns{display:flex;gap:6px}
.bm-empty{padding:48px 24px;text-align:center;color:var(--muted);font-size:.85rem;line-height:1.7}

/* ══════════════════════════════════════════════
   KEY MODAL
══════════════════════════════════════════════ */
#key-modal{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#key-modal.open{opacity:1;pointer-events:auto}
@media(min-width:540px){#key-modal{align-items:center}}
.key-sheet{
  width:100%;max-width:460px;background:var(--surface);
  border-radius:20px 20px 0 0;padding:24px;
  display:flex;flex-direction:column;gap:14px;
  transform:translateY(30px);transition:transform .3s ease;
}
@media(min-width:540px){.key-sheet{border-radius:20px}}
#key-modal.open .key-sheet{transform:translateY(0)}
.ks-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto -6px}
.ks-title{font-family:var(--font-head);font-size:1.1rem;font-weight:700}
.ks-desc{font-size:.82rem;color:var(--ink3);line-height:1.65}
.ks-desc a{color:var(--red);font-weight:600}
.ks-input{
  width:100%;padding:12px 14px;border-radius:var(--radius-sm);
  background:var(--bg2);border:2px solid var(--border2);
  color:var(--ink);font-family:var(--font-mono);font-size:.82rem;
  outline:none;transition:border-color .2s;
}
.ks-input:focus{border-color:var(--red)}
.ks-input::placeholder{color:var(--muted)}
.ks-btns{display:flex;gap:8px}
.ks-save{
  flex:1;padding:12px;border-radius:24px;
  background:var(--ink);color:#fff;
  font-weight:600;font-size:.85rem;transition:opacity .15s;
}
.ks-save:hover{opacity:.85}
.ks-clear{
  padding:12px 16px;border-radius:24px;
  border:1px solid var(--red);color:var(--red);
  font-size:.82rem;transition:all .15s;display:none;
}
.ks-clear:hover{background:var(--red);color:#fff}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
#toast{
  position:fixed;bottom:28px;left:50%;z-index:800;
  background:var(--ink);color:#fff;
  font-size:.8rem;font-weight:500;
  padding:10px 20px;border-radius:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  transform:translateX(-50%) translateY(20px);
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════════════

/* ══════════════════════════════════════════════
   KEYWORD FILTER
   Checks title + description against category keywords
══════════════════════════════════════════════ */
function matchesCategory(item, cat) {
  if (!cat.keywords) return true;
  const hay = ((item.title||"")+" "+(item.description||"")).toLowerCase();
  return cat.keywords.some(kw => hay.includes(kw.toLowerCase()));
}

    n:"RSS2JSON",
    f: async u => {
      const r = await tF(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}&count=18`,9000);
      const d = await r.json();
      if(d.status!=="ok"||!d.items?.length) throw new Error("bad");
      return d.items.map(i=>({title:i.title||"",link:i.link||"",description:i.description||i.content||"",pubDate:i.pubDate||"",author:i.author||"",guid:i.guid||i.link||""}));
    }
  },
  {
    n:"CORSProxy",
    f: async u => {
      const r = await tF(`https://corsproxy.io/?${encodeURIComponent(u)}`,9000);
      return parseXML(await r.text());
    }
  }
];

async function tF(url,ms){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(t);return r;}
  catch(e){clearTimeout(t);throw e;}
}

function parseXML(xml){
  const doc=new DOMParser().parseFromString(xml,"text/xml");
  const items=Array.from(doc.querySelectorAll("item"));
  if(!items.length) throw new Error("no items");
  return items.slice(0,18).map(item=>{
    function g(tag){
      let el;try{el=item.querySelector(tag)}catch{}
      if(!el)el=item.getElementsByTagName(tag)[0];
      if(!el&&tag.includes(":"))el=item.getElementsByTagName(tag.split(":")[1])[0];
      return el?el.textContent.trim():"";
    }
    let lnk=g("link");
    if(!lnk){const l=item.getElementsByTagName("link")[0];if(l)lnk=l.getAttribute("href")||l.textContent.trim();}
    return{title:g("title"),link:lnk,description:g("description")||g("summary")||g("encoded")||g("content"),pubDate:g("pubDate")||g("published")||g("updated"),author:g("author")||g("creator"),guid:g("guid")||lnk};
  }).filter(i=>i.title&&i.link);
}

async function fetchOne(feed, cat) {
  for(const px of PX){
    try{
      const items = await px.f(feed.url);
      if(!items.length) continue;

      const tagged = items.map(i=>({...i,_src:feed.name,_lang:feed.lang||"en"}));

      // Apply keyword filter for non-trusted feeds
      const filtered = feed.trusted ? tagged : tagged.filter(i=>matchesCategory(i, cat));

      if(filtered.length > 0) {
        return {items:filtered.slice(0,9), source:feed.name};
      }
    }catch(e){console.warn(`[${px.n}] ${feed.name}:`,e.message);}
  }
  return null;
}

async function loadCat(catId){
  const cat = CATS.find(c=>c.id===catId);

  if(cat.mixed){
    const results = await Promise.allSettled(cat.feeds.map(f=>fetchOne(f, cat)));
    let all=[]; const srcs=new Set();
    for(const r of results){
      if(r.status==="fulfilled"&&r.value){
        all.push(...r.value.items); srcs.add(r.value.source);
      }
    }
    if(!all.length) throw new Error("all failed");

    // Sort by date
    all.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));

    // Deduplicate
    const seen=new Set();
    all=all.filter(i=>{
      const k=(i.title||"").slice(0,45).toLowerCase().replace(/[^a-z0-9\u0c00-\u0c7f]/g,"");
      if(seen.has(k))return false; seen.add(k); return true;
    });

    return{items:all.slice(0,18), source:[...srcs].join(" · "), proxy:"parallel"};
  }

  // Sequential for non-mixed
  for(const feed of cat.feeds){
    const r = await fetchOne(feed, cat);
    if(r) return{items:r.items.slice(0,16), source:r.source, proxy:"seq"};
  }
  throw new Error("all failed");
}

function buildTabs(){

      ${c.label}

      <span class="tab-n" id="tn-${c.id}"></span>

}

function hlTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  const t=document.getElementById("tab-"+id);
  if(t){t.classList.add("active");t.scrollIntoView({inline:"nearest",block:"nearest"});}
}
function setTabLoad(id,on){ document.getElementById("tab-"+id)?.classList.toggle("loading",on); }
function setTabN(id,n){
  const el=document.getElementById("tn-"+id);
  if(!el) return;
  el.textContent=n; el.classList.toggle("show",n>0);
}

══════════════════════════════════════════════ */
function selectCat(id){
  clearSearch();
  document.getElementById("search-input").value="";
  activeId=id;
  const cat=CATS.find(c=>c.id===id);

  // Sec bar
  document.getElementById("sec-name").textContent=cat.icon+" "+cat.label;
  document.getElementById("sec-stripe").style.background=cat.color;
  document.getElementById("sec-count").style.display="none";

  hlTab(id);
  cache[id] ? render(cache[id]) : fetchAndRender(id);
}

function refreshCat(){ delete cache[activeId]; fetchAndRender(activeId); }

async function fetchAndRender(catId){
  showSkeleton();
  setTabLoad(catId,true);
  document.getElementById("sec-src").textContent="Loading feeds…";
  try{
    const res = await loadCat(catId);
    cache[catId]=res;
    setTabN(catId,res.items.length);
    if(catId===activeId) render(res);
  }catch{
    if(catId===activeId) showError();
  }finally{ setTabLoad(catId,false); }
}

/* ══════════════════════════════════════════════
   GROQ AI
══════════════════════════════════════════════ */
async function doAI(eid){
  const key = localStorage.getItem(GKEY)||"";
  if(!key){ toast("⚠ Add your Groq API key first"); openKey(); return; }

  const cat = CATS.find(c=>c.id===activeId);
  const article = (cache[activeId]?.items||[]).find(a=>enc(a.guid||a.link)===eid);
  if(!article) return;

  busy.add(eid);
  const btn = document.getElementById("btn-"+eid);
  if(btn){ btn.disabled=true; btn.innerHTML=`<span class="spin">◌</span> Analysing…`; }

  const ctxMap={world:"international",india:"national Indian",ap:"Andhra Pradesh regional",tg:"Telangana regional",sport:"Indian sports",biz:"Indian finance & business",health:"Indian health",ai:"AI & technology"};
  const ctx = ctxMap[cat.region]||"Indian";
  const isTE = /[\u0C00-\u0C7F]/.test(article.title||"")||article._lang==="te";
  const lnNote = isTE ? " This article is in Telugu — read it carefully and respond entirely in English." : "";

  const prompt = `You are a sharp ${ctx} news analyst writing for a well-informed Indian reader.${lnNote}

Write exactly 3 punchy sentences — no labels, no bullet points, no preamble:
• Sentence 1: The core fact — what happened?
• Sentence 2: The significance — why does it matter?
• Sentence 3: The forward look — what should readers watch next?

TITLE: ${article.title}
CONTENT: ${strip(article.description||"").slice(0,900)}`;

  try{
    const r = await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"user",content:prompt}],max_tokens:280,temperature:.6})
    });
    if(r.status===401) throw new Error("Invalid Groq API key");
    if(!r.ok) throw new Error("Groq error "+r.status);
    const d = await r.json();
    summaries[eid] = d.choices?.[0]?.message?.content?.trim()||"Analysis unavailable.";
    toast("✓ AI Brief ready");
  }catch(e){
    summaries[eid]=null; toast("✗ "+e.message);
    if(e.message.includes("Invalid")) checkKeyUI();
  }finally{
    busy.delete(eid);
    if(cache[activeId]) render(cache[activeId]);
  }
}

/* ══════════════════════════════════════════════
   SEARCH
══════════════════════════════════════════════ */
function runSearch(q){
  const ql=q.toLowerCase();
  let hits=[];
  for(const id in cache){
    const cat=CATS.find(c=>c.id===id);
    (cache[id].items||[]).forEach(a=>{
      if(((a.title||"")+(a._src||"")).toLowerCase().includes(ql))
        hits.push({...a,_catId:id,_cat:cat});
    });
  }

  const sp=document.getElementById("search-panel");
  document.getElementById("main").style.display="none";
  document.getElementById("sec-bar").style.display="none";
  sp.classList.add("show");

  if(!hits.length){
    sp.innerHTML=`<div class="state-box"><div class="state-icon">🔍</div><div class="state-title">No Results</div><div class="state-msg">No articles matching "<strong>${esc(q)}</strong>" in loaded tabs. Switch to more tabs to load more articles.</div></div>`;
    return;
  }

  sp.innerHTML=`
    <div class="search-label">${hits.length} results for "<strong>${esc(q)}</strong>"</div>
    <div class="grid-wrap">
      <div class="art-grid">
        ${hits.map((a,i)=>{
          const id=enc(a.guid||a.link),sum=summaries[id],bz=busy.has(id);
          const cat=a._cat;
          return `
            <div class="art-card" style="${catStyle(cat)};animation-delay:${i*.03}s">
              <div class="card-stripe"></div>
              <div class="card-body">
                <div class="card-meta">
                  ${langBadge(a)}
                  ${pillHTML(cat)}
                  <span class="date-tag">${fmtDate(a.pubDate)}</span>
                </div>
                <div class="card-headline">${esc(a.title)}</div>
                <div class="card-desc">${esc(strip(a.description))}</div>
                ${sum?aiHTML(sum,cat.region,cat):""}
                <div class="card-footer">
                  ${actionsHTML(id,sum,bz,cat.region,a.link,true)}
                </div>
              </div>
            </div>`;
        }).join("")}
      </div>
    </div>`;
}

function clearSearch(){
  document.getElementById("search-panel").classList.remove("show");
  document.getElementById("main").style.display="";
  document.getElementById("sec-bar").style.display="";
}

/* ══════════════════════════════════════════════
   BOOKMARKS
══════════════════════════════════════════════ */
function isBM(id){ return bookmarks.some(b=>b.id===id); }

function toggleBM(id){
  const art = (cache[activeId]?.items||[]).find(a=>enc(a.guid||a.link)===id);
  if(!art) return;
  if(isBM(id)){
    bookmarks=bookmarks.filter(b=>b.id!==id);
    toast("Bookmark removed");
  }else{
    bookmarks.unshift({id,title:art.title,link:art.link,src:art._src||"",date:art.pubDate});
    if(bookmarks.length>60) bookmarks=bookmarks.slice(0,60);
    toast("📌 Article saved!");
  }
  localStorage.setItem("brief_bm",JSON.stringify(bookmarks));
  updateBMBadge();
  if(cache[activeId]) render(cache[activeId]);
}

function updateBMBadge(){
  const el=document.getElementById("bm-count");
  el.textContent=bookmarks.length;
  el.style.display=bookmarks.length?"flex":"none";
}

function openBM(){
  const body=document.getElementById("bm-body");
  if(!bookmarks.length){
    body.innerHTML=`<div class="bm-empty">No saved articles yet.<br>Tap 🔖 on any article to save it here.</div>`;
  }else{
    body.innerHTML=bookmarks.map(b=>`
      <div class="bm-item">
        <div class="bm-title">${esc(b.title)}</div>
        <div class="bm-meta"><span>${esc(b.src)}</span><span>${fmtDate(b.date)}</span></div>
        <div class="bm-btns">
          <a class="btn-read" style="font-size:.68rem;padding:5px 10px" href="${esc(b.link)}" target="_blank" rel="noopener">Read →</a>
          <button class="btn-read" style="font-size:.68rem;padding:5px 10px" onclick="removeBM('${b.id}')">Remove</button>
        </div>
      </div>`).join("");
  }
  document.getElementById("bm-overlay").classList.add("open");
}

function removeBM(id){
  bookmarks=bookmarks.filter(b=>b.id!==id);
  localStorage.setItem("brief_bm",JSON.stringify(bookmarks));
  updateBMBadge();
  openBM();
  if(cache[activeId]) render(cache[activeId]);
}
function closeBM(){ document.getElementById("bm-overlay").classList.remove("open"); }

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
function strip(h){return(h||"").replace(/<[^>]*>/g,"").replace(/&nbsp;/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&#\d+;/g,"").replace(/\s+/g," ").trim()}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function enc(s){
  if(!s)return"x"+Math.random().toString(36).slice(2,8);
  let h=5381; for(let i=0;i<s.length;i++) h=Math.imul(31,h)+s.charCodeAt(i)|0;
  return"id"+Math.abs(h).toString(36).padStart(8,"0");
}
function fmtDate(s){
  try{
    const d=new Date(s), now=new Date(), diff=now-d;
    if(isNaN(d.getTime()))return"";
    if(diff<3600000) return Math.max(1,Math.floor(diff/60000))+"m ago";
    if(diff<86400000) return Math.floor(diff/3600000)+"h ago";
    if(diff<604800000) return Math.floor(diff/86400000)+"d ago";
    return d.toLocaleDateString("en-IN",{day:"numeric",month:"short"});
  }catch{return""}
}
